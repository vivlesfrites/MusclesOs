// DRAWER — Sélection exercice en 3 étapes
// ════════════════════════════════════════════════════
function openDrawer(editData) {
  // editData optionnel : { sessionId, entryId, actType, duration, intensity, boosts, date }
  if (editData) {
    S.drawer = {
      open: true, step: 5,
      cat: null, ex: null,
      actType: editData.actType,
      actBoosts: { ...editData.boosts },
      _intensity: editData.intensity,
      _duration: editData.duration,
      _distance: editData.distance || null,
      _bpm: editData.bpm || null,
      _paceUnit: editData.paceUnit || 'min_km',
      _actDate: editData.date,
      editMode: true,
      editSessionId: editData.sessionId,
      editEntryId: editData.entryId,
    };
  } else {
    S.drawer = { open: true, step: 1, cat: null, ex: null, actType: null, actBoosts: {},
                 editMode: false, editSessionId: null, editEntryId: null,
                 actGroup: null, _distance: null, _bpm: null, _paceUnit: 'min_km',
                 _actDate: DB.todayId(), _exDate: DB.todayId() };
  }
  document.getElementById('overlay').classList.add('on');
  document.getElementById('drawer').classList.add('on');
  renderDrawer();
}

function closeDrawer() {
  S.drawer.open = false;
  document.getElementById('overlay').classList.remove('on');
  document.getElementById('drawer').classList.remove('on');
}

function renderDrawer() {
  const { step, cat, ex } = S.drawer;
  const body = document.getElementById('d-body');
  const title = document.getElementById('d-title');
  const crumb = document.getElementById('d-crumb');

  if (step === 1) {
    title.textContent = 'Ajouter';
    crumb.innerHTML = '';
    const chips = Object.entries(CATALOG).map(([k, v]) => {
      const n = Object.keys(v.exercises).length;
      const color = getCatColor(k);
      return `<div class="cat-chip" data-cat="${k}">
        <span class="cc-icon" style="color:${color}">${v.icon}</span>
        <div class="cc-label">${v.label}</div>
        <div class="cc-count">${n} ex.</div>
      </div>`;
    }).join('');
    const todayId = DB.todayId();
    const curDate = S.drawer._date || todayId;
    body.innerHTML = `
      <div class="drawer-date-row">
        <label class="fl">Date de la séance</label>
        <input class="fi" id="drawer-date" type="date" value="${curDate}" max="${todayId}">
      </div>
      <div class="cat-grid">${chips}</div>
      <span class="act-section-lbl">Activité cardio / sport</span>
      <div class="act-type-chip" id="chip-act">
        <span class="cc-icon">↗</span>
        <div class="cc-label">Activité</div>
        <span style="font-family:var(--mono);font-size:10px;color:var(--t3);margin-left:auto">running · vélo · sport ···</span>
      </div>`;
    body.querySelector('#drawer-date').addEventListener('change', e => {
      S.drawer._date = e.target.value;
      S.drawer._actDate = e.target.value;
      S.drawer._exDate  = e.target.value;
    });
    body.querySelectorAll('.cat-chip').forEach(c =>
      c.addEventListener('click', () => {
        S.drawer._date = document.getElementById('drawer-date')?.value || todayId;
        S.drawer._actDate = S.drawer._date;
        S.drawer._exDate  = S.drawer._date;
        S.drawer.cat = c.dataset.cat;
        S.drawer.step = 2;
        renderDrawer();
      }));
    body.querySelector('#chip-act').addEventListener('click', () => {
      S.drawer._date = document.getElementById('drawer-date')?.value || todayId;
      S.drawer._actDate = S.drawer._date;
      S.drawer._exDate  = S.drawer._date;
      S.drawer.step = 4;
      renderDrawer();
    });
  }

  else if (step === 2) {
    const catData = CATALOG[cat];
    if (!catData) { console.error('[renderDrawer] step2 — cat invalide:', cat); S.drawer.step=1; renderDrawer(); return; }
    title.textContent = catData.label;
    crumb.innerHTML = `<span>${catData.label}</span>`;
    const items = Object.entries(catData.exercises).map(([k, v]) => `
      <div class="sel-item" data-ex="${k}">
        <div>
          <div class="si-name">${v.label}</div>
          <div class="si-sub">${v.equipment.join(', ')}</div>
        </div>
        <span class="si-arr">›</span>
      </div>`).join('');
    body.innerHTML = `
      <button class="btn-back" id="bb1">‹ Retour</button>
      <div class="sel-list">${items}</div>`;
    body.querySelector('#bb1').addEventListener('click', () => { S.drawer.step=1; renderDrawer(); });
    body.querySelectorAll('.sel-item').forEach(i =>
      i.addEventListener('click', () => {
        S.drawer.ex = i.dataset.ex;
        S.drawer.step = 3;
        renderDrawer();
      }));
  }

  else if (step === 3) {
    const catData = CATALOG[cat];
    const exData = catData?.exercises[ex];
    if (!catData || !exData) { console.error('[renderDrawer] step3 — ex invalide:', cat, ex); S.drawer.step = cat ? 2 : 1; renderDrawer(); return; }
    title.textContent = exData.label;
    crumb.innerHTML = `<span>${catData.label}</span> <span style="color:var(--t3)">›</span> <span>${exData.label}</span>`;
    const todayId = DB.todayId();
    const defaultDate = S.drawer._exDate || todayId;
    const items = Object.entries(exData.variants).map(([k, v]) => `
      <div class="sel-item" data-var="${k}">
        <div class="si-name">${v}</div>
        <span class="si-arr">›</span>
      </div>`).join('');
    body.innerHTML = `
      <button class="btn-back" id="bb2">‹ ${catData.label}</button>
      <div class="lbl" style="margin:10px 0 6px">Variante</div>
      <div class="sel-list">${items}</div>`;
    body.querySelector('#bb2').addEventListener('click', () => { S.drawer.step=2; renderDrawer(); });
    body.querySelectorAll('.sel-item').forEach(i =>
      i.addEventListener('click', () => {
        const dateVal = S.drawer._exDate || S.drawer._date || DB.todayId();
        addEntry(cat, ex, i.dataset.var, dateVal);
        closeDrawer();
      }));
  }

  // ── STEP 4 : Choix du type d'activité ─────────────
  else if (step === 4) {
    title.textContent = 'Type d\'activité';

    // ── Vue A : groupes (course vs autres) ──
    if (!S.drawer.actGroup) {
      crumb.innerHTML = '<span>Activité</span>';
      const runningItems = ACTIVITY_GROUPS[0].keys.map(k => ACTIVITY_CATALOG[k]?.label).filter(Boolean);
      const otherItems = ACTIVITY_GROUPS[1].keys.map(k => {
        const v = ACTIVITY_CATALOG[k];
        return v ? `<div class="sel-item" data-act="${k}">
          <div><div class="si-name" style="color:${v.color}">${v.icon}&nbsp; ${v.label}</div></div>
          <span class="si-arr">›</span>
        </div>` : '';
      }).join('');

      body.innerHTML = `
        <button class="btn-back" id="bb-act">‹ Retour</button>
        <div class="lbl" style="margin:12px 0 6px;color:var(--t3)">Course à pied</div>
        <div class="sel-item sel-item-group" id="btn-running-group">
          <div>
            <div class="si-name" style="color:#5ba3ff">↗&nbsp; Course à pied</div>
            <div class="si-sub">${runningItems.join(' · ')}</div>
          </div>
          <span class="si-arr">›</span>
        </div>
        <div class="lbl" style="margin:16px 0 6px;color:var(--t3)">Autres activités</div>
        <div class="sel-list">${otherItems}</div>`;

      body.querySelector('#bb-act').addEventListener('click', () => { S.drawer.step=1; renderDrawer(); });
      body.querySelector('#btn-running-group').addEventListener('click', () => {
        S.drawer.actGroup = 'running';
        renderDrawer();
      });
      body.querySelectorAll('.sel-item[data-act]').forEach(i =>
        i.addEventListener('click', () => {
          S.drawer.actType = i.dataset.act;
          S.drawer.actBoosts = {};
          S.drawer._distance = null;
          S.drawer._bpm = null;
          S.drawer.step = 5;
          renderDrawer();
        }));
    }

    // ── Vue B : sous-types course ──
    else {
      crumb.innerHTML = '<span>Activité</span> <span style="color:var(--t3)">›</span> <span>Course à pied</span>';
      const items = ACTIVITY_GROUPS[0].keys.map(k => {
        const v = ACTIVITY_CATALOG[k];
        return v ? `<div class="sel-item" data-act="${k}">
          <div><div class="si-name" style="color:${v.color}">${v.icon}&nbsp; ${v.label}</div></div>
          <span class="si-arr">›</span>
        </div>` : '';
      }).join('');

      body.innerHTML = `
        <button class="btn-back" id="bb-running">‹ Activité</button>
        <div class="sel-list">${items}</div>`;

      body.querySelector('#bb-running').addEventListener('click', () => {
        S.drawer.actGroup = null;
        renderDrawer();
      });
      body.querySelectorAll('.sel-item').forEach(i =>
        i.addEventListener('click', () => {
          S.drawer.actType = i.dataset.act;
          S.drawer.actBoosts = {};
          S.drawer._distance = null;
          S.drawer._bpm = null;
          S.drawer._intervals = null;
          S.drawer.step = 5;
          renderDrawer();
        }));
    }
  }

  // ── STEP 5 : Formulaire activité ──────────────────
  else if (step === 5) {
    const actType = S.drawer.actType;
    const act = ACTIVITY_CATALOG[actType];
    if (!act) { console.error('[renderDrawer] step5 — actType invalide:', actType); S.drawer.step=4; S.drawer.actGroup=null; renderDrawer(); return; }
    const boosts = S.drawer.actBoosts || {};
    const boostMuscles = ACTIVITY_BOOST_MUSCLES[actType] || [];
    const isRunning = act.group === 'running';
    const isIntervals = actType === 'running_intervals';

    title.textContent = act.label;
    crumb.innerHTML = `<span>Activité</span> <span style="color:var(--t3)">›</span> <span style="color:var(--t3)">Course</span> <span style="color:var(--t3)">›</span> <span style="color:${act.color}">${act.label}</span>`;

    const intensityDots = Array.from({length:10}, (_,i) => {
      const v = i + 1;
      const saved = S.drawer._intensity || 0;
      return `<button class="idot${saved===v?' on':''}" data-iv="${v}">${v}</button>`;
    }).join('');

    const boostChips = boostMuscles.map(id => {
      const level = boosts[id] || '';
      return `<button class="boost-chip${level?' '+level:''}" data-bid="${id}">${MUSCLE_LABELS[id]||id}</button>`;
    }).join('');

    const isEdit = S.drawer.editMode;
    const todayId = DB.todayId();
    const defaultDate = S.drawer._actDate || todayId;
    const paceUnit = S.drawer._paceUnit || 'min_km';
    const iv = S.drawer._intervals || {};

    // ── Calcul automatique distance + durée fractionné ──
    function _calcIntervals(warmKm, reps, effortM, recovM, coolKm, warmMin, effortMin, coolMin) {
      const dist = warmKm && reps && effortM && recovM
        ? Math.round(((warmKm || 0) + reps * (effortM + recovM) / 1000 + (coolKm || 0)) * 100) / 100
        : null;
      const dur = (warmMin > 0 && effortMin > 0 && coolMin > 0)
        ? warmMin + effortMin + coolMin
        : null;
      return { dist, dur };
    }

    // ── Formulaire fractionné ──
    if (isIntervals) {
      const calc = _calcIntervals(iv.warmup_km, iv.reps, iv.effort_m, iv.recov_m, iv.cooldown_km, iv.warmup_min, iv.effort_min, iv.cooldown_min);
      const autoKm   = calc.dist;
      const autoMin  = calc.dur;
      const durDisplay = autoMin || S.drawer._duration || '';

      const fragSep = `<div style="border-top:1px solid var(--b1);margin:4px 0;padding-top:8px">`;

      body.innerHTML = `
        <button class="btn-back" id="bb-act-form">‹ Course</button>
        <div class="act-form">
          <div class="act-form-row">
            <div class="fg">
              <label class="fl">Date</label>
              <input class="fi" id="act-date" type="date" value="${defaultDate}" max="${todayId}">
            </div>
          </div>

          ${fragSep}
          <div class="lbl" style="margin-bottom:8px">Échauffement</div>
          <div class="act-form-row">
            <div class="fg">
              <label class="fl">Distance</label>
              <input class="fi" id="iv-warmup-km" type="number" placeholder="2.0" min="0" step="0.1" value="${iv.warmup_km||''}">
              <span style="font-size:11px;color:var(--t3);margin-top:2px;display:block">km</span>
            </div>
            <div class="fg">
              <label class="fl">Durée <span style="color:var(--t3);font-weight:400">opt</span></label>
              <input class="fi" id="iv-warmup-min" type="number" placeholder="15" min="0" max="120" value="${iv.warmup_min||''}">
              <span style="font-size:11px;color:var(--t3);margin-top:2px;display:block">min</span>
            </div>
          </div>

          ${fragSep}
          <div class="lbl" style="margin-bottom:8px">Répétitions</div>
          <div class="act-form-row" style="grid-template-columns:1fr 1fr 1fr">
            <div class="fg">
              <label class="fl">Nombre</label>
              <input class="fi" id="iv-reps" type="number" placeholder="8" min="1" max="100" value="${iv.reps||''}">
            </div>
            <div class="fg">
              <label class="fl">Effort</label>
              <input class="fi" id="iv-effort-m" type="number" placeholder="400" min="10" step="10" value="${iv.effort_m||''}">
              <span style="font-size:11px;color:var(--t3);margin-top:2px;display:block">m</span>
            </div>
            <div class="fg">
              <label class="fl">Récup</label>
              <input class="fi" id="iv-recov-m" type="number" placeholder="200" min="10" step="10" value="${iv.recov_m||''}">
              <span style="font-size:11px;color:var(--t3);margin-top:2px;display:block">m</span>
            </div>
          </div>
          <div class="act-form-row">
            <div class="fg">
              <label class="fl">Durée effort+récup <span style="color:var(--t3);font-weight:400">opt</span></label>
              <input class="fi" id="iv-effort-min" type="number" placeholder="25" min="0" max="300" value="${iv.effort_min||''}">
              <span style="font-size:11px;color:var(--t3);margin-top:2px;display:block">min total</span>
            </div>
          </div>

          ${fragSep}
          <div class="lbl" style="margin-bottom:8px">Retour au calme</div>
          <div class="act-form-row">
            <div class="fg">
              <label class="fl">Distance</label>
              <input class="fi" id="iv-cooldown-km" type="number" placeholder="1.0" min="0" step="0.1" value="${iv.cooldown_km||''}">
              <span style="font-size:11px;color:var(--t3);margin-top:2px;display:block">km</span>
            </div>
            <div class="fg">
              <label class="fl">Durée <span style="color:var(--t3);font-weight:400">opt</span></label>
              <input class="fi" id="iv-cooldown-min" type="number" placeholder="10" min="0" max="120" value="${iv.cooldown_min||''}">
              <span style="font-size:11px;color:var(--t3);margin-top:2px;display:block">min</span>
            </div>
          </div>

          ${autoKm || autoMin ? `${fragSep}
          <div style="display:flex;gap:20px;align-items:center;padding:4px 0">
            ${autoKm ? `<div><span class="pace-val">${autoKm}</span> <span class="pace-unit-label">km total</span></div>` : ''}
            ${autoMin ? `<div><span class="pace-val">${autoMin}</span> <span class="pace-unit-label">min calculées</span></div>` : ''}
          </div>` : ''}

          ${fragSep}
          <div class="act-form-row">
            <div class="fg">
              <label class="fl">Durée totale${autoMin ? ' <span style="color:var(--accent);font-weight:400">auto</span>' : ''}</label>
              <input class="fi" id="act-dur" type="number" placeholder="45" min="1" max="600"
                value="${durDisplay}" ${autoMin ? 'style="opacity:.5"' : ''}>
              <span style="font-size:11px;color:var(--t3);margin-top:2px;display:block">min</span>
            </div>
            <div class="fg">
              <label class="fl">BPM moyen <span style="color:var(--t3);font-weight:400">opt</span></label>
              <input class="fi" id="act-bpm" type="number" placeholder="165" min="50" max="220" value="${S.drawer._bpm||''}">
              <span style="font-size:11px;color:var(--t3);margin-top:2px;display:block">bpm</span>
            </div>
          </div>
          <div class="fg" style="margin-top:4px">
            <label class="fl">Intensité ressentie</label>
            <div class="act-intensity-dots">${intensityDots}</div>
          </div>

          <div style="margin-top:8px">
            <div class="lbl" style="margin-bottom:6px">Muscles extra sollicités <span style="font-weight:400;color:var(--t3)">(optionnel)</span></div>
            <div class="boost-grid">${boostChips}</div>
          </div>
          <button class="btn-act-save" id="btn-act-save">${isEdit ? '✓ Enregistrer' : '＋ Enregistrer la séance'}</button>
          ${isEdit ? `<button class="btn-de" id="btn-act-del" style="margin-top:6px;width:100%">Supprimer l'activité</button>` : ''}
        </div>`;

      body.querySelector('#bb-act-form').addEventListener('click', () => { S.drawer.actGroup='running'; S.drawer.step=4; renderDrawer(); });

      // Snapshot + recalcul live
      const ivIds = ['iv-warmup-km','iv-warmup-min','iv-reps','iv-effort-m','iv-recov-m','iv-effort-min','iv-cooldown-km','iv-cooldown-min'];
      ivIds.forEach(id => {
        document.getElementById(id)?.addEventListener('input', () => {
          S.drawer._actDate = document.getElementById('act-date')?.value || DB.todayId();
          S.drawer._bpm = parseInt(document.getElementById('act-bpm')?.value) || null;
          S.drawer._intervals = {
            warmup_km:   parseFloat(document.getElementById('iv-warmup-km')?.value) || null,
            warmup_min:  parseInt(document.getElementById('iv-warmup-min')?.value) || null,
            reps:        parseInt(document.getElementById('iv-reps')?.value) || null,
            effort_m:    parseInt(document.getElementById('iv-effort-m')?.value) || null,
            recov_m:     parseInt(document.getElementById('iv-recov-m')?.value) || null,
            effort_min:  parseInt(document.getElementById('iv-effort-min')?.value) || null,
            cooldown_km: parseFloat(document.getElementById('iv-cooldown-km')?.value) || null,
            cooldown_min:parseInt(document.getElementById('iv-cooldown-min')?.value) || null,
          };
          renderDrawer();
        });
      });

      // Dots intensité
      body.querySelectorAll('.idot').forEach(btn =>
        btn.addEventListener('click', () => {
          S.drawer._actDate = document.getElementById('act-date')?.value || DB.todayId();
          S.drawer._bpm = parseInt(document.getElementById('act-bpm')?.value) || null;
          S.drawer._intervals = {
            warmup_km:   parseFloat(document.getElementById('iv-warmup-km')?.value) || null,
            warmup_min:  parseInt(document.getElementById('iv-warmup-min')?.value) || null,
            reps:        parseInt(document.getElementById('iv-reps')?.value) || null,
            effort_m:    parseInt(document.getElementById('iv-effort-m')?.value) || null,
            recov_m:     parseInt(document.getElementById('iv-recov-m')?.value) || null,
            effort_min:  parseInt(document.getElementById('iv-effort-min')?.value) || null,
            cooldown_km: parseFloat(document.getElementById('iv-cooldown-km')?.value) || null,
            cooldown_min:parseInt(document.getElementById('iv-cooldown-min')?.value) || null,
          };
          S.drawer._intensity = parseInt(btn.dataset.iv);
          renderDrawer();
        }));

      body.querySelectorAll('.boost-chip').forEach(btn =>
        btn.addEventListener('click', () => {
          const id = btn.dataset.bid;
          const cur = boosts[id] || '';
          if (!cur) boosts[id] = 'moderate';
          else if (cur === 'moderate') boosts[id] = 'high';
          else delete boosts[id];
          renderDrawer();
        }));

      // Enregistrer
      body.querySelector('#btn-act-save').addEventListener('click', () => {
        const ivData = {
          warmup_km:   parseFloat(document.getElementById('iv-warmup-km')?.value) || null,
          warmup_min:  parseInt(document.getElementById('iv-warmup-min')?.value) || null,
          reps:        parseInt(document.getElementById('iv-reps')?.value) || null,
          effort_m:    parseInt(document.getElementById('iv-effort-m')?.value) || null,
          recov_m:     parseInt(document.getElementById('iv-recov-m')?.value) || null,
          effort_min:  parseInt(document.getElementById('iv-effort-min')?.value) || null,
          cooldown_km: parseFloat(document.getElementById('iv-cooldown-km')?.value) || null,
          cooldown_min:parseInt(document.getElementById('iv-cooldown-min')?.value) || null,
        };
        const calcResult = _calcIntervals(ivData.warmup_km, ivData.reps, ivData.effort_m, ivData.recov_m, ivData.cooldown_km, ivData.warmup_min, ivData.effort_min, ivData.cooldown_min);
        const dur = calcResult.dur || parseInt(document.getElementById('act-dur')?.value) || null;
        const dist = calcResult.dist;
        const bpmVal = parseInt(document.getElementById('act-bpm')?.value) || null;
        const intensity = S.drawer._intensity || 0;
        const dateVal = document.getElementById('act-date')?.value || DB.todayId();
        // Stocker les détails intervals dans l'entrée
        const extraBoosts = { ...boosts };
        if (!dur || dur <= 0) {
          const inp = document.getElementById('act-dur');
          if (inp) { inp.classList.add('err'); setTimeout(() => inp.classList.remove('err'), 400); inp.focus(); }
          return;
        }
        if (!intensity) { showPrToast('⚠ Renseigne l\'intensité ressentie'); return; }
        if (S.drawer.editMode) {
          updateActivity(S.drawer.editSessionId, S.drawer.editEntryId, dur, intensity, extraBoosts, dateVal, dist, bpmVal, 'min_km', ivData);
        } else {
          addActivity(actType, dur, intensity, extraBoosts, dateVal, dist, bpmVal, 'min_km', ivData);
        }
        closeDrawer();
      });

      body.querySelector('#btn-act-del')?.addEventListener('click', () => {
        if (!confirm('Supprimer cette activité ?')) return;
        deleteActivity(S.drawer.editSessionId, S.drawer.editEntryId);
        closeDrawer();
      });
      return;
    }

    // ── Formulaire standard (running non-fractionné + autres activités) ──
    const distVal = S.drawer._distance;
    const durVal = S.drawer._duration;
    let paceHtml = '';
    if (distVal && durVal && distVal > 0 && durVal > 0) {
      if (paceUnit === 'min_km') {
        const totalMin = durVal / distVal;
        const mins = Math.floor(totalMin);
        const secs = Math.round((totalMin - mins) * 60);
        paceHtml = `<div class="pace-display"><span class="pace-val">${mins}:${secs.toString().padStart(2,'0')}</span> <span class="pace-unit-label">min/km</span></div>`;
      } else {
        const kmh = (distVal / durVal) * 60;
        paceHtml = `<div class="pace-display"><span class="pace-val">${kmh.toFixed(1)}</span> <span class="pace-unit-label">km/h</span></div>`;
      }
    }

    const runningFields = isRunning ? `
      <div class="act-form-row">
        <div class="fg">
          <label class="fl">Distance <span style="color:var(--t3);font-weight:400">optionnel</span></label>
          <input class="fi" id="act-dist" type="number" placeholder="10.5" min="0" step="0.1"
            value="${distVal || ''}">
          <span style="font-size:11px;color:var(--t3);margin-top:3px;display:block">km</span>
        </div>
        <div class="fg">
          <label class="fl">BPM moyen <span style="color:var(--t3);font-weight:400">optionnel</span></label>
          <input class="fi" id="act-bpm" type="number" placeholder="155" min="50" max="220"
            value="${S.drawer._bpm || ''}">
          <span style="font-size:11px;color:var(--t3);margin-top:3px;display:block">bpm</span>
        </div>
      </div>
      ${paceHtml ? `
      <div style="display:flex;align-items:center;justify-content:space-between">
        ${paceHtml}
        <button class="pace-toggle" id="btn-pace-toggle">${paceUnit === 'min_km' ? 'Afficher km/h' : 'Afficher min/km'}</button>
      </div>` : ''}` : '';

    body.innerHTML = `
      <button class="btn-back" id="bb-act-form">‹ ${isRunning ? 'Course' : act.icon + ' Type'}</button>
      <div class="act-form">
        <div class="act-form-row">
          <div class="fg">
            <label class="fl">Date</label>
            <input class="fi" id="act-date" type="date" value="${defaultDate}" max="${todayId}">
          </div>
        </div>
        <div class="act-form-row">
          <div class="fg">
            <label class="fl">Durée (min)</label>
            <input class="fi" id="act-dur" type="number" placeholder="45" min="1" max="480"
              value="${S.drawer._duration || ''}">
          </div>
          <div class="fg">
            <label class="fl">Intensité ressentie</label>
            <div class="act-intensity-dots">${intensityDots}</div>
          </div>
        </div>
        ${runningFields}
        <div>
          <div class="lbl" style="margin-bottom:6px">Muscles extra sollicités <span style="font-weight:400;color:var(--t3)">(optionnel · tap = modéré · 2× = intense)</span></div>
          <div class="boost-grid">${boostChips}</div>
        </div>
        <button class="btn-act-save" id="btn-act-save">${isEdit ? '✓ Enregistrer la modification' : '＋ Enregistrer l\'activité'}</button>
        ${isEdit ? `<button class="btn-de" id="btn-act-del" style="margin-top:6px;width:100%">Supprimer l'activité</button>` : ''}
      </div>`;

    body.querySelector('#bb-act-form').addEventListener('click', () => {
      if (isRunning) { S.drawer.actGroup = 'running'; }
      S.drawer.step = 4;
      renderDrawer();
    });

    // Helper : snapshot des champs courants dans S.drawer
    function _snapshotFields() {
      S.drawer._duration = parseInt(document.getElementById('act-dur')?.value) || null;
      S.drawer._actDate  = document.getElementById('act-date')?.value || DB.todayId();
      if (isRunning) {
        const d = parseFloat(document.getElementById('act-dist')?.value);
        const b = parseInt(document.getElementById('act-bpm')?.value);
        S.drawer._distance = d > 0 ? d : null;
        S.drawer._bpm      = b > 0 ? b : null;
      }
    }

    // Recalcul pace en live
    if (isRunning) {
      ['act-dur','act-dist'].forEach(id => {
        document.getElementById(id)?.addEventListener('input', () => { _snapshotFields(); renderDrawer(); });
      });
      document.getElementById('btn-pace-toggle')?.addEventListener('click', () => {
        _snapshotFields();
        S.drawer._paceUnit = paceUnit === 'min_km' ? 'km_h' : 'min_km';
        renderDrawer();
      });
    }

    // Dots intensité
    body.querySelectorAll('.idot').forEach(btn =>
      btn.addEventListener('click', () => {
        _snapshotFields();
        S.drawer._intensity = parseInt(btn.dataset.iv);
        renderDrawer();
      }));

    // Chips boosts
    body.querySelectorAll('.boost-chip').forEach(btn =>
      btn.addEventListener('click', () => {
        _snapshotFields();
        const id = btn.dataset.bid;
        const cur = boosts[id] || '';
        if (!cur) boosts[id] = 'moderate';
        else if (cur === 'moderate') boosts[id] = 'high';
        else delete boosts[id];
        renderDrawer();
      }));

    // Enregistrer / Modifier
    body.querySelector('#btn-act-save').addEventListener('click', () => {
      const dur = parseInt(document.getElementById('act-dur')?.value);
      const intensity = S.drawer._intensity || 0;
      const dateVal = document.getElementById('act-date')?.value || DB.todayId();
      const dist = isRunning ? (parseFloat(document.getElementById('act-dist')?.value) || null) : null;
      const bpm  = isRunning ? (parseInt(document.getElementById('act-bpm')?.value) || null) : null;
      if (!dur || dur <= 0) {
        const inp = document.getElementById('act-dur');
        if (inp) { inp.classList.add('err'); setTimeout(() => inp.classList.remove('err'), 400); inp.focus(); }
        return;
      }
      if (!intensity) { showPrToast('⚠ Renseigne l\'intensité ressentie'); return; }
      if (S.drawer.editMode) {
        updateActivity(S.drawer.editSessionId, S.drawer.editEntryId, dur, intensity, { ...boosts }, dateVal, dist, bpm, S.drawer._paceUnit);
      } else {
        addActivity(actType, dur, intensity, { ...boosts }, dateVal, dist, bpm, S.drawer._paceUnit);
      }
      closeDrawer();
    });

    // Supprimer (mode edit uniquement)
    body.querySelector('#btn-act-del')?.addEventListener('click', () => {
      if (!confirm('Supprimer cette activité ?')) return;
      deleteActivity(S.drawer.editSessionId, S.drawer.editEntryId);
      closeDrawer();
    });
  }
}

function addEntry(category, exerciseId, variantId, targetDateId) {
  const entry = { id: uid(), category, exerciseId, variantId, sets: [], ts: Date.now() };
  const dateId = targetDateId || DB.todayId();
  const todayId = DB.todayId();

  if (dateId === todayId) {
    S.today.entries.push(entry);
    S.expandedEntry = entry.id;
    DB.saveToday(S.today);
    rebuildFatigue();
    PR_ENGINE.rebuild();
    renderToday();
  } else {
    const all = DB.load();
    let s = all.find(x => x.id === dateId);
    if (!s) {
      s = { id: dateId, metrics: { energy: null, sleep: null, bodyweight: null, notes: '' }, entries: [] };
      all.push(s);
      all.sort((a, b) => b.id.localeCompare(a.id));
    }
    s.entries.push(entry);
    DB.save(all);
    rebuildFatigue();
    PR_ENGINE.rebuild();
    // Naviguer vers l'historique et ouvrir la bonne session
    S.expandedHist = dateId;
    switchTab('history');
    showPrToast('✓ Exercice ajouté à ' + fmtDateShort(dateId));
  }
}

function addActivity(activityType, duration, intensity, boosts, targetDateId, distance, bpm, paceUnit, intervals) {
  const entry = {
    id: uid(), type: 'activity', activityType, duration, intensity,
    boosts: boosts || {}, ts: Date.now()
  };
  if (distance) entry.distance = distance;
  if (bpm) entry.bpm = bpm;
  if (paceUnit) entry.paceUnit = paceUnit;
  if (intervals) entry.intervals = intervals;
  const dateId = targetDateId || DB.todayId();
  const todayId = DB.todayId();

  if (dateId === todayId) {
    S.today.entries.push(entry);
    DB.saveToday(S.today);
  } else {
    const all = DB.load();
    let s = all.find(x => x.id === dateId);
    if (!s) {
      s = { id: dateId, metrics: { energy: null, sleep: null, bodyweight: null, notes: '' }, entries: [] };
      all.push(s);
      all.sort((a, b) => b.id.localeCompare(a.id));
    }
    s.entries.push(entry);
    DB.save(all);
  }
  rebuildFatigue();
  PR_ENGINE.rebuild();
  if (dateId === todayId) renderToday();
}

function updateActivity(sessionId, entryId, duration, intensity, boosts, newDateId, distance, bpm, paceUnit, intervals) {
  const all = DB.load();
  const todayId = DB.todayId();
  const targetDate = newDateId || sessionId;

  const _applyFields = (e) => {
    e.duration = duration; e.intensity = intensity; e.boosts = boosts;
    if (distance) e.distance = distance; else delete e.distance;
    if (bpm) e.bpm = bpm; else delete e.bpm;
    if (paceUnit) e.paceUnit = paceUnit; else delete e.paceUnit;
    if (intervals) e.intervals = intervals; else delete e.intervals;
  };

  if (targetDate === sessionId) {
    // Modification sur place
    const s = all.find(x => x.id === sessionId);
    if (!s) return;
    const e = s.entries.find(x => x.id === entryId);
    if (!e) return;
    _applyFields(e);
  } else {
    // Déplacement vers une autre date
    const s = all.find(x => x.id === sessionId);
    if (!s) return;
    const eIdx = s.entries.findIndex(x => x.id === entryId);
    if (eIdx < 0) return;
    const [e] = s.entries.splice(eIdx, 1);
    _applyFields(e); e.ts = Date.now();
    let newS = all.find(x => x.id === targetDate);
    if (!newS) {
      newS = { id: targetDate, metrics: { energy: null, sleep: null, bodyweight: null, notes: '' }, entries: [] };
      all.push(newS);
      all.sort((a, b) => b.id.localeCompare(a.id));
    }
    newS.entries.push(e);
  }

  DB.save(all);
  // Synchronise S.today si elle est affectée
  const freshToday = all.find(x => x.id === todayId);
  if (freshToday) S.today = freshToday;
  rebuildFatigue();
  PR_ENGINE.rebuild();
  if (S.expandedHist && S.expandedHist !== targetDate) S.expandedHist = targetDate;
  if (S.tab === 'history') renderHistory();
  if (S.tab === 'today') renderToday();
}

function deleteActivity(sessionId, entryId) {
  const all = DB.load();
  const todayId = DB.todayId();
  const s = all.find(x => x.id === sessionId);
  if (!s) return;
  s.entries = s.entries.filter(x => x.id !== entryId);
  DB.save(all);
  const freshToday = all.find(x => x.id === todayId);
  if (freshToday) S.today = freshToday;
  rebuildFatigue();
  PR_ENGINE.rebuild();
  if (S.tab === 'history') renderHistory();
  if (S.tab === 'today') renderToday();
}

// État local de l'onglet progression
const PROG = {
  cat: null,      // catégorie sélectionnée
  exId: null,     // exercice sélectionné
  varId: null,    // variante sélectionnée
  openSel: null,  // quel sélecteur est ouvert : 'cat' | 'ex' | 'var' | null
  muscle: null,   // muscle sélectionné sur la carte anatomique
};

function renderProgress() {
  const el = document.getElementById('tab-progress');
  if (!el) return;

  // ── Données historique pour l'exercice sélectionné ──
  function getHistory(cat, exId, varId) {
    // Retourne array de { date, sets, maxW, max1RM, totalVol } par séance
    const sessions = DB.load();
    const result = [];
    for (const s of sessions) {
      const entries = s.entries.filter(e =>
        e.type !== 'activity' &&
        e.category === cat && e.exerciseId === exId && e.variantId === varId &&
        e.sets.length > 0
      );
      if (!entries.length) continue;
      const allSets = entries.flatMap(e => e.sets);
      const maxW = Math.max(...allSets.map(x => x.weight || 0));
      const max1RM = Math.max(...allSets.map(x => {
        const w = x.weight || 0; const r = x.reps || 0;
        if (!w || !r) return 0;
        return r === 1 ? w : w * (1 + r / 30);
      }));
      const totalVol = allSets.reduce((s, x) => s + (x.weight||0)*(x.reps||0), 0);
      const totalSets = allSets.length;
      result.push({ date: s.id, maxW, max1RM: Math.round(max1RM * 10)/10, totalVol, totalSets });
    }
    return result.sort((a, b) => a.date.localeCompare(b.date));
  }

  function trend(history, field) {
    if (history.length < 2) return null;
    const recent = history.slice(-1)[0][field];
    const older  = history.slice(-Math.min(history.length, 6), -1);
    const avg    = older.reduce((s, x) => s + x[field], 0) / older.length;
    if (avg === 0) return null;
    const pct = ((recent - avg) / avg * 100);
    return { pct: Math.round(pct), dir: pct > 1 ? 'up' : pct < -1 ? 'down' : 'flat' };
  }

  // ── Sélecteur ────────────────────────────────────
  const { cat, exId, varId, openSel } = PROG;

  const catLabel  = cat   ? CATALOG[cat]?.label : null;
  const exLabel_  = (cat && exId) ? exLabel(cat, exId) : null;
  const varLabel_ = (cat && exId && varId) ? varLabel(cat, exId, varId) : null;

  // Options dropdown selon quel sélecteur est ouvert
  let ddHtml = '';
  if (openSel === 'cat') {
    ddHtml = `<div class="prog-dropdown">` +
      Object.entries(CATALOG).map(([k, v]) =>
        `<div class="prog-dd-item${cat===k?' active':''}" data-dd-cat="${k}">${v.icon} ${v.label}</div>`
      ).join('') + `</div>`;
  } else if (openSel === 'ex' && cat) {
    ddHtml = `<div class="prog-dropdown">` +
      Object.entries(CATALOG[cat].exercises).map(([k, v]) =>
        `<div class="prog-dd-item${exId===k?' active':''}" data-dd-ex="${k}">${v.label}</div>`
      ).join('') + `</div>`;
  } else if (openSel === 'var' && cat && exId) {
    ddHtml = `<div class="prog-dropdown">` +
      Object.entries(CATALOG[cat].exercises[exId].variants).map(([k, v]) =>
        `<div class="prog-dd-item${varId===k?' active':''}" data-dd-var="${k}">${v}</div>`
      ).join('') + `</div>`;
  }

  // Insère le dropdown après la ligne ouverte
  const selRows = [
    { key: 'cat', label: 'Catégorie', value: catLabel,  locked: false },
    { key: 'ex',  label: 'Exercice',  value: exLabel_,  locked: !cat },
    { key: 'var', label: 'Variante',  value: varLabel_,  locked: !exId },
  ].map(row => {
    const rowHtml = `
      <div class="prog-sel-row${row.locked?' locked':''}" data-sel="${row.key}">
        <span class="prog-sel-label">${row.label}</span>
        <span class="prog-sel-value">${row.value || '—'}</span>
        <span class="prog-sel-arr">${openSel === row.key ? '▴' : '▾'}</span>
      </div>`;
    return openSel === row.key ? rowHtml + ddHtml : rowHtml;
  }).join('');

  // ── Corps de l'onglet ─────────────────────────────
  let bodyHtml = '';

  if (!cat || !exId || !varId) {
    bodyHtml = `<div class="prog-empty">
      ◌<br>Sélectionne un exercice<em>et sa variante pour voir ta progression</em>
    </div>`;
  } else {
    const history = getHistory(cat, exId, varId);

    if (history.length === 0) {
      bodyHtml = `<div class="prog-empty">
        Aucune donnée<em>Enregistre des séances de ${exLabel_} pour voir ta progression</em>
      </div>`;
    } else {
      // PRs actuels
      const prData = PR_ENGINE.load()[`${cat}::${exId}::${varId}`] || {};
      const allMax1RM  = prData.max1RM   || 0;
      const allMaxW    = prData.maxWeight || 0;
      const allMaxReps = prData.maxReps   || 0;
      const isBW       = allMaxW === 0;

      // Trend sur 1RM ou charge
      const trendData = trend(history, isBW ? 'totalVol' : 'max1RM');
      const trendHtml = trendData
        ? `<div class="prog-trend ${trendData.dir}">${trendData.dir==='up'?'▲':trendData.dir==='down'?'▼':'—'} ${Math.abs(trendData.pct)}%</div>`
        : '';

      // Bloc PRs
      const prGrid = isBW
        ? `<div class="prog-pr-grid">
            <div class="prog-pr-card">
              <div class="prog-pr-val">${allMaxReps}</div>
              <div class="prog-pr-unit">reps</div>
              <div class="prog-pr-lbl">Record</div>
            </div>
            <div class="prog-pr-card">
              <div class="prog-pr-val">${history.length}</div>
              <div class="prog-pr-unit">séances</div>
              <div class="prog-pr-lbl">Total</div>
              ${trendHtml}
            </div>
            <div class="prog-pr-card">
              <div class="prog-pr-val">${history[history.length-1].totalSets}</div>
              <div class="prog-pr-unit">séries</div>
              <div class="prog-pr-lbl">Dernière séance</div>
            </div>
          </div>`
        : `<div class="prog-pr-grid">
            <div class="prog-pr-card">
              <div class="prog-pr-val">${allMaxW}</div>
              <div class="prog-pr-unit">kg</div>
              <div class="prog-pr-lbl">Charge max</div>
            </div>
            <div class="prog-pr-card">
              <div class="prog-pr-val">${allMax1RM > 0 ? allMax1RM.toFixed(1) : '—'}</div>
              <div class="prog-pr-unit">kg e1RM</div>
              <div class="prog-pr-lbl">1RM estimé</div>
              ${trendHtml}
            </div>
            <div class="prog-pr-card">
              <div class="prog-pr-val">${history.length}</div>
              <div class="prog-pr-unit">séances</div>
              <div class="prog-pr-lbl">Total</div>
            </div>
          </div>`;

      // Canvas ID unique pour éviter les conflits
      const canvasId = 'prog-canvas-' + cat + '-' + exId;

      // Tableau des séances
      const maxW_overall = Math.max(...history.map(x => x.max1RM || x.maxW || x.totalVol || 1));
      const sessRows = [...history].reverse().slice(0, 20).map(s => {
        const isPR = (!isBW && (s.maxW === allMaxW || Math.abs(s.max1RM - allMax1RM) < 0.01)) ||
                     (isBW && s.totalVol > 0);
        return `<div class="prog-sess-row${isPR?' is-pr':''}">
          <span class="prog-sess-date">${fmtDateShort(s.date).split(' ').slice(0,3).join(' ')}</span>
          <span class="prog-sess-sets">${s.totalSets} série${s.totalSets!==1?'s':''}</span>
          <span class="prog-sess-w">${isBW ? s.totalVol+' kg·vol' : s.maxW+' kg'}</span>
          <span class="prog-sess-1rm">${isBW ? '' : 'e1RM '+s.max1RM.toFixed(1)}</span>
        </div>`;
      }).join('');

      bodyHtml = `
        ${prGrid}
        <div class="prog-chart-wrap">
          <div class="prog-chart-title">${isBW ? 'Volume total' : '1RM estimé (Epley)'} — ${history.length} séance${history.length!==1?'s':''}</div>
          <canvas class="prog-canvas" id="${canvasId}" height="160"></canvas>
        </div>
        <div class="prog-sessions">
          <div class="prog-sess-hdr">
            <span class="lbl">Dernières séances</span>
          </div>
          ${sessRows}
        </div>`;
    }
  }

  el.innerHTML = `
    <div class="bm-wrap">
      <div id="bm-prog-svg"></div>
    </div>
    <div class="prog-selector">${selRows}</div>
    ${bodyHtml}`;

  // ── Événements sélecteur ─────────────────────────
  el.querySelectorAll('.prog-sel-row:not(.locked)').forEach(row => {
    row.addEventListener('click', () => {
      const key = row.dataset.sel;
      PROG.openSel = PROG.openSel === key ? null : key;
      renderProgress();
    });
  });

  el.querySelectorAll('.prog-dd-item').forEach(item => {
    if (item.dataset.ddCat !== undefined) {
      item.addEventListener('click', () => {
        PROG.cat = item.dataset.ddCat;
        PROG.exId = null; PROG.varId = null; PROG.openSel = null;
        renderProgress();
      });
    } else if (item.dataset.ddEx !== undefined) {
      item.addEventListener('click', () => {
        PROG.exId = item.dataset.ddEx;
        PROG.varId = null; PROG.openSel = null;
        renderProgress();
      });
    } else if (item.dataset.ddVar !== undefined) {
      item.addEventListener('click', () => {
        PROG.varId = item.dataset.ddVar;
        PROG.openSel = null;
        renderProgress();
        // Ouvre directement le graphe
      });
    }
  });

  // ── Carte anatomique (navigation par muscle) ──────
  if (typeof BODY_MAP !== 'undefined') {
    const exercisedCats = new Set(
      DB.load().flatMap(s => s.entries.map(e => e.category).filter(Boolean))
    );
    BODY_MAP.render('bm-prog-svg', (muscleId, category) => {
      PROG.muscle = muscleId;
      if (category && PROG.cat !== category) {
        PROG.cat = category; PROG.exId = null; PROG.varId = null; PROG.openSel = null;
      }
      renderProgress();
    });
    BODY_MAP.updateProgression('bm-prog-svg', exercisedCats);
    if (PROG.muscle) BODY_MAP.highlight('bm-prog-svg', PROG.muscle);
  }

  // ── Canvas graphe ─────────────────────────────────
  if (!cat || !exId || !varId) return;
  const history = getHistory(cat, exId, varId);
  if (history.length === 0) return;
  const isBW = (PR_ENGINE.load()[`${cat}::${exId}::${varId}`]?.maxWeight || 0) === 0;

  const canvasId2 = 'prog-canvas-' + cat + '-' + exId;
  const canvas = document.getElementById(canvasId2);
  if (!canvas) return;

  // Resize canvas au pixel près
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width  = rect.width  * dpr;
  canvas.height = rect.height * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const W = rect.width;
  const H = rect.height;
  const PAD = { top: 10, right: 10, bottom: 28, left: 42 };
  const gW = W - PAD.left - PAD.right;
  const gH = H - PAD.top  - PAD.bottom;

  const vals  = history.map(x => isBW ? x.totalVol : x.max1RM);
  const minV  = Math.min(...vals);
  const maxV  = Math.max(...vals);
  const range = maxV - minV || 1;

  function xPos(i) { return PAD.left + (i / Math.max(history.length - 1, 1)) * gW; }
  function yPos(v) { return PAD.top + gH - ((v - minV) / range) * gH; }

  // Grille horizontale
  ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--b1').trim() || '#222a37';
  ctx.lineWidth = 1;
  const steps = 3;
  for (let i = 0; i <= steps; i++) {
    const y = PAD.top + (i / steps) * gH;
    ctx.beginPath(); ctx.moveTo(PAD.left, y); ctx.lineTo(PAD.left + gW, y); ctx.stroke();
    const v = maxV - (i / steps) * range;
    ctx.fillStyle = '#48556a';
    ctx.font = '9px IBM Plex Mono, monospace';
    ctx.textAlign = 'right';
    ctx.fillText(Math.round(v), PAD.left - 4, y + 3);
  }

  // Aire sous la courbe
  const grad = ctx.createLinearGradient(0, PAD.top, 0, PAD.top + gH);
  grad.addColorStop(0,   'rgba(61,255,160,.22)');
  grad.addColorStop(1,   'rgba(61,255,160,.02)');
  ctx.beginPath();
  ctx.moveTo(xPos(0), PAD.top + gH);
  history.forEach((_, i) => ctx.lineTo(xPos(i), yPos(vals[i])));
  ctx.lineTo(xPos(history.length - 1), PAD.top + gH);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Ligne
  ctx.beginPath();
  ctx.strokeStyle = '#3dffa0';
  ctx.lineWidth = 1.5;
  ctx.lineJoin = 'round';
  history.forEach((_, i) => i === 0 ? ctx.moveTo(xPos(i), yPos(vals[i])) : ctx.lineTo(xPos(i), yPos(vals[i])));
  ctx.stroke();

  // Points + dates
  const prVal = isBW
    ? Math.max(...vals)
    : (PR_ENGINE.load()[`${cat}::${exId}::${varId}`]?.max1RM || 0);

  history.forEach((d, i) => {
    const x = xPos(i); const y = yPos(vals[i]);
    const isPR = Math.abs(vals[i] - prVal) < 0.01;
    ctx.beginPath();
    ctx.arc(x, y, isPR ? 4 : 3, 0, Math.PI * 2);
    ctx.fillStyle = isPR ? '#3dffa0' : '#1a5c40';
    ctx.fill();
    if (isPR) {
      ctx.strokeStyle = '#3dffa0'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(x, y, 6, 0, Math.PI * 2); ctx.stroke();
    }
    // Label date (toutes les N séances selon densité)
    const every = history.length <= 6 ? 1 : history.length <= 12 ? 2 : Math.ceil(history.length / 6);
    if (i % every === 0 || i === history.length - 1) {
      ctx.fillStyle = '#48556a';
      ctx.font = '8px IBM Plex Mono, monospace';
      ctx.textAlign = 'center';
      const parts = d.date.split('-');
      ctx.fillText(`${parts[2]}/${parts[1]}`, x, H - PAD.bottom + 14);
    }
  });
}


function switchTab(tab) {
  S.tab = tab;
  document.querySelectorAll('.tab-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.tab').forEach(t =>
    t.classList.toggle('active', t.id === `tab-${tab}`));
  if (tab === 'today') renderToday();
  if (tab === 'history') renderHistory();
  if (tab === 'fatigue') renderFatigue();
  if (tab === 'progress') renderProgress();
}

// ════════════════════════════════════════════════════
// RENDER — FATIGUE TAB
// ════════════════════════════════════════════════════
function renderFatigue() {
  const el = document.getElementById('tab-fatigue');
  if (!el) return;
  if (typeof FATIGUE_ENGINE === 'undefined' || typeof FATIGUE_DATA === 'undefined') {
    el.innerHTML = '<div style="padding:40px 16px;text-align:center;color:var(--t3);font-size:13px">Modules fatigue non chargés<br><span style="font-size:11px">Vérifier que fatigue-data.js et fatigue-engine.js sont présents</span></div>';
    return;
  }

  const all = FATIGUE_ENGINE.getAll();
  const THRESHOLD = 5;
  const now = new Date();
  const timeStr = `${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;

  let groupsHtml = '';
  for (const [groupName, muscleIds] of Object.entries(MUSCLE_GROUPS)) {
    const active = muscleIds
      .map(id => ({ id, val: all[id] || 0 }))
      .filter(x => x.val >= THRESHOLD)
      .sort((a, b) => b.val - a.val);

    if (active.length === 0) {
      groupsHtml += `
        <div class="fat-group fresh">
          <div class="fat-group-hdr">
            <span class="lbl">${groupName}</span>
            <span class="fat-fresh-tag">FRAIS ✓</span>
          </div>
        </div>`;
      continue;
    }

    const rows = active.map(({ id, val }) => {
      const { label, color } = FATIGUE_ENGINE.classify(val);
      const barW = Math.min(100, (val / 160) * 100);
      const recup = FATIGUE_ENGINE.getHoursToRecover(id, 20);
      const recupStr = recup != null
        ? (recup >= 48 ? `${(recup/24).toFixed(1)}j` : `${Math.round(recup)}h`)
        : '';
      return `
        <div class="fat-row">
          <div class="fat-name">${MUSCLE_LABELS[id] || id}</div>
          <div class="fat-bar"><div class="fat-bar-fill" style="width:${barW.toFixed(1)}%;background:${color}"></div></div>
          <div class="fat-val" style="color:${color}">${Math.round(val)}</div>
          <div class="fat-lbl" style="color:${color}">${label}</div>
          <div class="fat-recup">${recupStr}</div>
        </div>`;
    }).join('');

    groupsHtml += `
      <div class="fat-group">
        <div class="fat-group-hdr">
          <span class="lbl">${groupName}</span>
        </div>
        <div class="fat-rows">${rows}</div>
      </div>`;
  }

  el.innerHTML = `
    <div class="fat-topbar">
      <span class="lbl">État musculaire</span>
      <div style="display:flex;align-items:center;gap:12px">
        <span class="fat-updated">Mise à jour ${timeStr}</span>
        <button class="btn-fat-reset" id="btn-fat-reset">Réinitialiser</button>
      </div>
    </div>
    <div class="bm-wrap">
      <div id="bm-fat-svg"></div>
      <div id="bm-fat-det" class="bm-det">
        <span class="bm-det-hint">Clique sur un muscle pour voir son état</span>
      </div>
    </div>
    <div style="font-family:var(--mono);font-size:10px;color:var(--t3);margin-bottom:14px;display:grid;grid-template-columns:1fr 90px 36px 58px 36px;gap:8px;padding:0 14px">
      <span>Muscle</span><span></span><span style="text-align:right">Pts</span><span>État</span><span style="text-align:right">Récup</span>
    </div>
    ${groupsHtml}`;

  document.getElementById('btn-fat-reset')?.addEventListener('click', () => {
    if (confirm('Réinitialiser toute la fatigue stockée ?')) {
      FATIGUE_ENGINE.reset();
      renderFatigue();
    }
  });

  // ── Carte anatomique (fatigue) ────────────────────
  if (typeof BODY_MAP !== 'undefined') {
    BODY_MAP.render('bm-fat-svg', (muscleId) => {
      const val   = FATIGUE_ENGINE.getAll()[muscleId] || 0;
      const label = MUSCLE_LABELS[muscleId] || muscleId;
      const det   = document.getElementById('bm-fat-det');
      if (!det) return;
      if (val < 5) {
        det.innerHTML = `<span class="bm-det-name">${label}</span><span class="bm-det-hint" style="margin-left:8px">Frais ✓</span>`;
      } else {
        const { label: stateLabel, color } = FATIGUE_ENGINE.classify(val);
        const recup = FATIGUE_ENGINE.getHoursToRecover(muscleId, 20);
        const recupStr = recup != null
          ? (recup >= 48 ? `${(recup/24).toFixed(1)}j` : `${Math.round(recup)}h`) : '';
        det.innerHTML = `
          <span class="bm-det-name">${label}</span>
          <span class="bm-det-state" style="color:${color}">${Math.round(val)} pts — ${stateLabel}</span>
          ${recupStr ? `<span class="bm-det-recup">Récup : ${recupStr}</span>` : ''}`;
      }
    });
    BODY_MAP.updateFatigue('bm-fat-svg', all);
  }
}

// ONBOARDING — MODULE PROFIL
// ════════════════════════════════════════════════════

const ONBOARDING = (() => {

  // Questions dans l'ordre d'affichage
  const STEPS = [
    {
      key: 'age',
      label: 'Quelle est ta tranche d\'âge ?',
      hint: 'La production hormonale influence la vitesse de récupération.',
      options: [
        { value: '18-25', label: '18 – 25 ans' },
        { value: '26-35', label: '26 – 35 ans' },
        { value: '36-45', label: '36 – 45 ans' },
        { value: '46+',   label: '46 ans et plus' },
      ]
    },
    {
      key: 'training_level',
      label: 'Depuis combien de temps t\'entraînes-tu régulièrement ?',
      hint: 'Les athlètes expérimentés produisent moins de dommages musculaires par séance.',
      options: [
        { value: 'beginner',     label: 'Débutant  · < 1 an' },
        { value: 'intermediate', label: 'Intermédiaire  · 1 – 3 ans' },
        { value: 'advanced',     label: 'Avancé  · > 3 ans' },
      ]
    },
    {
      key: 'sleep',
      label: 'Combien d\'heures dors-tu en moyenne par nuit ?',
      hint: 'Le sommeil est le levier de récupération #1 — bien devant la nutrition.',
      options: [
        { value: 'under6', label: 'Moins de 6h  ⚠' },
        { value: '6to7',   label: '6 à 7h' },
        { value: '7to8',   label: '7 à 8h' },
        { value: 'over8',  label: 'Plus de 8h' },
      ]
    },
    {
      key: 'protein',
      label: 'Comment évalues-tu ton apport en protéines ?',
      hint: 'Repère : 1.6 – 2.0 g par kg de poids de corps = apport adéquat pour la musculation.',
      options: [
        { value: 'low',      label: 'Faible  · < 1.4 g/kg' },
        { value: 'adequate', label: 'Correct  · 1.4 – 2.0 g/kg' },
        { value: 'high',     label: 'Élevé  · > 2.0 g/kg' },
      ]
    },
    {
      key: 'stress',
      label: 'Quel est ton niveau de stress chronique ?',
      hint: 'Le cortisol élevé ralentit la synthèse protéique et allonge la récupération musculaire.',
      options: [
        { value: 'low',      label: 'Faible  — vie sereine' },
        { value: 'moderate', label: 'Modéré  — stress habituel' },
        { value: 'high',     label: 'Élevé  — stress régulier' },
      ]
    },
    {
      key: 'goal',
      label: 'Quel est ton objectif dominant ?',
      hint: 'Influence la dose de fatigue par série — pas la vitesse de récupération.',
      options: [
        { value: 'strength',    label: 'Force  · 1 – 5 reps lourds' },
        { value: 'hypertrophy', label: 'Hypertrophie  · 6 – 12 reps' },
        { value: 'endurance',   label: 'Endurance musc.  · > 15 reps' },
      ]
    },
    {
      key: 'fc_max',
      type: 'input',
      label: 'Ta fréquence cardiaque maximale ?',
      hint: 'Mesurée lors d\'un effort maximal, ou estimée (220 − ton âge). Utilisée pour calibrer les zones de course.',
      placeholder: '185',
      unit: 'bpm',
      optional: true,
    },
    {
      key: 'fc_repos',
      type: 'input',
      label: 'Ta fréquence cardiaque au repos ?',
      hint: 'Mesure le matin avant de te lever, au calme. Typiquement entre 45 et 75 bpm.',
      placeholder: '55',
      unit: 'bpm',
      optional: true,
    },
  ];

  let _step = 0;
  let _answers = {};

  function _multiplierColor(m) {
    if (m <= 0.75) return '#3dffa0';
    if (m <= 0.95) return '#a8ff78';
    if (m <= 1.10) return '#ffd166';
    if (m <= 1.40) return '#ffaa3d';
    return '#ff5252';
  }

  function _multiplierLabel(m) {
    if (m <= 0.75) return 'Récupération très rapide';
    if (m <= 0.95) return 'Récupération rapide';
    if (m <= 1.10) return 'Récupération standard';
    if (m <= 1.40) return 'Récupération lente';
    return 'Récupération très lente';
  }

  function _render() {
    const card = document.getElementById('ob-card');
    if (!card) return;

    const isLastStep = _step === STEPS.length;
    const progress = isLastStep ? 100 : Math.round((_step / STEPS.length) * 100);

    if (isLastStep) {
      // Écran de résumé
      const m = typeof USER_PROFILE !== 'undefined'
        ? USER_PROFILE.calcMultiplier(_answers)
        : 1.0;
      const color = _multiplierColor(m);
      const label = _multiplierLabel(m);

      // Exemple concret : pectoral après développé couché
      const pectHL = Math.round(60 * m * 10) / 10;
      const gluteHL = Math.round(72 * m * 10) / 10;

      card.innerHTML = `
        <div class="ob-header">
          <span class="ob-logo">MuscleOS</span>
          <div class="ob-title">Profil calculé ✓</div>
          <div class="ob-sub">Voici comment l'app calibre ta récupération.</div>
        </div>

        <div class="ob-result">
          <div class="ob-result-label">Multiplicateur de récupération</div>
          <div class="ob-result-value" style="color:${color}">× ${m.toFixed(3)}</div>
          <div class="ob-result-desc">${label}</div>
        </div>

        <div style="display:flex;flex-direction:column;gap:8px">
          <div class="lbl" style="color:var(--t3)">Exemples — demi-vies effectives</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
            <div class="ob-result" style="padding:10px 12px">
              <div class="ob-result-label">Pectoral majeur</div>
              <div style="font-family:var(--mono);font-size:16px;font-weight:600;color:var(--t1)">${pectHL}h</div>
              <div class="ob-result-desc" style="font-size:11px">base : 60h</div>
            </div>
            <div class="ob-result" style="padding:10px 12px">
              <div class="ob-result-label">Grand fessier</div>
              <div style="font-family:var(--mono);font-size:16px;font-weight:600;color:var(--t1)">${gluteHL}h</div>
              <div class="ob-result-desc" style="font-size:11px">base : 72h</div>
            </div>
          </div>
        </div>

        <div class="ob-nav">
          <div class="ob-progress"><div class="ob-progress-fill" style="width:100%"></div></div>
          <button class="ob-btn-next" id="ob-finish">C'est parti →</button>
        </div>`;

      document.getElementById('ob-finish')?.addEventListener('click', _finish);
      return;
    }

    const step = STEPS[_step];
    const selected = _answers[step.key];

    // ── Étape avec champ numérique (FC max / FC repos) ──
    if (step.type === 'input') {
      card.innerHTML = `
        <div class="ob-header">
          <span class="ob-logo">MuscleOS · Profil de récupération</span>
          <div class="ob-title">${step.label}</div>
          ${step.hint ? `<div class="ob-sub">${step.hint}</div>` : ''}
          ${step.optional ? `<div class="ob-sub" style="color:var(--t3);font-size:11px;margin-top:4px">Optionnel — tu pourras modifier ça dans Profil à tout moment.</div>` : ''}
        </div>
        <div class="ob-step">
          <div style="display:flex;align-items:center;gap:10px">
            <input class="fi" id="ob-input-val" type="number"
              placeholder="${step.placeholder || ''}"
              value="${selected || ''}"
              min="30" max="250"
              style="width:120px;font-size:22px;font-family:var(--mono);text-align:center">
            <span style="color:var(--t3);font-family:var(--mono)">${step.unit || ''}</span>
          </div>
        </div>
        <div class="ob-nav">
          <button class="ob-btn-prev" id="ob-prev">‹ Retour</button>
          <div class="ob-progress">
            <div class="ob-progress-fill" style="width:${progress}%"></div>
          </div>
          <button class="ob-btn-next" id="ob-next">
            ${_step === STEPS.length - 1 ? 'Voir mon profil' : 'Suivant →'}
          </button>
        </div>`;

      document.getElementById('ob-input-val')?.addEventListener('input', e => {
        const v = parseInt(e.target.value);
        if (v > 0) _answers[step.key] = v;
        else delete _answers[step.key];
      });
      document.getElementById('ob-prev')?.addEventListener('click', () => { _step--; _render(); });
      document.getElementById('ob-next')?.addEventListener('click', () => { _step++; _render(); });
      return;
    }

    // ── Étape standard (choix multiple) ──

    card.innerHTML = `
      <div class="ob-header">
        <span class="ob-logo">MuscleOS · Profil de récupération</span>
        <div class="ob-title">${step.label}</div>
        ${step.hint ? `<div class="ob-sub">${step.hint}</div>` : ''}
      </div>

      <div class="ob-step">
        <div class="ob-options">
          ${step.options.map(o => `
            <button class="ob-opt${selected === o.value ? ' selected' : ''}" data-val="${o.value}">
              ${o.label}
            </button>`).join('')}
        </div>
      </div>

      <div class="ob-nav">
        ${_step > 0
          ? `<button class="ob-btn-prev" id="ob-prev">‹ Retour</button>`
          : `<div></div>`}
        <div class="ob-progress">
          <div class="ob-progress-fill" style="width:${progress}%"></div>
        </div>
        <button class="ob-btn-next" id="ob-next" ${!selected ? 'disabled' : ''}>
          ${_step === STEPS.length - 1 ? 'Voir mon profil' : 'Suivant →'}
        </button>
      </div>`;

    // Events options
    card.querySelectorAll('.ob-opt').forEach(btn => {
      btn.addEventListener('click', () => {
        _answers[step.key] = btn.dataset.val;
        _render();
      });
    });

    document.getElementById('ob-prev')?.addEventListener('click', () => { _step--; _render(); });
    document.getElementById('ob-next')?.addEventListener('click', () => {
      if (!_answers[step.key]) return;
      _step++;
      _render();
    });
  }

  function _finish() {
    if (typeof USER_PROFILE === 'undefined') { _hide(); return; }
    const profile = USER_PROFILE.load();
    Object.assign(profile, _answers);
    USER_PROFILE.save(profile);
    USER_PROFILE.completeOnboarding();
    _hide();
    // Reconstruire la fatigue avec le nouveau profil
    rebuildFatigue();
    if (typeof renderFatigue === 'function' && S.tab === 'fatigue') renderFatigue();
  }

  function open(isEdit = false) {
    if (typeof USER_PROFILE !== 'undefined') {
      const p = USER_PROFILE.load();
      _answers = {
        age: p.age,
        training_level: p.training_level,
        sleep: p.sleep,
        protein: p.protein,
        stress: p.stress,
        goal: p.goal,
        fc_max: p.fc_max || null,
        fc_repos: p.fc_repos || null,
      };
    } else {
      _answers = {};
    }
    _step = 0;
    _render();
    const el = document.getElementById('onboarding-overlay');
    if (el) { el.classList.add('visible'); }
  }

  function _hide() {
    const el = document.getElementById('onboarding-overlay');
    if (el) el.classList.remove('visible');
  }

  function checkOnboarding() {
    if (typeof USER_PROFILE !== 'undefined' && USER_PROFILE.needsOnboarding()) {
      // Petit délai pour laisser l'app se rendre
      setTimeout(() => open(false), 400);
    }
  }

  return { open, checkOnboarding };
})();

// NB — MODULE IA (à implémenter en v4+)
// ════════════════════════════════════════════════════
//
// Option retenue : LLM local dans le navigateur via WebLLM
// (https://github.com/mlc-ai/web-llm)
//
// Principe : le modèle (Phi-3 Mini ~2.4 GB ou Llama 3.2 3B ~2 GB)
// est téléchargé une seule fois dans le cache du navigateur,
// puis tourne entièrement en local via WebGPU — sans API externe,
// sans clé, sans coût, offline après le premier chargement.
//
// Intégration prévue :
//   1. Ajouter <script src="https://esm.run/@mlc-ai/web-llm"><\/script>
//   2. Créer un onglet "IA" avec sélecteur de modèle + barre de téléchargement
//   3. Construire le prompt avec FATIGUE_ENGINE.getAll() + historique 7j
//   4. Streamer la réponse dans l'UI
//
// Prérequis utilisateur : Chrome 113+ ou Edge 113+ (WebGPU requis)
// ════════════════════════════════════════════════════

// ════════════════════════════════════════════════════
// DATA_BACKUP — Export / Import localStorage
// ════════════════════════════════════════════════════
const DATA_BACKUP = (() => {
  'use strict';

  const KEYS = [
    'muscleos_v2_sessions',
    'muscleos_v2_fatigue',
    'muscleos_v2_profile',
    'muscleos_prs'
  ];

  function exportData() {
    const snapshot = { version: '3.6', exportedAt: new Date().toISOString(), data: {} };
    KEYS.forEach(k => {
      const val = localStorage.getItem(k);
      if (val !== null) snapshot.data[k] = JSON.parse(val);
    });

    const blob = new Blob([JSON.stringify(snapshot, null, 2)], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const date = new Date().toISOString().slice(0, 10);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `muscleos-backup-${date}.json`;
    a.click();
    URL.revokeObjectURL(url);

    showToast('✅ Sauvegarde exportée');
  }

  function importData(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const snapshot = JSON.parse(e.target.result);
        if (!snapshot.data) throw new Error('Format invalide');

        const keysFound = Object.keys(snapshot.data).filter(k => KEYS.includes(k));
        if (keysFound.length === 0) throw new Error('Aucune donnée reconnue');

        const ok = confirm(
          `Importer cette sauvegarde du ${snapshot.exportedAt ? snapshot.exportedAt.slice(0,10) : '?'} ?\n\n` +
          `Clés trouvées : ${keysFound.join(', ')}\n\n` +
          `⚠ Tes données actuelles seront remplacées.`
        );
        if (!ok) return;

        keysFound.forEach(k => localStorage.setItem(k, JSON.stringify(snapshot.data[k])));

        showToast('✅ Import réussi — rechargement…');
        setTimeout(() => location.reload(), 1200);
      } catch (err) {
        showToast('❌ Erreur : ' + err.message);
      }
    };
    reader.readAsText(file);
  }

  return { exportData, importData };
})();

// ════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════
function init() {
  document.getElementById('hdr-date').textContent = fmtDateLong(DB.todayId());
  S.today = DB.getToday();
  rebuildFatigue();
  PR_ENGINE.rebuild();
  renderToday();

  document.querySelectorAll('.tab-btn').forEach(btn =>
    btn.addEventListener('click', () => switchTab(btn.dataset.tab)));

  document.getElementById('btn-dc').addEventListener('click', closeDrawer);
  document.getElementById('overlay').addEventListener('click', closeDrawer);

  // Bouton profil → ouvre l'onboarding en mode édition
  document.getElementById('btn-profile')?.addEventListener('click', () => ONBOARDING.open(true));

  // Export / Import sauvegarde
  document.getElementById('btn-export').addEventListener('click', () => DATA_BACKUP.exportData());
  document.getElementById('btn-import').addEventListener('click', () =>
    document.getElementById('import-file-input').click());
  document.getElementById('import-file-input').addEventListener('change', e =>
    DATA_BACKUP.importData(e.target.files[0]));

  // Onboarding au premier lancement
  ONBOARDING.checkOnboarding();

}

init();
