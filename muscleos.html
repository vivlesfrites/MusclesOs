// État local de l'onglet progression
const PROG = {
  cat: null,      // catégorie sélectionnée
  exId: null,     // exercice sélectionné
  varId: null,    // variante sélectionnée
  openSel: null,  // quel sélecteur est ouvert : 'cat' | 'ex' | 'var' | null
  muscle: null,   // muscle sélectionné sur la carte anatomique
};

function renderProgress() {
  const el = document.getElementById('tab-progress');
  if (!el) return;

  // ── Données historique pour l'exercice sélectionné ──
  function getHistory(cat, exId, varId) {
    // Retourne array de { date, sets, maxW, max1RM, totalVol } par séance
    const sessions = DB.load();
    const result = [];
    for (const s of sessions) {
      const entries = s.entries.filter(e =>
        e.type !== 'activity' &&
        e.category === cat && e.exerciseId === exId && e.variantId === varId &&
        e.sets.length > 0
      );
      if (!entries.length) continue;
      const allSets = entries.flatMap(e => e.sets);
      const maxW = Math.max(...allSets.map(x => x.weight || 0));
      const max1RM = Math.max(...allSets.map(x => {
        const w = x.weight || 0; const r = x.reps || 0;
        if (!w || !r) return 0;
        return r === 1 ? w : w * (1 + r / 30);
      }));
      const totalVol = allSets.reduce((s, x) => s + (x.weight||0)*(x.reps||0), 0);
      const totalSets = allSets.length;
      result.push({ date: s.id, maxW, max1RM: Math.round(max1RM * 10)/10, totalVol, totalSets });
    }
    return result.sort((a, b) => a.date.localeCompare(b.date));
  }

  function trend(history, field) {
    if (history.length < 2) return null;
    const recent = history.slice(-1)[0][field];
    const older  = history.slice(-Math.min(history.length, 6), -1);
    const avg    = older.reduce((s, x) => s + x[field], 0) / older.length;
    if (avg === 0) return null;
    const pct = ((recent - avg) / avg * 100);
    return { pct: Math.round(pct), dir: pct > 1 ? 'up' : pct < -1 ? 'down' : 'flat' };
  }

  // ── Sélecteur ────────────────────────────────────
  const { cat, exId, varId, openSel } = PROG;

  const catLabel  = cat   ? CATALOG[cat]?.label : null;
  const exLabel_  = (cat && exId) ? exLabel(cat, exId) : null;
  const varLabel_ = (cat && exId && varId) ? varLabel(cat, exId, varId) : null;

  // Options dropdown selon quel sélecteur est ouvert
  let ddHtml = '';
  if (openSel === 'cat') {
    ddHtml = `<div class="prog-dropdown">` +
      Object.entries(CATALOG).map(([k, v]) =>
        `<div class="prog-dd-item${cat===k?' active':''}" data-dd-cat="${k}">${v.icon} ${v.label}</div>`
      ).join('') + `</div>`;
  } else if (openSel === 'ex' && cat) {
    ddHtml = `<div class="prog-dropdown">` +
      Object.entries(CATALOG[cat].exercises).map(([k, v]) =>
        `<div class="prog-dd-item${exId===k?' active':''}" data-dd-ex="${k}">${v.label}</div>`
      ).join('') + `</div>`;
  } else if (openSel === 'var' && cat && exId) {
    ddHtml = `<div class="prog-dropdown">` +
      Object.entries(CATALOG[cat].exercises[exId].variants).map(([k, v]) =>
        `<div class="prog-dd-item${varId===k?' active':''}" data-dd-var="${k}">${typeof v === 'object' ? v.label : v}</div>`
      ).join('') + `</div>`;
  }

  // Insère le dropdown après la ligne ouverte
  const selRows = [
    { key: 'cat', label: 'Catégorie', value: catLabel,  locked: false },
    { key: 'ex',  label: 'Exercice',  value: exLabel_,  locked: !cat },
    { key: 'var', label: 'Variante',  value: varLabel_,  locked: !exId },
  ].map(row => {
    const rowHtml = `
      <div class="prog-sel-row${row.locked?' locked':''}" data-sel="${row.key}">
        <span class="prog-sel-label">${row.label}</span>
        <span class="prog-sel-value">${row.value || '—'}</span>
        <span class="prog-sel-arr">${openSel === row.key ? '▴' : '▾'}</span>
      </div>`;
    return openSel === row.key ? rowHtml + ddHtml : rowHtml;
  }).join('');

  // ── Corps de l'onglet ─────────────────────────────
  let bodyHtml = '';

  if (!cat || !exId || !varId) {
    bodyHtml = `<div class="prog-empty">
      ◌<br>Sélectionne un exercice<em>et sa variante pour voir ta progression</em>
    </div>`;
  } else {
    const history = getHistory(cat, exId, varId);

    if (history.length === 0) {
      bodyHtml = `<div class="prog-empty">
        Aucune donnée<em>Enregistre des séances de ${exLabel_} pour voir ta progression</em>
      </div>`;
    } else {
      // PRs actuels
      const prData = PR_ENGINE.load()[`${cat}::${exId}::${varId}`] || {};
      const allMax1RM  = prData.max1RM   || 0;
      const allMaxW    = prData.maxWeight || 0;
      const allMaxReps = prData.maxReps   || 0;
      const isBW       = allMaxW === 0;

      // Trend sur 1RM ou charge
      const trendData = trend(history, isBW ? 'totalVol' : 'max1RM');
      const trendHtml = trendData
        ? `<div class="prog-trend ${trendData.dir}">${trendData.dir==='up'?'▲':trendData.dir==='down'?'▼':'—'} ${Math.abs(trendData.pct)}%</div>`
        : '';

      // Bloc PRs
      const prGrid = isBW
        ? `<div class="prog-pr-grid">
            <div class="prog-pr-card">
              <div class="prog-pr-val">${allMaxReps}</div>
              <div class="prog-pr-unit">reps</div>
              <div class="prog-pr-lbl">Record</div>
            </div>
            <div class="prog-pr-card">
              <div class="prog-pr-val">${history.length}</div>
              <div class="prog-pr-unit">séances</div>
              <div class="prog-pr-lbl">Total</div>
              ${trendHtml}
            </div>
            <div class="prog-pr-card">
              <div class="prog-pr-val">${history[history.length-1].totalSets}</div>
              <div class="prog-pr-unit">séries</div>
              <div class="prog-pr-lbl">Dernière séance</div>
            </div>
          </div>`
        : `<div class="prog-pr-grid">
            <div class="prog-pr-card">
              <div class="prog-pr-val">${allMaxW}</div>
              <div class="prog-pr-unit">kg</div>
              <div class="prog-pr-lbl">Charge max</div>
            </div>
            <div class="prog-pr-card">
              <div class="prog-pr-val">${allMax1RM > 0 ? allMax1RM.toFixed(1) : '—'}</div>
              <div class="prog-pr-unit">kg e1RM</div>
              <div class="prog-pr-lbl">1RM estimé</div>
              ${trendHtml}
            </div>
            <div class="prog-pr-card">
              <div class="prog-pr-val">${history.length}</div>
              <div class="prog-pr-unit">séances</div>
              <div class="prog-pr-lbl">Total</div>
            </div>
          </div>`;

      // Canvas ID unique pour éviter les conflits
      const canvasId = 'prog-canvas-' + cat + '-' + exId;

      // Tableau des séances
      const maxW_overall = Math.max(...history.map(x => x.max1RM || x.maxW || x.totalVol || 1));
      const sessRows = [...history].reverse().slice(0, 20).map(s => {
        const isPR = (!isBW && (s.maxW === allMaxW || Math.abs(s.max1RM - allMax1RM) < 0.01)) ||
                     (isBW && s.totalVol > 0);
        return `<div class="prog-sess-row${isPR?' is-pr':''}">
          <span class="prog-sess-date">${fmtDateShort(s.date).split(' ').slice(0,3).join(' ')}</span>
          <span class="prog-sess-sets">${s.totalSets} série${s.totalSets!==1?'s':''}</span>
          <span class="prog-sess-w">${isBW ? s.totalVol+' kg·vol' : s.maxW+' kg'}</span>
          <span class="prog-sess-1rm">${isBW ? '' : 'e1RM '+s.max1RM.toFixed(1)}</span>
        </div>`;
      }).join('');

      bodyHtml = `
        ${prGrid}
        <div class="prog-chart-wrap">
          <div class="prog-chart-title">${isBW ? 'Volume total' : '1RM estimé (Epley)'} — ${history.length} séance${history.length!==1?'s':''}</div>
          <canvas class="prog-canvas" id="${canvasId}" height="160"></canvas>
        </div>
        <div class="prog-sessions">
          <div class="prog-sess-hdr">
            <span class="lbl">Dernières séances</span>
          </div>
          ${sessRows}
        </div>`;
    }
  }

  el.innerHTML = `
    <div class="bm-wrap">
      <div id="bm-prog-svg"></div>
    </div>
    <div class="prog-selector">${selRows}</div>
    ${bodyHtml}`;

  // ── Événements sélecteur ─────────────────────────
  el.querySelectorAll('.prog-sel-row:not(.locked)').forEach(row => {
    row.addEventListener('click', () => {
      const key = row.dataset.sel;
      PROG.openSel = PROG.openSel === key ? null : key;
      renderProgress();
    });
  });

  el.querySelectorAll('.prog-dd-item').forEach(item => {
    if (item.dataset.ddCat !== undefined) {
      item.addEventListener('click', () => {
        PROG.cat = item.dataset.ddCat;
        PROG.exId = null; PROG.varId = null; PROG.openSel = null;
        renderProgress();
      });
    } else if (item.dataset.ddEx !== undefined) {
      item.addEventListener('click', () => {
        PROG.exId = item.dataset.ddEx;
        PROG.varId = null; PROG.openSel = null;
        renderProgress();
      });
    } else if (item.dataset.ddVar !== undefined) {
      item.addEventListener('click', () => {
        PROG.varId = item.dataset.ddVar;
        PROG.openSel = null;
        renderProgress();
        // Ouvre directement le graphe
      });
    }
  });

  // ── Carte anatomique (navigation par muscle) ──────
  if (typeof BODY_MAP !== 'undefined') {
    const exercisedCats = new Set(
      DB.load().flatMap(s => s.entries.map(e => e.category).filter(Boolean))
    );
    BODY_MAP.render('bm-prog-svg', (muscleId, category) => {
      PROG.muscle = muscleId;
      if (category && PROG.cat !== category) {
        PROG.cat = category; PROG.exId = null; PROG.varId = null; PROG.openSel = null;
      }
      renderProgress();
    });
    BODY_MAP.updateProgression('bm-prog-svg', exercisedCats);
    if (PROG.muscle) BODY_MAP.highlight('bm-prog-svg', PROG.muscle);
  }

  // ── Canvas graphe ─────────────────────────────────
  if (!cat || !exId || !varId) return;
  const history = getHistory(cat, exId, varId);
  if (history.length === 0) return;
  const isBW = (PR_ENGINE.load()[`${cat}::${exId}::${varId}`]?.maxWeight || 0) === 0;

  const canvasId2 = 'prog-canvas-' + cat + '-' + exId;
  const canvas = document.getElementById(canvasId2);
  if (!canvas) return;

  // Resize canvas au pixel près
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width  = rect.width  * dpr;
  canvas.height = rect.height * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const W = rect.width;
  const H = rect.height;
  const PAD = { top: 10, right: 10, bottom: 28, left: 42 };
  const gW = W - PAD.left - PAD.right;
  const gH = H - PAD.top  - PAD.bottom;

  const vals  = history.map(x => isBW ? x.totalVol : x.max1RM);
  const minV  = Math.min(...vals);
  const maxV  = Math.max(...vals);
  const range = maxV - minV || 1;

  function xPos(i) { return PAD.left + (i / Math.max(history.length - 1, 1)) * gW; }
  function yPos(v) { return PAD.top + gH - ((v - minV) / range) * gH; }

  // Grille horizontale
  ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--b1').trim() || '#222a37';
  ctx.lineWidth = 1;
  const steps = 3;
  for (let i = 0; i <= steps; i++) {
    const y = PAD.top + (i / steps) * gH;
    ctx.beginPath(); ctx.moveTo(PAD.left, y); ctx.lineTo(PAD.left + gW, y); ctx.stroke();
    const v = maxV - (i / steps) * range;
    ctx.fillStyle = '#48556a';
    ctx.font = '9px IBM Plex Mono, monospace';
    ctx.textAlign = 'right';
    ctx.fillText(Math.round(v), PAD.left - 4, y + 3);
  }

  // Aire sous la courbe
  const grad = ctx.createLinearGradient(0, PAD.top, 0, PAD.top + gH);
  grad.addColorStop(0,   'rgba(61,255,160,.22)');
  grad.addColorStop(1,   'rgba(61,255,160,.02)');
  ctx.beginPath();
  ctx.moveTo(xPos(0), PAD.top + gH);
  history.forEach((_, i) => ctx.lineTo(xPos(i), yPos(vals[i])));
  ctx.lineTo(xPos(history.length - 1), PAD.top + gH);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Ligne
  ctx.beginPath();
  ctx.strokeStyle = '#3dffa0';
  ctx.lineWidth = 1.5;
  ctx.lineJoin = 'round';
  history.forEach((_, i) => i === 0 ? ctx.moveTo(xPos(i), yPos(vals[i])) : ctx.lineTo(xPos(i), yPos(vals[i])));
  ctx.stroke();

  // Points + dates
  const prVal = isBW
    ? Math.max(...vals)
    : (PR_ENGINE.load()[`${cat}::${exId}::${varId}`]?.max1RM || 0);

  history.forEach((d, i) => {
    const x = xPos(i); const y = yPos(vals[i]);
    const isPR = Math.abs(vals[i] - prVal) < 0.01;
    ctx.beginPath();
    ctx.arc(x, y, isPR ? 4 : 3, 0, Math.PI * 2);
    ctx.fillStyle = isPR ? '#3dffa0' : '#1a5c40';
    ctx.fill();
    if (isPR) {
      ctx.strokeStyle = '#3dffa0'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(x, y, 6, 0, Math.PI * 2); ctx.stroke();
    }
    // Label date (toutes les N séances selon densité)
    const every = history.length <= 6 ? 1 : history.length <= 12 ? 2 : Math.ceil(history.length / 6);
    if (i % every === 0 || i === history.length - 1) {
      ctx.fillStyle = '#48556a';
      ctx.font = '8px IBM Plex Mono, monospace';
      ctx.textAlign = 'center';
      const parts = d.date.split('-');
      ctx.fillText(`${parts[2]}/${parts[1]}`, x, H - PAD.bottom + 14);
    }
  });
}

// État local de l'onglet Tendances
const TRENDS = {
  period: 90,   // fenêtre en jours : 30 | 90 | 0 (= tout l'historique)
};

/**
 * Série temporelle d'une métrique (energy | sleep | bodyweight),
 * triée ASC par date, valeurs nulles/non finies écartées.
 * @returns [{ date:'YYYY-MM-DD', t:Number(ms), v:Number }]
 */
function getMetricSeries(field) {
  return DB.load()
    .filter(s => s.metrics && s.metrics[field] != null)
    .map(s => ({ date: s.id, t: new Date(s.id).getTime(), v: s.metrics[field] }))
    .filter(p => Number.isFinite(p.v) && Number.isFinite(p.t))
    .sort((a, b) => a.t - b.t);
}

/** Filtre une série sur les N derniers jours (0 = tout). */
function filterPeriod(series, days) {
  if (!days) return series;
  const cutoff = Date.now() - days * 86400000;
  return series.filter(p => p.t >= cutoff);
}

/** Moyenne mobile simple trailing sur `win` points. Série alignée sur l'entrée. */
function sma(series, win) {
  return series.map((p, i) => {
    const slice = series.slice(Math.max(0, i - win + 1), i + 1);
    return { date: p.date, t: p.t, v: slice.reduce((s, x) => s + x.v, 0) / slice.length };
  });
}

/** Moyenne simple d'une série. */
function seriesAvg(series) {
  return series.length ? series.reduce((s, x) => s + x.v, 0) / series.length : null;
}

/**
 * Variation hebdomadaire calculée sur la série LISSÉE (pas le bruit quotidien).
 * Compare la moyenne mobile actuelle au point le plus proche de 7 jours avant,
 * puis normalise sur 7 jours réels.
 * @returns { abs:Number, pct:Number, dir:'up'|'down'|'flat' } | null
 */
function weeklyRate(smaSeries) {
  if (smaSeries.length < 8) return null;
  const last = smaSeries[smaSeries.length - 1];
  const target = last.t - 7 * 86400000;
  let ref = smaSeries[0];
  for (const p of smaSeries) {
    if (Math.abs(p.t - target) < Math.abs(ref.t - target)) ref = p;
  }
  if (ref === last || ref.v === 0) return null;
  const daysElapsed = (last.t - ref.t) / 86400000;
  if (daysElapsed < 3 || daysElapsed > 21) return null;   // données trop éparses → non fiable
  const abs = (last.v - ref.v) / daysElapsed * 7;
  const pct = (abs / ref.v) * 100;
  const dir = abs > 0.05 ? 'up' : abs < -0.05 ? 'down' : 'flat';
  return { abs, pct, dir };
}

/**
 * Dessine un graphe linéaire d'une métrique dans un canvas.
 * @param canvasId   id du <canvas>
 * @param primary    série principale (ligne pleine) [{t,v}]
 * @param secondary  série brute optionnelle (points pâles) ou null
 * @param opt        { colorVar:'--accent', decimals:Number }
 */
function drawMetricChart(canvasId, primary, secondary, opt) {
  opt = opt || {};
  const canvas = document.getElementById(canvasId);
  if (!canvas || primary.length === 0) return;

  const cs = getComputedStyle(document.documentElement);
  const C = n => (cs.getPropertyValue(n) || '').trim();
  const LINE  = C(opt.colorVar || '--accent') || '#3dffa0';
  const GRID  = C('--b1') || '#222a37';
  const MUTED = C('--t3') || '#48556a';

  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width  = rect.width  * dpr;
  canvas.height = rect.height * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const W = rect.width, H = rect.height;
  const PAD = { top: 10, right: 8, bottom: 22, left: 38 };
  const gW = W - PAD.left - PAD.right;
  const gH = H - PAD.top - PAD.bottom;

  // Bornes Y sur l'union des deux séries
  const all = secondary ? primary.concat(secondary) : primary;
  let minV = Math.min(...all.map(p => p.v));
  let maxV = Math.max(...all.map(p => p.v));
  if (minV === maxV) { minV -= 1; maxV += 1; }
  const padV = (maxV - minV) * 0.12;
  minV -= padV; maxV += padV;
  const range = maxV - minV || 1;

  // Bornes X temporelles
  const tMin = all.reduce((m, p) => Math.min(m, p.t), Infinity);
  const tMax = all.reduce((m, p) => Math.max(m, p.t), -Infinity);
  const tRange = (tMax - tMin) || 1;
  const xPos = t => PAD.left + ((t - tMin) / tRange) * gW;
  const yPos = v => PAD.top + gH - ((v - minV) / range) * gH;

  // Grille + labels Y
  ctx.strokeStyle = GRID; ctx.lineWidth = 1;
  ctx.font = '9px IBM Plex Mono, monospace';
  const steps = 3;
  for (let i = 0; i <= steps; i++) {
    const y = PAD.top + (i / steps) * gH;
    ctx.beginPath(); ctx.moveTo(PAD.left, y); ctx.lineTo(PAD.left + gW, y); ctx.stroke();
    const v = maxV - (i / steps) * range;
    ctx.fillStyle = MUTED; ctx.textAlign = 'right';
    ctx.fillText(opt.decimals != null ? v.toFixed(opt.decimals) : Math.round(v), PAD.left - 4, y + 3);
  }

  // Série brute (points pâles)
  if (secondary) {
    ctx.fillStyle = MUTED; ctx.globalAlpha = 0.5;
    secondary.forEach(p => { ctx.beginPath(); ctx.arc(xPos(p.t), yPos(p.v), 1.6, 0, Math.PI*2); ctx.fill(); });
    ctx.globalAlpha = 1;
  }

  // Aire sous la ligne principale
  ctx.globalAlpha = 0.12; ctx.fillStyle = LINE;
  ctx.beginPath();
  ctx.moveTo(xPos(primary[0].t), PAD.top + gH);
  primary.forEach(p => ctx.lineTo(xPos(p.t), yPos(p.v)));
  ctx.lineTo(xPos(primary[primary.length-1].t), PAD.top + gH);
  ctx.closePath(); ctx.fill();
  ctx.globalAlpha = 1;

  // Ligne principale
  ctx.beginPath();
  ctx.strokeStyle = LINE; ctx.lineWidth = 1.8; ctx.lineJoin = 'round'; ctx.lineCap = 'round';
  primary.forEach((p, i) => i === 0 ? ctx.moveTo(xPos(p.t), yPos(p.v)) : ctx.lineTo(xPos(p.t), yPos(p.v)));
  ctx.stroke();

  // Point final
  const lp = primary[primary.length-1];
  ctx.beginPath(); ctx.arc(xPos(lp.t), yPos(lp.v), 3.2, 0, Math.PI*2);
  ctx.fillStyle = LINE; ctx.fill();

  // Labels X (début, milieu, fin)
  const fmt = t => { const d = new Date(t); return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`; };
  ctx.fillStyle = MUTED; ctx.font = '8px IBM Plex Mono, monospace';
  [tMin, tMin + tRange/2, tMax].forEach((t, i) => {
    ctx.textAlign = i === 0 ? 'left' : i === 2 ? 'right' : 'center';
    ctx.fillText(fmt(t), Math.min(Math.max(xPos(t), PAD.left), W - PAD.right), H - 6);
  });
}

/** Enveloppe une carte de tendance : titre + pastille couleur. */
function trendCardShell(title, colorVar, inner) {
  return `<div class="trend-card">
    <div class="trend-hdr">
      <div class="trend-title"><span class="trend-dot" style="background:var(${colorVar})"></span>${title}</div>
    </div>
    ${inner}
  </div>`;
}

// ════════════════════════════════════════════════════
// FORME DU JOUR — SCORE DE READINESS
//
// Principe : comparer la journée à la propre ligne de base
// de l'utilisateur (z-score vs moyenne glissante 28 j), pas à
// un standard absolu. Les mesures subjectives (énergie, sommeil)
// suivent la charge avec plus de sensibilité que l'objectif
// (Saw, Main & Gastin 2016, BJSM, 10.1136/bjsports-2015-094758).
//
// Seuils sourcés :
//   SWC_Z  = 0.3  → "changement significatif" ≈ 0.2–0.3 × SD
//                   (Hopkins ; défaut Buchheit / AthleteMonitoring).
//   FLAG_Z = 1.5  → signalement au-delà de ±1.5 SD vs base 28 j
//                   (pratique standard du monitoring wellness).
//   WINDOW = 28 j → fenêtre de référence individuelle standard.
//   MIN    = 7    → minimum de relevés avant d'afficher un score.
//
// Pondération énergie/sommeil = égale par défaut (aucune hiérarchie
// inventée). Énergie est, prise isolément, l'item subjectif le mieux
// validé ; les poids restent ajustables ci-dessous.
// ════════════════════════════════════════════════════
const READINESS = {
  WINDOW_DAYS: 28,
  MIN_SAMPLES: 7,
  SWC_Z: 0.3,
  FLAG_Z: 1.5,
  W_ENERGY: 1,
  W_SLEEP: 1,
};

/**
 * Ligne de base individuelle d'une métrique : moyenne + écart-type
 * (échantillon, n−1) sur la fenêtre glissante, en EXCLUANT le jour courant.
 * @returns { n, mean:Number|null, sd:Number|null }
 */
function metricBaseline(field) {
  const today = DB.todayId();
  let series = getMetricSeries(field).filter(p => p.date !== today);
  series = filterPeriod(series, READINESS.WINDOW_DAYS);
  const n = series.length;
  if (n < READINESS.MIN_SAMPLES) return { n, mean: null, sd: null };
  const mean = series.reduce((s, x) => s + x.v, 0) / n;
  const variance = series.reduce((s, x) => s + (x.v - mean) ** 2, 0) / (n - 1);
  return { n, mean, sd: Math.sqrt(variance) };
}

/** Classe un z-score (où "plus haut = mieux") en bande. */
function bandFromZ(z) {
  if (z >= READINESS.SWC_Z) return 'high';
  if (z > -READINESS.SWC_Z)  return 'normal';
  if (z >= -READINESS.FLAG_Z) return 'low';
  return 'flag';
}

/**
 * z-score du jour d'une métrique vs sa ligne de base + classification.
 * @returns { status:'ok'|'building'|'nodata', z, band, n, mean, sd, val }
 */
function metricZ(field, todayVal) {
  const { n, mean, sd } = metricBaseline(field);
  if (mean == null) return { status: 'building', n };
  if (todayVal == null) return { status: 'nodata', n, mean, sd };
  if (!sd || sd < 1e-9) {
    const band = todayVal > mean ? 'high' : todayVal < mean ? 'low' : 'normal';
    return { status: 'ok', z: 0, band, n, mean, sd, val: todayVal };
  }
  const z = (todayVal - mean) / sd;
  return { status: 'ok', z, band: bandFromZ(z), n, mean, sd, val: todayVal };
}

/**
 * Score de forme composite du jour = moyenne pondérée des z-scores
 * des composantes disponibles (énergie, sommeil).
 * @returns { status:'ok'|'building'|'nodata', z, band, comps:[...] }
 */
function computeReadiness() {
  const m = (DB.getToday().metrics) || {};
  const defs = [
    { key: 'energy', val: m.energy, w: READINESS.W_ENERGY },
    { key: 'sleep',  val: m.sleep,  w: READINESS.W_SLEEP },
  ];
  const comps = [];
  for (const d of defs) {
    const r = metricZ(d.key, d.val != null ? d.val : null);
    if (r.status === 'ok') comps.push({ key: d.key, w: d.w, ...r });
  }
  if (!comps.length) {
    const building = metricZ('energy', null).status === 'building'
                  || metricZ('sleep', null).status === 'building';
    return { status: building ? 'building' : 'nodata', comps: [] };
  }
  const sw = comps.reduce((s, c) => s + c.w, 0);
  const zMean = comps.reduce((s, c) => s + c.w * c.z, 0) / sw;
  return { status: 'ok', z: zMean, band: bandFromZ(zMean), comps };
}

/** Carte « Forme du jour » (retourne du HTML, à insérer en tête de Tendances). */
function renderReadinessCard() {
  const r = computeReadiness();

  if (r.status === 'building') {
    const best = Math.max(metricBaseline('energy').n, metricBaseline('sleep').n);
    return trendCardShell('Forme du jour', '--accent',
      `<div class="rd-building">Construction de ta ligne de base personnelle…<br>
        <span style="font-family:var(--mono);font-size:11px">${best}/${READINESS.MIN_SAMPLES} jours de relevés</span><br>
        <span style="font-size:11px">Le score compare ta journée à ta propre norme sur ${READINESS.WINDOW_DAYS} jours. Il apparaît dès ${READINESS.MIN_SAMPLES} relevés d'énergie ou de sommeil.</span></div>`);
  }
  if (r.status === 'nodata') {
    return trendCardShell('Forme du jour', '--accent',
      `<div class="rd-building">Renseigne ton énergie et ton sommeil du jour dans l'onglet Aujourd'hui pour calculer ta forme.</div>`);
  }

  const BAND = {
    high:   { cls: 'rd-high',   bg: 'rd-high-bg',   label: 'Au-dessus de ta norme',   msg: 'Tu es au-dessus de ta forme habituelle. Bon moment pour une séance exigeante.' },
    normal: { cls: 'rd-normal', bg: 'rd-normal-bg', label: 'Dans ta norme',           msg: 'Journée dans ta zone habituelle. Rien à signaler.' },
    low:    { cls: 'rd-low',    bg: 'rd-low-bg',    label: 'Sous ta norme',           msg: 'Tu es sous ta forme habituelle. Séance possible, mais surveille la récupération et l\'intensité.' },
    flag:   { cls: 'rd-flag',   bg: 'rd-flag-bg',   label: 'Nettement sous ta norme', msg: 'Forme nettement en dessous de ta norme. Envisage d\'alléger le volume ou de privilégier la récupération aujourd\'hui.' },
  };
  const b = BAND[r.band];

  const compRow = c => {
    const cb = BAND[c.band];
    const name = c.key === 'energy' ? 'Énergie' : 'Sommeil';
    const unit = c.key === 'energy' ? '/10' : ' h';
    const sign = c.z > 0 ? '+' : '';
    return `<div class="rd-comp">
      <div class="rd-comp-l">
        <span class="rd-pill ${cb.bg}"></span>
        <div>
          <div class="rd-comp-name">${name}</div>
          <div class="rd-comp-detail">${c.val}${unit} · ta norme ${c.mean.toFixed(1)}${unit}</div>
        </div>
      </div>
      <span class="rd-comp-dev ${cb.cls}">${sign}${c.z.toFixed(1)} σ</span>
    </div>`;
  };

  return trendCardShell('Forme du jour', '--accent', `
    <div class="rd-state">
      <span class="rd-band ${b.cls}">${b.label}</span>
      <span class="rd-z">${r.z>0?'+':''}${r.z.toFixed(1)} σ vs ta norme</span>
    </div>
    <div class="rd-msg">${b.msg}</div>
    <div class="rd-comps">${r.comps.map(compRow).join('')}</div>
    <div class="trend-note">Ta forme est mesurée comme l'écart à ta propre moyenne sur ${READINESS.WINDOW_DAYS} jours (z-score), pas à un standard absolu — c'est la méthode de monitoring validée par la littérature (Saw et al. 2016 ; pratique standard du suivi athlète). σ = écarts-types. C'est un repère, pas une consigne ; énergie et sommeil pèsent à parts égales.</div>
  `);
}

// ════════════════════════════════════════════════════
// SOMMEIL → RÉCUPÉRATION (Niveau 3)
//
// Facteur dynamique = écart du sommeil RÉCENT (3 dernières nuits)
// à la NORME individuelle (28 j), centré sur 1.0 et borné.
// Branché en lecture seule sur le moteur via setSleepRecovery().
// Magnitude = heuristique calibrée (voir annexe du brief) :
//   direction = CONSENSUS ; ampleur = MODÈLE, ajustable ici.
// ════════════════════════════════════════════════════
const SLEEP_RECOVERY = {
  RECENT_NIGHTS: 3,    // "climat" récent
  BASELINE_DAYS: 28,   // norme individuelle
  MIN_SAMPLES: 7,      // sinon facteur neutre (1.0)
  GAIN: 1.2,           // sensibilité : déviation relative → modulation de demi-vie
  MIN: 0.90,           // borne basse : récup ~10% plus rapide (upside modeste, moins documenté)
  MAX: 1.30,           // borne haute : récup ~30% plus lente (≈ ampleur des baisses MPS/métaboliques)
};

/**
 * Facteur de récupération lié au sommeil récent.
 * @returns Number dans [SLEEP_RECOVERY.MIN, SLEEP_RECOVERY.MAX] ; 1.0 si données insuffisantes.
 */
function sleepRecoveryFactor() {
  const s = getMetricSeries('sleep');                 // [{date,t,v}] trié ASC (Niveau 1)
  if (s.length < SLEEP_RECOVERY.MIN_SAMPLES) return 1.0;
  const recentArr = s.slice(-SLEEP_RECOVERY.RECENT_NIGHTS);
  const recent = recentArr.reduce((a, x) => a + x.v, 0) / recentArr.length;
  const cutoff = Date.now() - SLEEP_RECOVERY.BASELINE_DAYS * 86400000;
  const baseArr = s.slice(0, -SLEEP_RECOVERY.RECENT_NIGHTS).filter(p => p.t >= cutoff);
  if (baseArr.length < SLEEP_RECOVERY.MIN_SAMPLES) return 1.0;
  const base = baseArr.reduce((a, x) => a + x.v, 0) / baseArr.length;
  if (base <= 0) return 1.0;
  const rel = (base - recent) / base;                 // >0 = dette de sommeil récente
  const factor = 1 + SLEEP_RECOVERY.GAIN * rel;
  return Math.min(SLEEP_RECOVERY.MAX, Math.max(SLEEP_RECOVERY.MIN, factor));
}

/** Recalcule le facteur et le pousse dans le moteur (à appeler avant de lire/afficher la fatigue). */
function refreshSleepRecovery() {
  if (typeof FATIGUE_ENGINE !== 'undefined' && typeof FATIGUE_ENGINE.setSleepRecovery === 'function') {
    FATIGUE_ENGINE.setSleepRecovery(sleepRecoveryFactor());
  }
}

    slCard = trendCardShell('Sommeil', '--blue', `

        <span class="trend-hero-unit">h · moyenne</span>

      <div class="trend-stats">
        <div class="trend-stat">
          <span class="trend-stat-val">${sl[sl.length-1].v} h</span>
          <span class="trend-stat-lbl">dernière nuit</span>
        </div>
        <div class="trend-stat">
          <span class="trend-stat-val">${sl.length}</span>
          <span class="trend-stat-lbl">nuits</span>
        </div>
      </div>
      <canvas class="trend-canvas" id="trend-canvas-sl" height="150"></canvas>
    `);
  }

  el.innerHTML = `
    <div class="trend-hdr" style="margin-bottom:14px">
      <span class="lbl">Tendances</span>
      <div class="trend-period">${periodBtns}</div>
    </div>
    ${rdCard}${bwCard}${enCard}${slCard}
  `;

  el.querySelectorAll('.trend-period-btn').forEach(b =>
    b.addEventListener('click', () => { TRENDS.period = parseInt(b.dataset.period); renderTrends(); }));

  // Dessins canvas après insertion dans le DOM
  if (bw.length >= 2) drawMetricChart('trend-canvas-bw', sma(bw, 7), bw, { colorVar: '--accent', decimals: 1 });
  if (en.length >= 2) drawMetricChart('trend-canvas-en', en, null, { colorVar: '--orange', decimals: 0 });
  if (sl.length >= 2) drawMetricChart('trend-canvas-sl', sl, null, { colorVar: '--blue', decimals: 1 });

function switchTab(tab) {
  S.tab = tab;
  document.querySelectorAll('.tab-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.tab').forEach(t =>
    t.classList.toggle('active', t.id === `tab-${tab}`));
  if (tab === 'today') renderToday();
  if (tab === 'history') renderHistory();
  if (tab === 'fatigue') renderFatigue();
  if (tab === 'progress') renderProgress();
  if (tab === 'trends') renderTrends();
}

// ════════════════════════════════════════════════════
// RENDER — FATIGUE TAB
// ════════════════════════════════════════════════════
function renderFatigue() {
  const el = document.getElementById('tab-fatigue');
  if (!el) return;
  if (typeof FATIGUE_ENGINE === 'undefined' || typeof FATIGUE_DATA === 'undefined') {
    el.innerHTML = '<div style="padding:40px 16px;text-align:center;color:var(--t3);font-size:13px">Modules fatigue non chargés<br><span style="font-size:11px">Vérifier que fatigue-data.js et fatigue-engine.js sont présents</span></div>';
    return;
  }

  const all = FATIGUE_ENGINE.getAll();
  const srf = sleepRecoveryFactor();
  const srfLabel = srf >= 1.08
    ? `Sommeil récent sous ta norme — récupération ralentie ×${srf.toFixed(2)}`
    : srf <= 0.95
    ? `Sommeil récent au-dessus de ta norme — récupération accélérée ×${srf.toFixed(2)}`
    : null;
  const THRESHOLD = 5;
  const now = new Date();
  const timeStr = `${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;

  let totalActive = 0;
  const freshGroups = [];
  let groupsHtml = '';

  for (const [groupName, muscleIds] of Object.entries(MUSCLE_GROUPS)) {
    const active = muscleIds
      .map(id => ({ id, val: all[id] || 0 }))
      .filter(x => x.val >= THRESHOLD)
      .sort((a, b) => b.val - a.val);

    if (active.length === 0) { freshGroups.push(groupName); continue; }

    totalActive += active.length;
    const catKey = Object.keys(CATALOG).find(k => CATALOG[k].label === groupName) || '';
    const dotColor = catKey ? `var(--c-${catKey})` : 'var(--t3)';

    const rows = active.map(({ id, val }) => {
      const { level, label } = FATIGUE_ENGINE.classify(val);
      const barW = Math.min(100, (val / 160) * 100);
      const recup = FATIGUE_ENGINE.getHoursToRecover(id, 20);
      const recupStr = recup != null
        ? (recup >= 48 ? `${(recup/24).toFixed(1)}j` : `${Math.round(recup)}h`) : '—';
      return `
        <div class="fat-row lv-${level}">
          <div class="fat-name">${MUSCLE_LABELS[id] || id}</div>
          <div class="fat-bar"><div class="fat-bar-fill" style="width:${barW.toFixed(1)}%"></div></div>
          <div class="fat-val">${Math.round(val)}</div>
          <div class="fat-chip">${label.toUpperCase()}</div>
          <div class="fat-recup">${recupStr}</div>
        </div>`;
    }).join('');

    groupsHtml += `
      <div class="fat-group">
        <div class="fat-group-hdr">
          <span class="fat-group-dot" style="background:${dotColor}"></span>
          <span class="fat-group-name">${groupName}</span>
          <span class="fat-group-count">${active.length} muscle${active.length > 1 ? 's' : ''}</span>
        </div>
        <div class="fat-rows">${rows}</div>
      </div>`;
  }

  const freshHtml = freshGroups.length > 0 ? `
    <div class="fat-fresh">
      <span class="fat-fresh-label">✓ FRAIS</span>
      <div class="fat-fresh-chips">${freshGroups.map(g => `<span class="fat-fresh-chip">${g}</span>`).join('')}</div>
    </div>` : '';

  const summaryHtml = totalActive > 0
    ? `<span class="fat-status-n">${totalActive}</span> muscle${totalActive > 1 ? 's' : ''} actif${totalActive > 1 ? 's' : ''}`
    : `<span class="fat-status-ok">✓</span> Tous les muscles sont frais`;

  el.innerHTML = `
    <div class="fat-status">
      <span class="fat-status-info">${summaryHtml}</span>
      <div class="fat-status-right">
        <span class="fat-updated">${timeStr}</span>
        <button class="btn-fat-reset" id="btn-fat-reset">Réinitialiser</button>
      </div>
    </div>
    ${srfLabel ? `<div style="font-size:11px;color:${srf>=1.08?'var(--orange)':'var(--accent)'};
      font-family:var(--mono);padding:6px 2px 0">${srfLabel}</div>` : ''}
    ${groupsHtml ? `
    <div class="fat-col-hdr">
      <span>Muscle</span><span></span><span>Pts</span><span>État</span><span>Récup</span>
    </div>
    <div class="fat-groups">${groupsHtml}</div>` : ''}
    ${freshHtml}`;

  document.getElementById('btn-fat-reset')?.addEventListener('click', () => {
    if (confirm('Réinitialiser toute la fatigue stockée ?')) {
      FATIGUE_ENGINE.reset();
      renderFatigue();
    }
  });
}

// ONBOARDING — MODULE PROFIL
// ════════════════════════════════════════════════════

const ONBOARDING = (() => {

  // Questions dans l'ordre d'affichage
  const STEPS = [
    {
      key: 'age',
      label: 'Quelle est ta tranche d\'âge ?',
      hint: 'La production hormonale influence la vitesse de récupération.',
      options: [
        { value: '18-25', label: '18 – 25 ans' },
        { value: '26-35', label: '26 – 35 ans' },
        { value: '36-45', label: '36 – 45 ans' },
        { value: '46+',   label: '46 ans et plus' },
      ]
    },
    {
      key: 'training_level',
      label: 'Depuis combien de temps t\'entraînes-tu régulièrement ?',
      hint: 'Les athlètes expérimentés produisent moins de dommages musculaires par séance.',
      options: [
        { value: 'beginner',     label: 'Débutant  · < 1 an' },
        { value: 'intermediate', label: 'Intermédiaire  · 1 – 3 ans' },
        { value: 'advanced',     label: 'Avancé  · > 3 ans' },
      ]
    },
    {
      key: 'sleep',
      label: 'Combien d\'heures dors-tu en moyenne par nuit ?',
      hint: 'Le sommeil est le levier de récupération #1 — bien devant la nutrition.',
      options: [
        { value: 'under6', label: 'Moins de 6h  ⚠' },
        { value: '6to7',   label: '6 à 7h' },
        { value: '7to8',   label: '7 à 8h' },
        { value: 'over8',  label: 'Plus de 8h' },
      ]
    },
    {
      key: 'protein',
      label: 'Comment évalues-tu ton apport en protéines ?',
      hint: 'Repère : 1.6 – 2.0 g par kg de poids de corps = apport adéquat pour la musculation.',
      options: [
        { value: 'low',      label: 'Faible  · < 1.4 g/kg' },
        { value: 'adequate', label: 'Correct  · 1.4 – 2.0 g/kg' },
        { value: 'high',     label: 'Élevé  · > 2.0 g/kg' },
      ]
    },
    {
      key: 'stress',
      label: 'Quel est ton niveau de stress chronique ?',
      hint: 'Le cortisol élevé ralentit la synthèse protéique et allonge la récupération musculaire.',
      options: [
        { value: 'low',      label: 'Faible  — vie sereine' },
        { value: 'moderate', label: 'Modéré  — stress habituel' },
        { value: 'high',     label: 'Élevé  — stress régulier' },
      ]
    },
    {
      key: 'goal',
      label: 'Quel est ton objectif dominant ?',
      hint: 'Influence la dose de fatigue par série — pas la vitesse de récupération.',
      options: [
        { value: 'strength',    label: 'Force  · 1 – 5 reps lourds' },
        { value: 'hypertrophy', label: 'Hypertrophie  · 6 – 12 reps' },
        { value: 'endurance',   label: 'Endurance musc.  · > 15 reps' },
      ]
    },
    {
      key: 'fc_max',
      type: 'input',
      label: 'Ta fréquence cardiaque maximale ?',
      hint: 'Mesurée lors d\'un effort maximal, ou estimée (220 − ton âge). Utilisée pour calibrer les zones de course.',
      placeholder: '185',
      unit: 'bpm',
      optional: true,
    },
    {
      key: 'fc_repos',
      type: 'input',
      label: 'Ta fréquence cardiaque au repos ?',
      hint: 'Mesure le matin avant de te lever, au calme. Typiquement entre 45 et 75 bpm.',
      placeholder: '55',
      unit: 'bpm',
      optional: true,
    },
  ];

  let _step = 0;
  let _answers = {};

  function _multiplierColor(m) {
    if (m <= 0.75) return '#3dffa0';
    if (m <= 0.95) return '#a8ff78';
    if (m <= 1.10) return '#ffd166';
    if (m <= 1.40) return '#ffaa3d';
    return '#ff5252';
  }

  function _multiplierLabel(m) {
    if (m <= 0.75) return 'Récupération très rapide';
    if (m <= 0.95) return 'Récupération rapide';
    if (m <= 1.10) return 'Récupération standard';
    if (m <= 1.40) return 'Récupération lente';
    return 'Récupération très lente';
  }

  function _render() {
    const card = document.getElementById('ob-card');
    if (!card) return;

    const isLastStep = _step === STEPS.length;
    const progress = isLastStep ? 100 : Math.round((_step / STEPS.length) * 100);

    if (isLastStep) {
      // Écran de résumé
      const m = typeof USER_PROFILE !== 'undefined'
        ? USER_PROFILE.calcMultiplier(_answers)
        : 1.0;
      const color = _multiplierColor(m);
      const label = _multiplierLabel(m);

      // Exemple concret : pectoral après développé couché
      const pectHL = Math.round(60 * m * 10) / 10;
      const gluteHL = Math.round(72 * m * 10) / 10;

      card.innerHTML = `
        <div class="ob-header">
          <span class="ob-logo">MuscleOS</span>
          <div class="ob-title">Profil calculé ✓</div>
          <div class="ob-sub">Voici comment l'app calibre ta récupération.</div>
        </div>

        <div class="ob-result">
          <div class="ob-result-label">Multiplicateur de récupération</div>
          <div class="ob-result-value" style="color:${color}">× ${m.toFixed(3)}</div>
          <div class="ob-result-desc">${label}</div>
        </div>

        <div style="display:flex;flex-direction:column;gap:8px">
          <div class="lbl" style="color:var(--t3)">Exemples — demi-vies effectives</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
            <div class="ob-result" style="padding:10px 12px">
              <div class="ob-result-label">Pectoral majeur</div>
              <div style="font-family:var(--mono);font-size:16px;font-weight:600;color:var(--t1)">${pectHL}h</div>
              <div class="ob-result-desc" style="font-size:11px">base : 60h</div>
            </div>
            <div class="ob-result" style="padding:10px 12px">
              <div class="ob-result-label">Grand fessier</div>
              <div style="font-family:var(--mono);font-size:16px;font-weight:600;color:var(--t1)">${gluteHL}h</div>
              <div class="ob-result-desc" style="font-size:11px">base : 72h</div>
            </div>
          </div>
        </div>

        <div class="ob-nav">
          <div class="ob-progress"><div class="ob-progress-fill" style="width:100%"></div></div>
          <button class="ob-btn-next" id="ob-finish">C'est parti →</button>
        </div>`;

      document.getElementById('ob-finish')?.addEventListener('click', _finish);
      return;
    }

    const step = STEPS[_step];
    const selected = _answers[step.key];

    // ── Étape avec champ numérique (FC max / FC repos) ──
    if (step.type === 'input') {
      card.innerHTML = `
        <div class="ob-header">
          <span class="ob-logo">MuscleOS · Profil de récupération</span>
          <div class="ob-title">${step.label}</div>
          ${step.hint ? `<div class="ob-sub">${step.hint}</div>` : ''}
          ${step.optional ? `<div class="ob-sub" style="color:var(--t3);font-size:11px;margin-top:4px">Optionnel — tu pourras modifier ça dans Profil à tout moment.</div>` : ''}
        </div>
        <div class="ob-step">
          <div style="display:flex;align-items:center;gap:10px">
            <input class="fi" id="ob-input-val" type="number"
              placeholder="${step.placeholder || ''}"
              value="${selected || ''}"
              min="30" max="250"
              style="width:120px;font-size:22px;font-family:var(--mono);text-align:center">
            <span style="color:var(--t3);font-family:var(--mono)">${step.unit || ''}</span>
          </div>
        </div>
        <div class="ob-nav">
          <button class="ob-btn-prev" id="ob-prev">‹ Retour</button>
          <div class="ob-progress">
            <div class="ob-progress-fill" style="width:${progress}%"></div>
          </div>
          <button class="ob-btn-next" id="ob-next">
            ${_step === STEPS.length - 1 ? 'Voir mon profil' : 'Suivant →'}
          </button>
        </div>`;

      document.getElementById('ob-input-val')?.addEventListener('input', e => {
        const v = parseInt(e.target.value);
        if (v > 0) _answers[step.key] = v;
        else delete _answers[step.key];
      });
      document.getElementById('ob-prev')?.addEventListener('click', () => { _step--; _render(); });
      document.getElementById('ob-next')?.addEventListener('click', () => { _step++; _render(); });
      return;
    }

    // ── Étape standard (choix multiple) ──

    card.innerHTML = `
      <div class="ob-header">
        <span class="ob-logo">MuscleOS · Profil de récupération</span>
        <div class="ob-title">${step.label}</div>
        ${step.hint ? `<div class="ob-sub">${step.hint}</div>` : ''}
      </div>

      <div class="ob-step">
        <div class="ob-options">
          ${step.options.map(o => `
            <button class="ob-opt${selected === o.value ? ' selected' : ''}" data-val="${o.value}">
              ${o.label}
            </button>`).join('')}
        </div>
      </div>

      <div class="ob-nav">
        ${_step > 0
          ? `<button class="ob-btn-prev" id="ob-prev">‹ Retour</button>`
          : `<div></div>`}
        <div class="ob-progress">
          <div class="ob-progress-fill" style="width:${progress}%"></div>
        </div>
        <button class="ob-btn-next" id="ob-next" ${!selected ? 'disabled' : ''}>
          ${_step === STEPS.length - 1 ? 'Voir mon profil' : 'Suivant →'}
        </button>
      </div>`;

    // Events options
    card.querySelectorAll('.ob-opt').forEach(btn => {
      btn.addEventListener('click', () => {
        _answers[step.key] = btn.dataset.val;
        _render();
      });
    });

    document.getElementById('ob-prev')?.addEventListener('click', () => { _step--; _render(); });
    document.getElementById('ob-next')?.addEventListener('click', () => {
      if (!_answers[step.key]) return;
      _step++;
      _render();
    });
  }

  function _finish() {
    if (typeof USER_PROFILE === 'undefined') { _hide(); return; }
    const profile = USER_PROFILE.load();
    Object.assign(profile, _answers);
    USER_PROFILE.save(profile);
    USER_PROFILE.completeOnboarding();
    _hide();
    // Reconstruire la fatigue avec le nouveau profil
    rebuildFatigue();
    if (typeof renderFatigue === 'function' && S.tab === 'fatigue') renderFatigue();
  }

  function open(isEdit = false) {
    if (typeof USER_PROFILE !== 'undefined') {
      const p = USER_PROFILE.load();
      _answers = {
        age: p.age,
        training_level: p.training_level,
        sleep: p.sleep,
        protein: p.protein,
        stress: p.stress,
        goal: p.goal,
        fc_max: p.fc_max || null,
        fc_repos: p.fc_repos || null,
      };
    } else {
      _answers = {};
    }
    _step = 0;
    _render();
    const el = document.getElementById('onboarding-overlay');
    if (el) { el.classList.add('visible'); }
  }

  function _hide() {
    const el = document.getElementById('onboarding-overlay');
    if (el) el.classList.remove('visible');
  }

  function checkOnboarding() {
    if (typeof USER_PROFILE !== 'undefined' && USER_PROFILE.needsOnboarding()) {
      // Petit délai pour laisser l'app se rendre
      setTimeout(() => open(false), 400);
    }
  }

  return { open, checkOnboarding };
})();

// NB — MODULE IA (à implémenter en v4+)
// ════════════════════════════════════════════════════
//
// Option retenue : LLM local dans le navigateur via WebLLM
// (https://github.com/mlc-ai/web-llm)
//
// Principe : le modèle (Phi-3 Mini ~2.4 GB ou Llama 3.2 3B ~2 GB)
// est téléchargé une seule fois dans le cache du navigateur,
// puis tourne entièrement en local via WebGPU — sans API externe,
// sans clé, sans coût, offline après le premier chargement.
//
// Intégration prévue :
//   1. Ajouter <script src="https://esm.run/@mlc-ai/web-llm"><\/script>
//   2. Créer un onglet "IA" avec sélecteur de modèle + barre de téléchargement
//   3. Construire le prompt avec FATIGUE_ENGINE.getAll() + historique 7j
//   4. Streamer la réponse dans l'UI
//
// Prérequis utilisateur : Chrome 113+ ou Edge 113+ (WebGPU requis)
// ════════════════════════════════════════════════════

// ════════════════════════════════════════════════════
// DATA_BACKUP — Export / Import localStorage
// ════════════════════════════════════════════════════
const DATA_BACKUP = (() => {
  'use strict';

  const KEYS = [
    'muscleos_v2_sessions',
    'muscleos_v2_fatigue',
    'muscleos_v2_profile',
    'muscleos_prs'
  ];

  function exportData() {
    const snapshot = { version: '3.9', exportedAt: new Date().toISOString(), data: {} };
    KEYS.forEach(k => {
      const val = localStorage.getItem(k);
      if (val !== null) snapshot.data[k] = JSON.parse(val);
    });

    const blob = new Blob([JSON.stringify(snapshot, null, 2)], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const date = new Date().toISOString().slice(0, 10);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `muscleos-backup-${date}.json`;
    a.click();
    URL.revokeObjectURL(url);

    showPrToast('✅ Sauvegarde exportée');
  }

  function importData(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const snapshot = JSON.parse(e.target.result);
        if (!snapshot.data) throw new Error('Format invalide');

        const keysFound = Object.keys(snapshot.data).filter(k => KEYS.includes(k));
        if (keysFound.length === 0) throw new Error('Aucune donnée reconnue');

        const ok = confirm(
          `Importer cette sauvegarde du ${snapshot.exportedAt ? snapshot.exportedAt.slice(0,10) : '?'} ?\n\n` +
          `Clés trouvées : ${keysFound.join(', ')}\n\n` +
          `⚠ Tes données actuelles seront remplacées.`
        );
        if (!ok) return;

        keysFound.forEach(k => localStorage.setItem(k, JSON.stringify(snapshot.data[k])));

        showPrToast('✅ Import réussi — rechargement…');
        setTimeout(() => location.reload(), 1200);
      } catch (err) {
        showPrToast('❌ Erreur : ' + err.message);
      }
    };
    reader.readAsText(file);
  }

  return { exportData, importData };
})();

// ════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════
function init() {
  document.getElementById('hdr-date').textContent = fmtDateLong(DB.todayId());
  S.today = DB.getToday();
  refreshSleepRecovery();
  rebuildFatigue();
  PR_ENGINE.rebuild();
  renderToday();

  document.querySelectorAll('.tab-btn').forEach(btn =>
    btn.addEventListener('click', () => switchTab(btn.dataset.tab)));

  document.getElementById('btn-dc').addEventListener('click', closeDrawer);
  document.getElementById('overlay').addEventListener('click', closeDrawer);

  // Bouton profil → ouvre l'onboarding en mode édition
  document.getElementById('btn-profile')?.addEventListener('click', () => ONBOARDING.open(true));

  // Export / Import sauvegarde
  document.getElementById('btn-export').addEventListener('click', () => DATA_BACKUP.exportData());
  document.getElementById('btn-import').addEventListener('click', () =>
    document.getElementById('import-file-input').click());
  document.getElementById('import-file-input').addEventListener('change', e =>
    DATA_BACKUP.importData(e.target.files[0]));

  // Onboarding au premier lancement
  ONBOARDING.checkOnboarding();

}

init();

  ">×</button>
</div>

<script>
(function() {
  if (!('serviceWorker' in navigator)) return;

  let newWorker = null;

  navigator.serviceWorker.register('./service-worker.js')
    .then(reg => {
      console.log('[MuscleOS] Service Worker enregistré ✓');

      reg.addEventListener('updatefound', () => {
        newWorker = reg.installing;
        newWorker.addEventListener('statechange', () => {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            console.log('[MuscleOS] Nouvelle version disponible');
            const banner = document.getElementById('pwa-update-banner');
            if (banner) banner.style.display = 'flex';
          }
        });
      });
    })
    .catch(err => console.warn('[MuscleOS] SW erreur :', err));

  navigator.serviceWorker.addEventListener('controllerchange', () => {
    window.location.reload();
  });

  window.pwaUpdate = function() {
    if (newWorker) {
      newWorker.postMessage({ type: 'SKIP_WAITING' });
    } else {
      window.location.reload();
    }
  };
})();
</script>
</body>
</html>
