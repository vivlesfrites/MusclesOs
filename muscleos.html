<script>
// ── FATIGUE_DATA et FATIGUE_ENGINE chargés depuis les fichiers externes.
// Pour usage offline complet, inliner leur contenu ici.
'use strict';


const DB = {
  KEY: 'muscleos_v2_sessions',

  load() {
    try { return JSON.parse(localStorage.getItem(this.KEY) || '[]'); }
    catch { return []; }
  },

  save(arr) {
    localStorage.setItem(this.KEY, JSON.stringify(arr));
  },

  todayId() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  },

  getToday() {
    const all = this.load();
    const id = this.todayId();
    let s = all.find(x => x.id === id);
    if (!s) {
      s = { id, metrics: { energy: null, sleep: null, bodyweight: null, notes: '' }, entries: [] };
      all.push(s);
      this.save(all);
    }
    return s;
  },

  saveToday(session) {
    const all = this.load();
    const i = all.findIndex(x => x.id === session.id);
    if (i >= 0) all[i] = session; else all.push(session);
    this.save(all);
  },

  getPast() {
    const all = this.load();
    const id = this.todayId();
    return all.filter(s => s.id !== id).sort((a, b) => b.id.localeCompare(a.id));
  }
};

// ════════════════════════════════════════════════════
// PR ENGINE — Records personnels
// ════════════════════════════════════════════════════
const PR_ENGINE = {
  KEY: 'muscleos_prs',

  load() {
    try { return JSON.parse(localStorage.getItem(this.KEY) || '{}'); }
    catch { return {}; }
  },

  save(prs) { localStorage.setItem(this.KEY, JSON.stringify(prs)); },

  /**
   * Recalcule tous les PRs depuis l'historique complet.
   * À appeler après chaque modification (ajout/suppression de série).
   * Structure stockée par clé `cat::exId::varId` :
   *   { maxWeight, max1RM, maxReps (bodyweight), maxVolume }
   */
  rebuild() {
    const sessions = DB.load();
    const prs = {};

    for (const session of sessions) {
      for (const entry of session.entries) {
        if (entry.type === 'activity') continue; // pas de sets sur les activités
        const key = `${entry.category}::${entry.exerciseId}::${entry.variantId}`;
        if (!prs[key]) prs[key] = { maxWeight: 0, max1RM: 0, maxReps: 0, maxVolume: 0 };
        const pr = prs[key];

        // Volume total de cette entrée dans cette session
        const vol = entry.sets.reduce((s, x) => s + (x.weight || 0) * (x.reps || 0), 0);
        if (vol > pr.maxVolume) pr.maxVolume = vol;

        for (const set of entry.sets) {
          const w = set.weight || 0;
          const r = set.reps || 0;
          if (!r) continue;

          if (w > 0) {
            // Exercice lesté
            if (w > pr.maxWeight) pr.maxWeight = w;
            // Formule Epley : e1RM = w × (1 + r/30), valide pour r ≤ 10
            const e1rm = r === 1 ? w : w * (1 + r / 30);
            if (e1rm > pr.max1RM) pr.max1RM = e1rm;
          } else {
            // Poids du corps — on suit les reps max
            if (r > pr.maxReps) pr.maxReps = r;
          }
        }
      }
    }

    this.save(prs);
    return prs;
  },

  /**
   * Retourne le type de PR battu par un set donné, avant qu'il soit ajouté.
   * @returns { weight: bool, e1rm: bool, reps: bool }
   */
  check(cat, exId, varId, weight, reps) {
    const prs = this.load();
    const key = `${cat}::${exId}::${varId}`;
    const pr = prs[key] || { maxWeight: 0, max1RM: 0, maxReps: 0 };
    const w = weight || 0;
    const r = reps || 0;
    const e1rm = (w > 0 && r > 0) ? (r === 1 ? w : w * (1 + r / 30)) : 0;
    return {
      weight: w > 0 && w > pr.maxWeight,
      e1rm:   e1rm > 0 && e1rm > pr.max1RM,
      reps:   w === 0 && r > pr.maxReps
    };
  },

  /**
   * Vérifie si un set existant est actuellement le détenteur d'un PR.
   * Utilisé au render pour afficher les badges.
   * @returns 'weight' | '1rm' | 'reps' | null
   */
  getBadge(cat, exId, varId, weight, reps) {
    const prs = this.load();
    const key = `${cat}::${exId}::${varId}`;
    const pr = prs[key];
    if (!pr) return null;
    const w = weight || 0;
    const r = reps || 0;
    if (w > 0 && r > 0) {
      // On compare le e1RM du set au max stocké (tolérance flottante)
      const e1rm = r === 1 ? w : w * (1 + r / 30);
      if (Math.abs(e1rm - pr.max1RM) < 0.01) return '1rm';
      if (w === pr.maxWeight) return 'weight';
    } else if (w === 0 && r > 0 && r === pr.maxReps) {
      return 'reps';
    }
    return null;
  }
};



// ── Exercices isométriques (holds) ──────────────────────────────────────────
// Convention TUT : 1 rep dynamique ≈ 2-4 s de time-under-tension.
// SECONDS_PER_REP = 3 est un paramètre ajustable, PAS une donnée EMG validée.
// Il sert uniquement à convertir des secondes de hold en reps-équivalentes
// avant le calcul de dose ; ne pas le confondre avec des chiffres d'activation.
const SECONDS_PER_REP = 3;

/** Retourne true si la variante est isométrique (flag hold dans CATALOG). */
function isHoldVariant(cat, exId, varId) {
  const v = CATALOG[cat]?.exercises[exId]?.variants[varId];
  return !!(v && typeof v === 'object' && v.hold);
}

/**
 * Convertit les sets d'un hold : reps (= secondes saisies) → reps-équivalentes.
 * Pour les exercices dynamiques, retourne les sets inchangés.
 * La conversion est à la volée — localStorage reste inchangé.
 */
function toEffectiveSets(sets, isHold) {
  if (!isHold) return sets;
  return sets.map(s => Object.assign({}, s, {
    reps: Math.max(1, Math.round((s.reps || 0) / SECONDS_PER_REP))
  }));
}

/**
 * Recalcule entièrement l'état de fatigue depuis l'historique DB.
 * Appelé après chaque modification de séance (ajout/suppression de série).
 * Chaque série est appliquée à son propre timestamp (set.ts).
 */
function rebuildFatigue() {
  if (typeof FATIGUE_ENGINE === 'undefined' || typeof FATIGUE_DATA === 'undefined') return;
  FATIGUE_ENGINE.reset();
  if (typeof FATIGUE_ENGINE.resetCTL === 'function') FATIGUE_ENGINE.resetCTL();
  // ⚠ ORDRE CHRONOLOGIQUE OBLIGATOIRE. applyDoses fait décroître l'état
  // existant entre deux applications ; si on rejoue dans le désordre (ts
  // décroissants), le temps écoulé devient négatif → amplification
  // exponentielle (bug QUAD_RECT 4.7e24). On trie sessions ET sets par ts
  // croissant avant rejeu. DB.load() ne garantit pas l'ordre du tableau.
  const sessions = DB.load()
    .slice()
    .sort((a, b) => (new Date(a.id).getTime() || 0) - (new Date(b.id).getTime() || 0));
  for (const session of sessions) {
    const sessionTs = session.id ? new Date(session.id).getTime() : Date.now();
    const entries = (session.entries || [])
      .slice()
      .sort((a, b) => (a.ts || sessionTs) - (b.ts || sessionTs));
    for (const entry of entries) {
      if (entry.type === 'activity') {
        // Activité cardio/sport — doses calculées depuis le profil ACTIVITY_FATIGUE
        if (!entry.activityType || !entry.duration || !entry.intensity) continue;
        const doses = calcActivityDoses(entry.activityType, entry.duration, entry.intensity, entry.boosts || {});
        if (Object.keys(doses).length) {
          const profile = ACTIVITY_FATIGUE[entry.activityType];
          FATIGUE_ENGINE.applyDoses(doses, entry.ts || sessionTs, profile?.recovery_scale ?? 1.0);
        }
      } else {
        // Exercice de musculation — doses calculées depuis FATIGUE_DATA
        const activation = FATIGUE_DATA[entry.category]?.[entry.exerciseId]?.[entry.variantId];
        if (!activation) continue;
        // Sets triés par ts croissant pour le même motif anti-amplification
        const sets = (entry.sets || [])
          .slice()
          .sort((a, b) => (a.ts || entry.ts || sessionTs) - (b.ts || entry.ts || sessionTs));
        const isHold = isHoldVariant(entry.category, entry.exerciseId, entry.variantId);
        for (const set of sets) {
          const ts = set.ts || entry.ts || sessionTs;
          const doses = FATIGUE_ENGINE.calcDoses(activation, toEffectiveSets([set], isHold));
          FATIGUE_ENGINE.applyDoses(doses, ts);
        }
      }
    }
  }
}

// ════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════
const S = {
  tab: 'today',
  expandedEntry: null,
  expandedHist: null,
  drawer: { open: false, step: 1, cat: null, ex: null },
  today: null
};

// ════════════════════════════════════════════════════
// UTILS
// ════════════════════════════════════════════════════
function uid() { return Math.random().toString(36).slice(2, 9); }

function fmtDateShort(id) {
  const [y, m, d] = id.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  const days = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
  const months = ['janv','févr','mars','avr','mai','juin','juil','août','sept','oct','nov','déc'];
  return `${days[dt.getDay()]} ${d} ${months[m-1]} ${y}`;
}

function fmtDateLong(id) {
  const [y, m, d] = id.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  const days = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  const months = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
  return `${days[dt.getDay()]} ${d} ${months[m-1]}`;
}

function calcVol(entry) {
  if (entry.type === 'activity') return 0;
  return entry.sets.reduce((s, x) => s + (x.weight || 0) * (x.reps || 0), 0);
}

function calcActivityDoses(actType, duration, intensity, boosts) {
  const profile = ACTIVITY_FATIGUE[actType];
  if (!profile || !duration || !intensity) return {};
  const roleF = { p: 1.0, s: 0.45, t: 0.18 };
  const durationFactor = Math.max(0.2, duration / 60);
  const intensityFactor = Math.max(0.1, intensity / 5); // référence = intensité 5
  const doses = {};
  for (const [id, data] of Object.entries(profile.muscles)) {
    const rf = roleF[data.r] ?? 0.18;
    let dose = (data.p / 100) * rf * durationFactor * intensityFactor * profile.base_dose;
    // Appliquer les boosts manuels
    if (boosts && boosts[id]) dose *= BOOST_MULT[boosts[id]] ?? 1;
    doses[id] = Math.round(dose * 10) / 10;
  }
  // Appliquer les boosts sur muscles hors profil de base
  if (boosts) {
    for (const [id, level] of Object.entries(boosts)) {
      if (!doses[id]) {
        // Muscle boosted pas dans le profil de base → dose minimale boostée
        const rf = roleF['s'];
        doses[id] = Math.round((30 / 100) * rf * durationFactor * intensityFactor * profile.base_dose * BOOST_MULT[level] * 10) / 10;
      }
    }
  }
  return doses;
}



function entryStats(entry) {
  if (entry.type === 'activity') {
    const parts = [];
    if (entry.duration) parts.push(`${entry.duration} min`);
    if (entry.intensity) parts.push(`${entry.intensity}/10`);
    return parts.join(' · ') || '—';
  }
  if (!entry.sets.length) return '—';
  const n = entry.sets.length;
  const maxW = Math.max(...entry.sets.map(s => s.weight || 0));
  const reps0 = entry.sets[0]?.reps || 0;
  const holdStat = isHoldVariant(entry.category, entry.exerciseId, entry.variantId);
  if (maxW > 0) return `${n}×${reps0}${holdStat ? 's' : ''} · ${maxW} kg`;
  const totalReps = entry.sets.reduce((s, x) => s + (x.reps || 0), 0);
  return `${n} séries · ${totalReps} ${holdStat ? 'sec' : 'reps'}`;
}

function getCatColor(cat) { return CAT_COLORS[cat] || '#888'; }

function exLabel(cat, exId) {
  return CATALOG[cat]?.exercises[exId]?.label || exId;
}
function varLabel(cat, exId, varId) {
  const v = CATALOG[cat]?.exercises[exId]?.variants[varId];
  return (v && typeof v === 'object') ? v.label : (v || varId);
}

function showPrToast(msg) {
  const t = document.getElementById('pr-toast');
  if (!t) return;
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ════════════════════════════════════════════════════
// BODYWEIGHT — Historique et sparkline
// ════════════════════════════════════════════════════

/** Retourne les 30 derniers points de poids (date + valeur), triés ASC */
function getBwHistory() {
  return DB.load()
    .filter(s => s.metrics?.bodyweight != null)
    .sort((a, b) => a.id.localeCompare(b.id))
    .slice(-30)
    .map(s => ({ date: s.id, bw: s.metrics.bodyweight }));
}

/** Génère un sparkline SVG inline à partir de points [{bw}] */
function bwSparkline(points) {
  if (points.length < 2) return '';
  const W = 200, H = 44, PAD = 4;
  const vals = points.map(p => p.bw);
  const min = Math.min(...vals) - 0.5;
  const max = Math.max(...vals) + 0.5;
  const range = max - min || 1;
  const xs = points.map((_, i) => PAD + (i / (points.length - 1)) * (W - PAD*2));
  const ys = points.map(p => H - PAD - ((p.bw - min) / range) * (H - PAD*2));
  const pathD = xs.map((x, i) => `${i===0?'M':'L'}${x.toFixed(1)},${ys[i].toFixed(1)}`).join(' ');
  // Aire sous la courbe
  const areaD = pathD + ` L${xs[xs.length-1].toFixed(1)},${H} L${PAD},${H} Z`;
  const last = points[points.length - 1];
  const prev = points[points.length - 2];
  const diff = last.bw - prev.bw;
  const dotColor = diff < -0.05 ? 'var(--accent)' : diff > 0.05 ? 'var(--orange)' : 'var(--t3)';
  const lx = xs[xs.length-1], ly = ys[ys.length-1];
  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
    <defs>
      <linearGradient id="bwGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="var(--accent)" stop-opacity="0.18"/>
        <stop offset="100%" stop-color="var(--accent)" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <path d="${areaD}" fill="url(#bwGrad)"/>
    <path d="${pathD}" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-opacity="0.6" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${lx.toFixed(1)}" cy="${ly.toFixed(1)}" r="3" fill="${dotColor}"/>
  </svg>`;
}

// ════════════════════════════════════════════════════
// RENDER — TODAY TAB
// ════════════════════════════════════════════════════
function renderToday() {
  const s = S.today;
  const m = s.metrics;

  // Energy dots
  const dots = Array.from({length:10}, (_,i) => {
    const v = i + 1;
    return `<button class="edot${m.energy===v?' on':''}" data-e="${v}">${v}</button>`;
  }).join('');

  // Bodyweight card
  const bwHistory = getBwHistory();
  const lastBw = bwHistory.length > 0 ? bwHistory[bwHistory.length - 1] : null;
  const prevBw = bwHistory.length > 1 ? bwHistory[bwHistory.length - 2] : null;
  // Si aujourd'hui est déjà dans l'historique, prevBw est le vrai précédent
  const todayInHist = lastBw?.date === s.id;
  const bwPrev = todayInHist ? (bwHistory.length > 1 ? bwHistory[bwHistory.length - 2] : null) : lastBw;
  const diff = (m.bodyweight != null && bwPrev != null) ? (m.bodyweight - bwPrev.bw) : null;
  const diffHtml = diff !== null
    ? `<div class="bw-delta ${Math.abs(diff) < 0.05 ? 'eq' : diff > 0 ? 'up' : 'down'}">
        ${diff > 0 ? '+' : ''}${diff.toFixed(1)} kg vs veille
       </div>`
    : bwPrev ? `<div class="bw-delta eq">réf : ${bwPrev.bw} kg</div>` : '';
  const spark = bwSparkline(bwHistory.length > 0 ? bwHistory : []);

  // Stats bar
  const totalVol = s.entries.reduce((x, e) => x + calcVol(e), 0);
  const totalSets = s.entries.reduce((x, e) => x + (e.sets?.length || 0), 0);
  const totalAct = s.entries.filter(e => e.type === 'activity').length;
  const statsBar = (totalVol > 0 || totalSets > 0 || totalAct > 0)
    ? `<div class="stats-bar" id="stats-bar">
        <span class="sb-item">Volume <strong>${totalVol.toLocaleString('fr-FR')} kg</strong></span>
        <span class="sb-item">Séries <strong>${totalSets}</strong></span>
        <span class="sb-item">${totalAct > 0 ? `Activités <strong>${totalAct}</strong>` : `Exercices <strong>${s.entries.filter(e=>e.type!=='activity').length}</strong>`}</span>
       </div>`
    : `<div id="stats-bar"></div>`;

  // Entries
  const entriesHtml = s.entries.length === 0
    ? `<div class="entry-empty">Aucun exercice enregistré · <em>ajoutez votre premier mouvement</em></div>`
    : s.entries.map(e => renderEntry(e)).join('');

  document.getElementById('tab-today').innerHTML = `
    <div class="metrics-row">
      <div class="metric-card">
        <div class="lbl metric-lbl">Énergie du jour</div>
        <div class="energy-dots">${dots}</div>
        <div class="energy-val${m.energy?' set':''}" id="ev">
          ${m.energy != null ? m.energy+'/10' : '—'}
        </div>
      </div>
      <div class="metric-card">
        <div class="lbl metric-lbl">Sommeil</div>
        <div class="sleep-wrap">
          <input class="sleep-inp" id="sleep-inp" type="number"
            min="0" max="24" step="0.5"
            value="${m.sleep != null ? m.sleep : ''}"
            placeholder="7.5">
          <div class="sleep-unit">heures</div>
        </div>
      </div>
    </div>

    <div class="metrics-row-bw">
      <div class="metric-card-bw">
        <div>
          <div class="lbl metric-lbl">Poids du corps</div>
          <div class="bw-input-wrap">
            <input class="bw-inp" id="bw-inp" type="number"
              min="30" max="300" step="0.1"
              value="${m.bodyweight != null ? m.bodyweight : ''}"
              placeholder="${bwPrev ? bwPrev.bw : '70.0'}">
            <div class="bw-unit">kg</div>
          </div>
          ${diffHtml}
        </div>
        <div class="bw-spark" title="${bwHistory.length} mesures (30j)">
          ${spark || `<div style="font-size:11px;color:var(--t3);padding-top:12px">Pas encore d'historique</div>`}
        </div>
      </div>
    </div>

    <div class="notes-card">
      <div class="lbl" style="margin-bottom:6px">Notes du jour</div>
      <textarea class="notes-ta" id="notes-ta" rows="2"
        placeholder="Ressenti, contexte, remarques…">${m.notes||''}</textarea>
    </div>

    <div class="sec-hdr">
      <span class="lbl">Séance du jour</span>
    </div>
    ${statsBar}
    <div id="entries-wrap">
      ${entriesHtml}
    </div>
    <button class="btn-add-ex" id="btn-add-ex">＋ &nbsp;Ajouter un exercice</button>
  `;

  // Bind metric events
  document.querySelectorAll('.edot').forEach(btn => {
    btn.addEventListener('click', () => {
      S.today.metrics.energy = parseInt(btn.dataset.e);
      DB.saveToday(S.today);
      // update UI without full re-render
      document.querySelectorAll('.edot').forEach(b =>
        b.classList.toggle('on', b.dataset.e == btn.dataset.e));
      const ev = document.getElementById('ev');
      ev.textContent = btn.dataset.e + '/10';
      ev.classList.add('set');
    });
  });

  const sleepInp = document.getElementById('sleep-inp');
  sleepInp.addEventListener('change', () => {
    const v = parseFloat(sleepInp.value);
    S.today.metrics.sleep = isNaN(v) ? null : v;
    DB.saveToday(S.today);
    refreshSleepRecovery();
    if (S.tab === 'fatigue') renderFatigue();
  });

  const bwInp = document.getElementById('bw-inp');
  bwInp.addEventListener('change', () => {
    const v = parseFloat(bwInp.value);
    S.today.metrics.bodyweight = isNaN(v) ? null : Math.round(v * 10) / 10;
    DB.saveToday(S.today);
    // Re-render uniquement la carte bw pour mettre à jour le delta et le sparkline
    renderToday();
  });

  let notesTimer;
  const notesTa = document.getElementById('notes-ta');
  notesTa.addEventListener('input', () => {
    clearTimeout(notesTimer);
    notesTimer = setTimeout(() => {
      S.today.metrics.notes = notesTa.value;
      DB.saveToday(S.today);
    }, 500);
  });

  document.getElementById('btn-add-ex').addEventListener('click', () => openDrawer());

  // Bind all entry events
  S.today.entries.forEach(e => bindEntry(e.id));
}

function renderEntry(entry) {
  // ── ACTIVITÉ ─────────────────────────────────────
  if (entry.type === 'activity') {
    const act = ACTIVITY_CATALOG[entry.activityType] || ACTIVITY_CATALOG.autre;
    const isOpen = S.expandedEntry === entry.id;
    const boosts = entry.boosts || {};
    const boostKeys = Object.keys(boosts);

    const boostHtml = boostKeys.length > 0
      ? `<div class="boost-section">
          <div class="lbl" style="margin-bottom:6px">Muscles sollicités</div>
          <div class="boost-grid">
            ${boostKeys.map(id => `
              <span class="boost-chip ${boosts[id]}">${MUSCLE_LABELS[id] || id}</span>
            `).join('')}
          </div>
        </div>`
      : '<div style="font-size:12px;color:var(--t3);padding:4px 0">Aucun muscle signalé</div>';

    const panel = isOpen ? `
      <div class="act-panel">
        ${entry.notes ? `<div style="font-size:13px;color:var(--t2);margin-bottom:8px">${entry.notes}</div>` : ''}
        ${boostHtml}
        <div class="entry-foot" style="margin-top:10px">
          <button class="btn-de" data-eid="${entry.id}">Supprimer l'activité</button>
        </div>
      </div>` : '';

    return `
      <div class="act-card${isOpen?' open':''}" id="ec-${entry.id}">
        <div class="act-hdr" data-eid="${entry.id}">
          <div class="act-icon" style="background:${act.color}22;color:${act.color}">${act.icon}</div>
          <div class="act-info">
            <div class="act-name" style="color:${act.color}">${act.label}</div>
            <div class="act-meta">${entryStats(entry)}</div>
          </div>
          <div class="act-stats">
            ${boostKeys.length > 0 ? `<span style="color:var(--t3);font-size:10px">${boostKeys.length} boost${boostKeys.length>1?'s':''}</span>` : ''}
          </div>
          <div class="e-chev">▾</div>
        </div>
        ${panel}
      </div>`;
  }

  // ── EXERCICE MUSCU ────────────────────────────────
  const color = getCatColor(entry.category);
  const name = exLabel(entry.category, entry.exerciseId);
  const vl = varLabel(entry.category, entry.exerciseId, entry.variantId);
  const stats = entryStats(entry);
  const isOpen = S.expandedEntry === entry.id;
  const isHold = isHoldVariant(entry.category, entry.exerciseId, entry.variantId);

  // Sets rows
  const setsRows = entry.sets.length > 0
    ? entry.sets.map((s, i) => {
        const badge = PR_ENGINE.getBadge(entry.category, entry.exerciseId, entry.variantId, s.weight, s.reps);
        const badgeHtml = badge === '1rm'
          ? `<span class="pr-badge pr-1rm" title="Record 1RM estimé">PR</span>`
          : badge === 'weight'
          ? `<span class="pr-badge" title="Charge maximale">PR</span>`
          : badge === 'reps'
          ? `<span class="pr-badge" title="Record de reps">PR</span>`
          : `<span></span>`;
        return `
        <div class="set-row">
          <span class="set-n">S${i+1}</span>
          <div><div class="sv">${s.weight > 0 ? s.weight+' kg' : 'BW'}</div><div class="su">poids</div></div>
          <div><div class="sv">${s.reps}${isHold ? 's' : ''}</div><div class="su">${isHold ? 'sec' : 'reps'}</div></div>
          <div><div class="sv" style="color:var(--t3)">${s.rir!=null ? 'RIR '+s.rir : '—'}</div><div class="su">rir</div></div>
          ${s.angle != null ? `<div><div class="sv" style="color:var(--t3)">${s.angle > 0 ? '+' : ''}${s.angle}°</div><div class="su">angle</div></div>` : '<span></span>'}
          ${badgeHtml}
          <button class="btn-ds" data-eid="${entry.id}" data-sid="${s.id}" title="Supprimer">✕</button>
        </div>`;
      }).join('')
    : `<div style="font-size:12px;color:var(--t3);padding:6px 0 4px">Aucune série — ajoutez votre première série ci-dessous</div>`;

  const isAngleAdaptable = CATALOG[entry.category]?.exercises[entry.exerciseId]?.angleAdaptable || false;
  const lastAngle = entry.sets.length > 0 && entry.sets[entry.sets.length-1].angle != null
    ? entry.sets[entry.sets.length-1].angle : null;
  const angleField = isAngleAdaptable ? `
    <div class="fg">
      <label class="fl">Angle (°)</label>
      <input class="fi" id="iangle-${entry.id}" type="number" placeholder="0" min="-30" max="90" step="5"
        value="${lastAngle != null ? lastAngle : ''}">
    </div>` : '';

  const panel = isOpen ? `
    <div class="sets-panel">
      <div class="lbl" style="margin-bottom:8px">Séries</div>
      <div class="sets-list">${setsRows}</div>
      <div class="add-set-form">
        <div class="fg">
          <label class="fl">Poids (kg)</label>
          <input class="fi" id="iw-${entry.id}" type="number" placeholder="100" min="0" step="0.5">
        </div>
        <div class="fg">
          <label class="fl">${isHold ? 'Sec' : 'Reps'}</label>
          <input class="fi" id="ir-${entry.id}" type="number" placeholder="${isHold ? '30' : '5'}" min="1">
        </div>
        <div class="fg">
          <label class="fl">RIR</label>
          <input class="fi" id="irir-${entry.id}" type="number" placeholder="2" min="0" max="10">
        </div>
        ${angleField}
        <button class="btn-log" data-eid="${entry.id}">＋ Série</button>
      </div>
    </div>
    <div class="entry-foot">
      <button class="btn-de" data-eid="${entry.id}">Supprimer l'exercice</button>
    </div>` : '';

  return `
    <div class="entry-card${isOpen?' open':''}" id="ec-${entry.id}">
      <div class="entry-hdr" data-eid="${entry.id}">
        <div class="e-dot" style="background:${color}"></div>
        <div class="e-info">
          <div class="e-name">${name}</div>
          <div class="e-var">${vl}</div>
        </div>
        <div class="e-stats">${stats}</div>
        <div class="e-chev">▾</div>
      </div>
      ${panel}
    </div>`;
}

function bindEntry(entryId) {
  const entry = S.today.entries.find(e => e.id === entryId);

  // Toggle expand (commun aux deux types)
  const hdr = document.querySelector(`.entry-hdr[data-eid="${entryId}"], .act-hdr[data-eid="${entryId}"]`);
  if (hdr) hdr.addEventListener('click', () => {
    S.expandedEntry = S.expandedEntry === entryId ? null : entryId;
    refreshEntries();
  });

  // Bouton supprimer (commun)
  const btnDe = document.querySelector(`.btn-de[data-eid="${entryId}"]`);
  if (btnDe) btnDe.addEventListener('click', () => {
    S.today.entries = S.today.entries.filter(e => e.id !== entryId);
    if (S.expandedEntry === entryId) S.expandedEntry = null;
    DB.saveToday(S.today);
    rebuildFatigue();
    PR_ENGINE.rebuild();
    renderToday();
  });

  // ── Activité : rien d'autre à binder ──────────────
  if (entry?.type === 'activity') return;

  // ── Exercice muscu ────────────────────────────────
  if (S.expandedEntry !== entryId) return;

  // Pre-fill weight/reps from last set
  if (entry?.sets.length) {
    const last = entry.sets[entry.sets.length - 1];
    const iw = document.getElementById(`iw-${entryId}`);
    const ir = document.getElementById(`ir-${entryId}`);
    if (iw && last.weight > 0) iw.value = last.weight;
    if (ir && last.reps) ir.value = last.reps;
  }

  // Add set on button click
  const btnLog = document.querySelector(`.btn-log[data-eid="${entryId}"]`);
  if (btnLog) btnLog.addEventListener('click', () => addSet(entryId));

  // Add set on Enter key in reps/RIR fields
  ['ir-', 'irir-'].forEach(prefix => {
    const inp = document.getElementById(`${prefix}${entryId}`);
    if (inp) inp.addEventListener('keydown', e => { if (e.key==='Enter') addSet(entryId); });
  });

  // Delete individual sets
  document.querySelectorAll(`.btn-ds[data-eid="${entryId}"]`).forEach(btn => {
    btn.addEventListener('click', () => {
      const e = S.today.entries.find(x => x.id === entryId);
      if (e) {
        e.sets = e.sets.filter(s => s.id !== btn.dataset.sid);
        DB.saveToday(S.today);
        rebuildFatigue();
        PR_ENGINE.rebuild();
        refreshEntries();
      }
    });
  });

  // Delete whole entry — géré dans le bloc commun ci-dessus

}

function addSet(entryId) {
  const w = parseFloat(document.getElementById(`iw-${entryId}`)?.value) || 0;
  const r = parseInt(document.getElementById(`ir-${entryId}`)?.value);
  const rir = document.getElementById(`irir-${entryId}`)?.value;
  const angleRaw = document.getElementById(`iangle-${entryId}`)?.value;
  const angle = (angleRaw !== '' && angleRaw != null) ? parseInt(angleRaw) : null;

  if (!r || r <= 0) {
    const inp = document.getElementById(`ir-${entryId}`);
    if (inp) { inp.classList.add('err'); setTimeout(() => inp.classList.remove('err'), 400); inp.focus(); }
    return;
  }

  // Cherche dans S.today d'abord, puis dans les sessions passées
  let entry = S.today.entries.find(e => e.id === entryId);
  let isHistoryEntry = false;
  let historySessionId = null;
  if (!entry) {
    const all = DB.load();
    for (const sess of all) {
      const found = sess.entries.find(e => e.id === entryId);
      if (found) { entry = found; isHistoryEntry = true; historySessionId = sess.id; break; }
    }
  }
  if (!entry) return;

  // Vérifier si le set bat un PR avant de l'ajouter
  const prHit = PR_ENGINE.check(entry.category, entry.exerciseId, entry.variantId, w, r);

  const setObj = {
    id: uid(), weight: w, reps: r,
    rir: (rir !== '' && rir != null) ? parseInt(rir) : null,
    ts: Date.now()
  };
  if (angle !== null) setObj.angle = angle;
  entry.sets.push(setObj);

  if (isHistoryEntry) {
    const all = DB.load();
    const sess = all.find(s => s.id === historySessionId);
    if (sess) {
      const e2 = sess.entries.find(e => e.id === entryId);
      if (e2) e2.sets = entry.sets;
    }
    DB.save(all);
    renderHistory();
  } else {
    DB.saveToday(S.today);
    refreshEntries();
  }
  rebuildFatigue();
  PR_ENGINE.rebuild();

  // Flash notification PR
  if (prHit.weight || prHit.e1rm || prHit.reps) {
    const msg = prHit.e1rm ? '🏆 Nouveau record 1RM !' : prHit.weight ? '🏆 Nouvelle charge max !' : '🏆 Record de reps !';
    showPrToast(msg);
  }
}

function refreshEntries() {
  const wrap = document.getElementById('entries-wrap');
  if (!wrap) return;
  const s = S.today;
  wrap.innerHTML = s.entries.length === 0
    ? `<div class="entry-empty">Aucun exercice enregistré · <em>ajoutez votre premier mouvement</em></div>`
    : s.entries.map(e => renderEntry(e)).join('');
  s.entries.forEach(e => bindEntry(e.id));

  // Update stats bar
  const totalVol = s.entries.reduce((x, e) => x + calcVol(e), 0);
  const totalSets = s.entries.reduce((x, e) => x + (e.sets?.length || 0), 0);
  const totalAct = s.entries.filter(e => e.type === 'activity').length;
  const sb = document.getElementById('stats-bar');
  if (sb) {
    if (totalVol > 0 || totalSets > 0 || totalAct > 0) {
      sb.className = 'stats-bar';
      sb.innerHTML = `
        <span class="sb-item">Volume <strong>${totalVol.toLocaleString('fr-FR')} kg</strong></span>
        <span class="sb-item">Séries <strong>${totalSets}</strong></span>
        <span class="sb-item">${totalAct > 0 ? `Activités <strong>${totalAct}</strong>` : `Exercices <strong>${s.entries.filter(e=>e.type!=='activity').length}</strong>`}</span>`;
    } else {
      sb.className = '';
      sb.innerHTML = '';
    }
  }
}

// ════════════════════════════════════════════════════
// RENDER — HISTORY TAB
// ════════════════════════════════════════════════════
function renderHistory() {
  const past = DB.getPast();
  const el = document.getElementById('tab-history');

  if (past.length === 0) {
    el.innerHTML = `<div class="hist-empty">
      <div style="font-size:24px;margin-bottom:10px;color:var(--b3)">◌</div>
      Aucune séance passée<br>
      <span style="color:var(--t3)">Les séances apparaîtront ici après votre première journée</span>
    </div>`;
    return;
  }

  el.innerHTML = past.map(s => {
    const names = s.entries.map(e => {
      if (e.type === 'activity') return (ACTIVITY_CATALOG[e.activityType]?.label || 'Activité');
      return exLabel(e.category, e.exerciseId);
    }).join(' · ') || 'Journée vide';
    const vol = s.entries.reduce((x, e) => x + calcVol(e), 0);
    const sets = s.entries.reduce((x, e) => x + (e.sets?.length || 0), 0);
    const actCount = s.entries.filter(e => e.type === 'activity').length;
    const isOpen = S.expandedHist === s.id;

    const meta = [];
    if (s.metrics?.energy != null) meta.push(`Énergie : ${s.metrics.energy}/10`);
    if (s.metrics?.sleep != null) meta.push(`Sommeil : ${s.metrics.sleep}h`);
    if (s.metrics?.notes) meta.push(s.metrics.notes);

    const detail = isOpen ? `
      <div class="hist-detail">
        ${meta.length ? `<div class="h-meta">${meta.join(' · ')}</div>` : ''}
        ${s.entries.map(e => {
          if (e.type === 'activity') {
            const act = ACTIVITY_CATALOG[e.activityType] || ACTIVITY_CATALOG.autre;
            // Détails fractionné
            let intervalsStr = '';
            if (e.intervals && e.intervals.reps && e.intervals.effort_m) {
              const iv = e.intervals;
              intervalsStr = `${iv.reps}×${iv.effort_m}m`;
              if (iv.recov_m) intervalsStr += `/${iv.recov_m}m`;
            }
            // Calcul pace si distance + durée
            let paceStr = '';
            if (e.distance && e.duration) {
              const unit = e.paceUnit || 'min_km';
              if (unit === 'min_km') {
                const t = e.duration / e.distance;
                const m = Math.floor(t), s = Math.round((t - m) * 60);
                paceStr = ` · ${m}:${s.toString().padStart(2,'0')}/km`;
              } else {
                paceStr = ` · ${((e.distance / e.duration) * 60).toFixed(1)} km/h`;
              }
            }
            const actDetails = [
              e.duration ? e.duration + ' min' : '',
              e.distance ? e.distance + ' km' : '',
              intervalsStr,
              e.intensity ? '· ' + e.intensity + '/10' : '',
              e.bpm ? '· ' + e.bpm + ' bpm' : '',
              paceStr,
            ].filter(Boolean).join(' ');
            return `<div class="hist-entry">
              <div>
                <div class="he-name" style="color:${act.color}">${act.icon} ${act.label}</div>
                <div class="he-var">${actDetails}</div>
              </div>
              <button class="btn-act-edit" data-sid="${s.id}" data-eid="${e.id}"
                data-atype="${e.activityType}" data-dur="${e.duration||''}"
                data-int="${e.intensity||0}" data-boosts='${JSON.stringify(e.boosts||{})}'
                data-dist="${e.distance||''}" data-bpm="${e.bpm||''}"
                data-pace-unit="${e.paceUnit||'min_km'}">✎</button>
            </div>`;
          }
          const color = getCatColor(e.category);
          const n = e.sets.length;
          const maxW = n > 0 ? Math.max(...e.sets.map(x => x.weight || 0)) : 0;
          const reps0 = n > 0 ? e.sets[0].reps : 0;
          const isHoldH = isHoldVariant(e.category, e.exerciseId, e.variantId);
          const setsRows = e.sets.map((set, i) =>
            `<div class="set-row">
              <span class="set-n">S${i+1}</span>
              <div><div class="sv">${set.weight > 0 ? set.weight+' kg' : 'BW'}</div><div class="su">poids</div></div>
              <div><div class="sv">${set.reps}${isHoldH ? 's' : ''}</div><div class="su">${isHoldH ? 'sec' : 'reps'}</div></div>
              ${set.rir != null ? `<div><div class="sv" style="color:var(--t3)">RIR ${set.rir}</div><div class="su">rir</div></div>` : ''}
              <button class="btn-ds" data-eid="${e.id}" data-sid="${set.id}" data-sessid="${s.id}" title="Supprimer">✕</button>
            </div>`).join('');
          return `<div class="hist-entry-full" id="hef-${e.id}">
            <div class="hist-entry-hdr">
              <div>
                <div class="he-name">
                  <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${color}"></span>
                  ${exLabel(e.category, e.exerciseId)}
                </div>
                <div class="he-var">${varLabel(e.category, e.exerciseId, e.variantId)}</div>
              </div>
              <div style="display:flex;align-items:center;gap:8px">
                <div class="he-sets">${n > 0 ? n+'×'+reps0+(maxW > 0 ? ' · '+maxW+' kg' : '') : 'Aucune série'}</div>
                <button class="btn-act-edit btn-he-del" data-sessid="${s.id}" data-eid="${e.id}" title="Supprimer l'exercice">✕</button>
              </div>
            </div>
            ${n > 0 ? `<div class="hist-sets-list">${setsRows}</div>` : ''}
            <div class="hist-add-set">
              <input class="fi" id="iw-${e.id}" type="number" placeholder="kg" min="0" step="0.5" style="width:72px">
              <input class="fi" id="ir-${e.id}" type="number" placeholder="reps" min="1" style="width:64px">
              <input class="fi" id="irir-${e.id}" type="number" placeholder="RIR" min="0" max="10" style="width:56px">
              <button class="btn-log-set" data-logeid="${e.id}">+ Série</button>
            </div>
          </div>`;
        }).join('')}
        <div style="padding-top:10px;border-top:1px solid var(--b1);margin-top:8px">
          <button class="btn-del-session" data-sessid="${s.id}">🗑 Supprimer cette séance</button>
        </div>
      </div>` : '';

    const setsLabel = sets > 0 && actCount > 0
      ? `${sets} série${sets!==1?'s':''} + ${actCount} act.`
      : sets > 0 ? `${sets} série${sets!==1?'s':''}`
      : actCount > 0 ? `${actCount} activité${actCount!==1?'s':''}`
      : '—';

    return `<div class="hist-session">
      <div class="hist-hdr" data-hid="${s.id}">
        <div>
          <div class="h-date">${fmtDateShort(s.id)}</div>
          <div class="h-exs">${names}</div>
        </div>
        <div class="h-right">
          <div class="h-vol">${vol > 0 ? vol.toLocaleString('fr-FR')+' kg' : '—'}</div>
          <div class="h-sets">${setsLabel}</div>
        </div>
      </div>
      ${detail}
    </div>`;
  }).join('');

  document.querySelectorAll('.hist-hdr').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.hid;
      S.expandedHist = S.expandedHist === id ? null : id;
      renderHistory();
    });
  });

  document.querySelectorAll('.btn-del-session').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const sessId = btn.dataset.sessid;
      const dateLabel = sessId; // fmtDateShort pas encore dispo ici, on utilise l'id
      if (!confirm('Supprimer toute la séance du ' + sessId + ' ?')) return;
      let all = DB.load();
      all = all.filter(s => s.id !== sessId);
      DB.save(all);
      if (S.expandedHist === sessId) S.expandedHist = null;
      rebuildFatigue();
      PR_ENGINE.rebuild();
      renderHistory();
    });
  });

  document.querySelectorAll('.btn-act-edit').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      openDrawer({
        sessionId: btn.dataset.sid,
        entryId:   btn.dataset.eid,
        actType:   btn.dataset.atype,
        duration:  parseInt(btn.dataset.dur) || null,
        intensity: parseInt(btn.dataset.int) || 0,
        boosts:    JSON.parse(btn.dataset.boosts || '{}'),
        distance:  parseFloat(btn.dataset.dist) || null,
        bpm:       parseInt(btn.dataset.bpm) || null,
        paceUnit:  btn.dataset.paceUnit || 'min_km',
        date:      btn.dataset.sid,
      });
    });
  });

  // Boutons "+ Série" dans l'historique
  document.querySelectorAll('.btn-log-set').forEach(btn => {
    btn.addEventListener('click', () => addSet(btn.dataset.logeid));
  });

  // Bouton supprimer EXERCICE dans l'historique
  document.querySelectorAll('.btn-he-del').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      if (!confirm('Supprimer cet exercice et toutes ses séries ?')) return;
      const all = DB.load();
      const sess = all.find(s => s.id === btn.dataset.sessid);
      if (!sess) return;
      sess.entries = sess.entries.filter(e => e.id !== btn.dataset.eid);
      DB.save(all);
      const todayId = DB.todayId();
      if (btn.dataset.sessid === todayId) {
        S.today = all.find(s => s.id === todayId) || S.today;
      }
      rebuildFatigue();
      PR_ENGINE.rebuild();
      renderHistory();
    });
  });

  // Boutons supprimer série dans l'historique
  document.querySelectorAll('.hist-sets-list .btn-ds').forEach(btn => {
    btn.addEventListener('click', () => {
      const sessId = btn.dataset.sessid;
      const entryId = btn.dataset.eid;
      const setId = btn.dataset.sid;
      const all = DB.load();
      const sess = all.find(s => s.id === sessId);
      if (!sess) return;
      const entry = sess.entries.find(e => e.id === entryId);
      if (!entry) return;
      entry.sets = entry.sets.filter(s => s.id !== setId);
      DB.save(all);
      rebuildFatigue();
      PR_ENGINE.rebuild();
      renderHistory();
    });
  });
}

// DRAWER — Sélection exercice en 3 étapes
// ════════════════════════════════════════════════════
function openDrawer(editData) {
  // editData optionnel : { sessionId, entryId, actType, duration, intensity, boosts, date }
  if (editData) {
    S.drawer = {
      open: true, step: 5,
      cat: null, ex: null,
      actType: editData.actType,
      actBoosts: { ...editData.boosts },
      _intensity: editData.intensity,
      _duration: editData.duration,
      _distance: editData.distance || null,
      _bpm: editData.bpm || null,
      _paceUnit: editData.paceUnit || 'min_km',
      _actDate: editData.date,
      editMode: true,
      editSessionId: editData.sessionId,
      editEntryId: editData.entryId,
    };
  } else {
    S.drawer = { open: true, step: 1, cat: null, ex: null, actType: null, actBoosts: {},
                 editMode: false, editSessionId: null, editEntryId: null,
                 actGroup: null, _distance: null, _bpm: null, _paceUnit: 'min_km',
                 _actDate: DB.todayId(), _exDate: DB.todayId() };
  }
  document.getElementById('overlay').classList.add('on');
  document.getElementById('drawer').classList.add('on');
  renderDrawer();
}

function closeDrawer() {
  S.drawer.open = false;
  document.getElementById('overlay').classList.remove('on');
  document.getElementById('drawer').classList.remove('on');
}

function renderDrawer() {
  const { step, cat, ex } = S.drawer;
  const body = document.getElementById('d-body');
  const title = document.getElementById('d-title');
  const crumb = document.getElementById('d-crumb');

  if (step === 1) {
    title.textContent = 'Ajouter';
    crumb.innerHTML = '';
    const chips = Object.entries(CATALOG).map(([k, v]) => {
      const n = Object.keys(v.exercises).length;
      const color = getCatColor(k);
      return `<div class="cat-chip" data-cat="${k}">
        <span class="cc-icon" style="color:${color}">${v.icon}</span>
        <div class="cc-label">${v.label}</div>
        <div class="cc-count">${n} ex.</div>
      </div>`;
    }).join('');
    const todayId = DB.todayId();
    const curDate = S.drawer._date || todayId;
    body.innerHTML = `
      <div class="drawer-date-row">
        <label class="fl">Date de la séance</label>
        <input class="fi" id="drawer-date" type="date" value="${curDate}" max="${todayId}">
      </div>
      <div class="cat-grid">${chips}</div>
      <span class="act-section-lbl">Activité cardio / sport</span>
      <div class="act-type-chip" id="chip-act">
        <span class="cc-icon">↗</span>
        <div class="cc-label">Activité</div>
        <span style="font-family:var(--mono);font-size:10px;color:var(--t3);margin-left:auto">running · vélo · sport ···</span>
      </div>`;
    body.querySelector('#drawer-date').addEventListener('change', e => {
      S.drawer._date = e.target.value;
      S.drawer._actDate = e.target.value;
      S.drawer._exDate  = e.target.value;
    });
    body.querySelectorAll('.cat-chip').forEach(c =>
      c.addEventListener('click', () => {
        S.drawer._date = document.getElementById('drawer-date')?.value || todayId;
        S.drawer._actDate = S.drawer._date;
        S.drawer._exDate  = S.drawer._date;
        S.drawer.cat = c.dataset.cat;
        S.drawer.step = 2;
        renderDrawer();
      }));
    body.querySelector('#chip-act').addEventListener('click', () => {
      S.drawer._date = document.getElementById('drawer-date')?.value || todayId;
      S.drawer._actDate = S.drawer._date;
      S.drawer._exDate  = S.drawer._date;
      S.drawer.step = 4;
      renderDrawer();
    });
  }

  else if (step === 2) {
    const catData = CATALOG[cat];
    if (!catData) { console.error('[renderDrawer] step2 — cat invalide:', cat); S.drawer.step=1; renderDrawer(); return; }
    title.textContent = catData.label;
    crumb.innerHTML = `<span>${catData.label}</span>`;
    const items = Object.entries(catData.exercises).map(([k, v]) => `
      <div class="sel-item" data-ex="${k}">
        <div>
          <div class="si-name">${v.label}</div>
          <div class="si-sub">${v.equipment.join(', ')}</div>
        </div>
        <span class="si-arr">›</span>
      </div>`).join('');
    body.innerHTML = `
      <button class="btn-back" id="bb1">‹ Retour</button>
      <div class="sel-list">${items}</div>`;
    body.querySelector('#bb1').addEventListener('click', () => { S.drawer.step=1; renderDrawer(); });
    body.querySelectorAll('.sel-item').forEach(i =>
      i.addEventListener('click', () => {
        S.drawer.ex = i.dataset.ex;
        S.drawer.step = 3;
        renderDrawer();
      }));
  }

  else if (step === 3) {
    const catData = CATALOG[cat];
    const exData = catData?.exercises[ex];
    if (!catData || !exData) { console.error('[renderDrawer] step3 — ex invalide:', cat, ex); S.drawer.step = cat ? 2 : 1; renderDrawer(); return; }
    title.textContent = exData.label;
    crumb.innerHTML = `<span>${catData.label}</span> <span style="color:var(--t3)">›</span> <span>${exData.label}</span>`;
    const todayId = DB.todayId();
    const defaultDate = S.drawer._exDate || todayId;
    const items = Object.entries(exData.variants).map(([k, v]) => `
      <div class="sel-item" data-var="${k}">
        <div class="si-name">${typeof v === 'object' ? v.label : v}</div>
        <span class="si-arr">›</span>
      </div>`).join('');
    body.innerHTML = `
      <button class="btn-back" id="bb2">‹ ${catData.label}</button>
      <div class="lbl" style="margin:10px 0 6px">Variante</div>
      <div class="sel-list">${items}</div>`;
    body.querySelector('#bb2').addEventListener('click', () => { S.drawer.step=2; renderDrawer(); });
    body.querySelectorAll('.sel-item').forEach(i =>
      i.addEventListener('click', () => {
        const dateVal = S.drawer._exDate || S.drawer._date || DB.todayId();
        addEntry(cat, ex, i.dataset.var, dateVal);
        closeDrawer();
      }));
  }

  // ── STEP 4 : Choix du type d'activité ─────────────
  else if (step === 4) {
    title.textContent = 'Type d\'activité';

    // ── Vue A : groupes (course vs autres) ──
    if (!S.drawer.actGroup) {
      crumb.innerHTML = '<span>Activité</span>';
      const runningItems = ACTIVITY_GROUPS[0].keys.map(k => ACTIVITY_CATALOG[k]?.label).filter(Boolean);
      const otherItems = ACTIVITY_GROUPS[1].keys.map(k => {
        const v = ACTIVITY_CATALOG[k];
        return v ? `<div class="sel-item" data-act="${k}">
          <div><div class="si-name" style="color:${v.color}">${v.icon}&nbsp; ${v.label}</div></div>
          <span class="si-arr">›</span>
        </div>` : '';
      }).join('');

      body.innerHTML = `
        <button class="btn-back" id="bb-act">‹ Retour</button>
        <div class="lbl" style="margin:12px 0 6px;color:var(--t3)">Course à pied</div>
        <div class="sel-item sel-item-group" id="btn-running-group">
          <div>
            <div class="si-name" style="color:#5ba3ff">↗&nbsp; Course à pied</div>
            <div class="si-sub">${runningItems.join(' · ')}</div>
          </div>
          <span class="si-arr">›</span>
        </div>
        <div class="lbl" style="margin:16px 0 6px;color:var(--t3)">Autres activités</div>
        <div class="sel-list">${otherItems}</div>`;

      body.querySelector('#bb-act').addEventListener('click', () => { S.drawer.step=1; renderDrawer(); });
      body.querySelector('#btn-running-group').addEventListener('click', () => {
        S.drawer.actGroup = 'running';
        renderDrawer();
      });
      body.querySelectorAll('.sel-item[data-act]').forEach(i =>
        i.addEventListener('click', () => {
          S.drawer.actType = i.dataset.act;
          S.drawer.actBoosts = {};
          S.drawer._distance = null;
          S.drawer._bpm = null;
          S.drawer.step = 5;
          renderDrawer();
        }));
    }

    // ── Vue B : sous-types course ──
    else {
      crumb.innerHTML = '<span>Activité</span> <span style="color:var(--t3)">›</span> <span>Course à pied</span>';
      const items = ACTIVITY_GROUPS[0].keys.map(k => {
        const v = ACTIVITY_CATALOG[k];
        return v ? `<div class="sel-item" data-act="${k}">
          <div><div class="si-name" style="color:${v.color}">${v.icon}&nbsp; ${v.label}</div></div>
          <span class="si-arr">›</span>
        </div>` : '';
      }).join('');

      body.innerHTML = `
        <button class="btn-back" id="bb-running">‹ Activité</button>
        <div class="sel-list">${items}</div>`;

      body.querySelector('#bb-running').addEventListener('click', () => {
        S.drawer.actGroup = null;
        renderDrawer();
      });
      body.querySelectorAll('.sel-item').forEach(i =>
        i.addEventListener('click', () => {
          S.drawer.actType = i.dataset.act;
          S.drawer.actBoosts = {};
          S.drawer._distance = null;
          S.drawer._bpm = null;
          S.drawer._intervals = null;
          S.drawer.step = 5;
          renderDrawer();
        }));
    }
  }

  // ── STEP 5 : Formulaire activité ──────────────────
  else if (step === 5) {
    const actType = S.drawer.actType;
    const act = ACTIVITY_CATALOG[actType];
    if (!act) { console.error('[renderDrawer] step5 — actType invalide:', actType); S.drawer.step=4; S.drawer.actGroup=null; renderDrawer(); return; }
    const boosts = S.drawer.actBoosts || {};
    const boostMuscles = ACTIVITY_BOOST_MUSCLES[actType] || [];
    const isRunning = act.group === 'running';
    const hasDistance = isRunning || !!act.hasDistance;
    if (hasDistance && !isRunning) S.drawer._paceUnit = 'km_h';
    const isIntervals = actType === 'running_intervals';

    title.textContent = act.label;
    crumb.innerHTML = `<span>Activité</span> <span style="color:var(--t3)">›</span> <span style="color:var(--t3)">Course</span> <span style="color:var(--t3)">›</span> <span style="color:${act.color}">${act.label}</span>`;

    const intensityDots = Array.from({length:10}, (_,i) => {
      const v = i + 1;
      const saved = S.drawer._intensity || 0;
      return `<button class="idot${saved===v?' on':''}" data-iv="${v}">${v}</button>`;
    }).join('');

    const boostChips = boostMuscles.map(id => {
      const level = boosts[id] || '';
      return `<button class="boost-chip${level?' '+level:''}" data-bid="${id}">${MUSCLE_LABELS[id]||id}</button>`;
    }).join('');

    const isEdit = S.drawer.editMode;
    const todayId = DB.todayId();
    const defaultDate = S.drawer._actDate || todayId;
    const paceUnit = S.drawer._paceUnit || 'min_km';
    const iv = S.drawer._intervals || {};

    // ── Calcul automatique distance + durée fractionné ──
    function _calcIntervals(warmKm, reps, effortM, recovM, coolKm, warmMin, effortMin, coolMin) {
      const dist = warmKm && reps && effortM && recovM
        ? Math.round(((warmKm || 0) + reps * (effortM + recovM) / 1000 + (coolKm || 0)) * 100) / 100
        : null;
      const dur = (warmMin > 0 && effortMin > 0 && coolMin > 0)
        ? warmMin + effortMin + coolMin
        : null;
      return { dist, dur };
    }

    // ── Formulaire fractionné ──
    if (isIntervals) {
      const calc = _calcIntervals(iv.warmup_km, iv.reps, iv.effort_m, iv.recov_m, iv.cooldown_km, iv.warmup_min, iv.effort_min, iv.cooldown_min);
      const autoKm   = calc.dist;
      const autoMin  = calc.dur;
      const durDisplay = autoMin || S.drawer._duration || '';

      const fragSep = `<div style="border-top:1px solid var(--b1);margin:4px 0;padding-top:8px">`;

      body.innerHTML = `
        <button class="btn-back" id="bb-act-form">‹ Course</button>
        <div class="act-form">
          <div class="act-form-row">
            <div class="fg">
              <label class="fl">Date</label>
              <input class="fi" id="act-date" type="date" value="${defaultDate}" max="${todayId}">
            </div>
          </div>

          ${fragSep}
          <div class="lbl" style="margin-bottom:8px">Échauffement</div>
          <div class="act-form-row">
            <div class="fg">
              <label class="fl">Distance</label>
              <input class="fi" id="iv-warmup-km" type="number" placeholder="2.0" min="0" step="0.1" value="${iv.warmup_km||''}">
              <span style="font-size:11px;color:var(--t3);margin-top:2px;display:block">km</span>
            </div>
            <div class="fg">
              <label class="fl">Durée <span style="color:var(--t3);font-weight:400">opt</span></label>
              <input class="fi" id="iv-warmup-min" type="number" placeholder="15" min="0" max="120" value="${iv.warmup_min||''}">
              <span style="font-size:11px;color:var(--t3);margin-top:2px;display:block">min</span>
            </div>
          </div>

          ${fragSep}
          <div class="lbl" style="margin-bottom:8px">Répétitions</div>
          <div class="act-form-row" style="grid-template-columns:1fr 1fr 1fr">
            <div class="fg">
              <label class="fl">Nombre</label>
              <input class="fi" id="iv-reps" type="number" placeholder="8" min="1" max="100" value="${iv.reps||''}">
            </div>
            <div class="fg">
              <label class="fl">Effort</label>
              <input class="fi" id="iv-effort-m" type="number" placeholder="400" min="10" step="10" value="${iv.effort_m||''}">
              <span style="font-size:11px;color:var(--t3);margin-top:2px;display:block">m</span>
            </div>
            <div class="fg">
              <label class="fl">Récup</label>
              <input class="fi" id="iv-recov-m" type="number" placeholder="200" min="10" step="10" value="${iv.recov_m||''}">
              <span style="font-size:11px;color:var(--t3);margin-top:2px;display:block">m</span>
            </div>
          </div>
          <div class="act-form-row">
            <div class="fg">
              <label class="fl">Durée effort+récup <span style="color:var(--t3);font-weight:400">opt</span></label>
              <input class="fi" id="iv-effort-min" type="number" placeholder="25" min="0" max="300" value="${iv.effort_min||''}">
              <span style="font-size:11px;color:var(--t3);margin-top:2px;display:block">min total</span>
            </div>
          </div>

          ${fragSep}
          <div class="lbl" style="margin-bottom:8px">Retour au calme</div>
          <div class="act-form-row">
            <div class="fg">
              <label class="fl">Distance</label>
              <input class="fi" id="iv-cooldown-km" type="number" placeholder="1.0" min="0" step="0.1" value="${iv.cooldown_km||''}">
              <span style="font-size:11px;color:var(--t3);margin-top:2px;display:block">km</span>
            </div>
            <div class="fg">
              <label class="fl">Durée <span style="color:var(--t3);font-weight:400">opt</span></label>
              <input class="fi" id="iv-cooldown-min" type="number" placeholder="10" min="0" max="120" value="${iv.cooldown_min||''}">
              <span style="font-size:11px;color:var(--t3);margin-top:2px;display:block">min</span>
            </div>
          </div>

          ${autoKm || autoMin ? `${fragSep}
          <div style="display:flex;gap:20px;align-items:center;padding:4px 0">
            ${autoKm ? `<div><span class="pace-val">${autoKm}</span> <span class="pace-unit-label">km total</span></div>` : ''}
            ${autoMin ? `<div><span class="pace-val">${autoMin}</span> <span class="pace-unit-label">min calculées</span></div>` : ''}
          </div>` : ''}

          ${fragSep}
          <div class="act-form-row">
            <div class="fg">
              <label class="fl">Durée totale${autoMin ? ' <span style="color:var(--accent);font-weight:400">auto</span>' : ''}</label>
              <input class="fi" id="act-dur" type="number" placeholder="45" min="1" max="600"
                value="${durDisplay}" ${autoMin ? 'style="opacity:.5"' : ''}>
              <span style="font-size:11px;color:var(--t3);margin-top:2px;display:block">min</span>
            </div>
            <div class="fg">
              <label class="fl">BPM moyen <span style="color:var(--t3);font-weight:400">opt</span></label>
              <input class="fi" id="act-bpm" type="number" placeholder="165" min="50" max="220" value="${S.drawer._bpm||''}">
              <span style="font-size:11px;color:var(--t3);margin-top:2px;display:block">bpm</span>
            </div>
          </div>
          <div class="fg" style="margin-top:4px">
            <label class="fl">Intensité ressentie</label>
            <div class="act-intensity-dots">${intensityDots}</div>
          </div>

          <div style="margin-top:8px">
            <div class="lbl" style="margin-bottom:6px">Muscles extra sollicités <span style="font-weight:400;color:var(--t3)">(optionnel)</span></div>
            <div class="boost-grid">${boostChips}</div>
          </div>
          <button class="btn-act-save" id="btn-act-save">${isEdit ? '✓ Enregistrer' : '＋ Enregistrer la séance'}</button>
          ${isEdit ? `<button class="btn-de" id="btn-act-del" style="margin-top:6px;width:100%">Supprimer l'activité</button>` : ''}
        </div>`;

      body.querySelector('#bb-act-form').addEventListener('click', () => { S.drawer.actGroup='running'; S.drawer.step=4; renderDrawer(); });

      // Snapshot + recalcul live
      const ivIds = ['iv-warmup-km','iv-warmup-min','iv-reps','iv-effort-m','iv-recov-m','iv-effort-min','iv-cooldown-km','iv-cooldown-min'];
      ivIds.forEach(id => {
        document.getElementById(id)?.addEventListener('input', () => {
          S.drawer._actDate = document.getElementById('act-date')?.value || DB.todayId();
          S.drawer._bpm = parseInt(document.getElementById('act-bpm')?.value) || null;
          S.drawer._intervals = {
            warmup_km:   parseFloat(document.getElementById('iv-warmup-km')?.value) || null,
            warmup_min:  parseInt(document.getElementById('iv-warmup-min')?.value) || null,
            reps:        parseInt(document.getElementById('iv-reps')?.value) || null,
            effort_m:    parseInt(document.getElementById('iv-effort-m')?.value) || null,
            recov_m:     parseInt(document.getElementById('iv-recov-m')?.value) || null,
            effort_min:  parseInt(document.getElementById('iv-effort-min')?.value) || null,
            cooldown_km: parseFloat(document.getElementById('iv-cooldown-km')?.value) || null,
            cooldown_min:parseInt(document.getElementById('iv-cooldown-min')?.value) || null,
          };
          renderDrawer();
        });
      });

      // Dots intensité
      body.querySelectorAll('.idot').forEach(btn =>
        btn.addEventListener('click', () => {
          S.drawer._actDate = document.getElementById('act-date')?.value || DB.todayId();
          S.drawer._bpm = parseInt(document.getElementById('act-bpm')?.value) || null;
          S.drawer._intervals = {
            warmup_km:   parseFloat(document.getElementById('iv-warmup-km')?.value) || null,
            warmup_min:  parseInt(document.getElementById('iv-warmup-min')?.value) || null,
            reps:        parseInt(document.getElementById('iv-reps')?.value) || null,
            effort_m:    parseInt(document.getElementById('iv-effort-m')?.value) || null,
            recov_m:     parseInt(document.getElementById('iv-recov-m')?.value) || null,
            effort_min:  parseInt(document.getElementById('iv-effort-min')?.value) || null,
            cooldown_km: parseFloat(document.getElementById('iv-cooldown-km')?.value) || null,
            cooldown_min:parseInt(document.getElementById('iv-cooldown-min')?.value) || null,
          };
          S.drawer._intensity = parseInt(btn.dataset.iv);
          renderDrawer();
        }));

      body.querySelectorAll('.boost-chip').forEach(btn =>
        btn.addEventListener('click', () => {
          const id = btn.dataset.bid;
          const cur = boosts[id] || '';
          if (!cur) boosts[id] = 'moderate';
          else if (cur === 'moderate') boosts[id] = 'high';
          else delete boosts[id];
          renderDrawer();
        }));

      // Enregistrer
      body.querySelector('#btn-act-save').addEventListener('click', () => {
        const ivData = {
          warmup_km:   parseFloat(document.getElementById('iv-warmup-km')?.value) || null,
          warmup_min:  parseInt(document.getElementById('iv-warmup-min')?.value) || null,
          reps:        parseInt(document.getElementById('iv-reps')?.value) || null,
          effort_m:    parseInt(document.getElementById('iv-effort-m')?.value) || null,
          recov_m:     parseInt(document.getElementById('iv-recov-m')?.value) || null,
          effort_min:  parseInt(document.getElementById('iv-effort-min')?.value) || null,
          cooldown_km: parseFloat(document.getElementById('iv-cooldown-km')?.value) || null,
          cooldown_min:parseInt(document.getElementById('iv-cooldown-min')?.value) || null,
        };
        const calcResult = _calcIntervals(ivData.warmup_km, ivData.reps, ivData.effort_m, ivData.recov_m, ivData.cooldown_km, ivData.warmup_min, ivData.effort_min, ivData.cooldown_min);
        const dur = calcResult.dur || parseInt(document.getElementById('act-dur')?.value) || null;
        const dist = calcResult.dist;
        const bpmVal = parseInt(document.getElementById('act-bpm')?.value) || null;
        const intensity = S.drawer._intensity || 0;
        const dateVal = document.getElementById('act-date')?.value || DB.todayId();
        // Stocker les détails intervals dans l'entrée
        const extraBoosts = { ...boosts };
        if (!dur || dur <= 0) {
          const inp = document.getElementById('act-dur');
          if (inp) { inp.classList.add('err'); setTimeout(() => inp.classList.remove('err'), 400); inp.focus(); }
          return;
        }
        if (!intensity) { showPrToast('⚠ Renseigne l\'intensité ressentie'); return; }
        if (S.drawer.editMode) {
          updateActivity(S.drawer.editSessionId, S.drawer.editEntryId, dur, intensity, extraBoosts, dateVal, dist, bpmVal, 'min_km', ivData);
        } else {
          addActivity(actType, dur, intensity, extraBoosts, dateVal, dist, bpmVal, 'min_km', ivData);
        }
        closeDrawer();
      });

      body.querySelector('#btn-act-del')?.addEventListener('click', () => {
        if (!confirm('Supprimer cette activité ?')) return;
        deleteActivity(S.drawer.editSessionId, S.drawer.editEntryId);
        closeDrawer();
      });
      return;
    }

    // ── Formulaire standard (running non-fractionné + autres activités) ──
    const distVal = S.drawer._distance;
    const durVal = S.drawer._duration;
    let paceHtml = '';
    if (distVal && durVal && distVal > 0 && durVal > 0) {
      if (paceUnit === 'min_km') {
        const totalMin = durVal / distVal;
        const mins = Math.floor(totalMin);
        const secs = Math.round((totalMin - mins) * 60);
        paceHtml = `<div class="pace-display"><span class="pace-val">${mins}:${secs.toString().padStart(2,'0')}</span> <span class="pace-unit-label">min/km</span></div>`;
      } else {
        const kmh = (distVal / durVal) * 60;
        paceHtml = `<div class="pace-display"><span class="pace-val">${kmh.toFixed(1)}</span> <span class="pace-unit-label">km/h</span></div>`;
      }
    }

    const runningFields = hasDistance ? `
      <div class="act-form-row">
        <div class="fg">
          <label class="fl">Distance <span style="color:var(--t3);font-weight:400">optionnel</span></label>
          <input class="fi" id="act-dist" type="number" placeholder="10.5" min="0" step="0.1"
            value="${distVal || ''}">
          <span style="font-size:11px;color:var(--t3);margin-top:3px;display:block">km</span>
        </div>
        <div class="fg">
          <label class="fl">BPM moyen <span style="color:var(--t3);font-weight:400">optionnel</span></label>
          <input class="fi" id="act-bpm" type="number" placeholder="155" min="50" max="220"
            value="${S.drawer._bpm || ''}">
          <span style="font-size:11px;color:var(--t3);margin-top:3px;display:block">bpm</span>
        </div>
      </div>
      ${paceHtml ? `
      <div style="display:flex;align-items:center;justify-content:space-between">
        ${paceHtml}
        ${isRunning ? `<button class="pace-toggle" id="btn-pace-toggle">${paceUnit === 'min_km' ? 'Afficher km/h' : 'Afficher min/km'}</button>` : ''}
      </div>` : ''}` : '';

    body.innerHTML = `
      <button class="btn-back" id="bb-act-form">‹ ${isRunning ? 'Course' : act.icon + ' Type'}</button>
      <div class="act-form">
        <div class="act-form-row">
          <div class="fg">
            <label class="fl">Date</label>
            <input class="fi" id="act-date" type="date" value="${defaultDate}" max="${todayId}">
          </div>
        </div>
        <div class="act-form-row">
          <div class="fg">
            <label class="fl">Durée (min)</label>
            <input class="fi" id="act-dur" type="number" placeholder="45" min="1" max="480"
              value="${S.drawer._duration || ''}">
          </div>
          <div class="fg">
            <label class="fl">Intensité ressentie</label>
            <div class="act-intensity-dots">${intensityDots}</div>
          </div>
        </div>
        ${runningFields}
        <div>
          <div class="lbl" style="margin-bottom:6px">Muscles extra sollicités <span style="font-weight:400;color:var(--t3)">(optionnel · tap = modéré · 2× = intense)</span></div>
          <div class="boost-grid">${boostChips}</div>
        </div>
        <button class="btn-act-save" id="btn-act-save">${isEdit ? '✓ Enregistrer la modification' : '＋ Enregistrer l\'activité'}</button>
        ${isEdit ? `<button class="btn-de" id="btn-act-del" style="margin-top:6px;width:100%">Supprimer l'activité</button>` : ''}
      </div>`;

    body.querySelector('#bb-act-form').addEventListener('click', () => {
      if (isRunning) { S.drawer.actGroup = 'running'; }
      S.drawer.step = 4;
      renderDrawer();
    });

    // Helper : snapshot des champs courants dans S.drawer
    function _snapshotFields() {
      S.drawer._duration = parseInt(document.getElementById('act-dur')?.value) || null;
      S.drawer._actDate  = document.getElementById('act-date')?.value || DB.todayId();
      if (hasDistance) {
        const d = parseFloat(document.getElementById('act-dist')?.value);
        const b = parseInt(document.getElementById('act-bpm')?.value);
        S.drawer._distance = d > 0 ? d : null;
        S.drawer._bpm      = b > 0 ? b : null;
      }
    }

    // Recalcul pace en live
    if (hasDistance) {
      ['act-dur','act-dist'].forEach(id => {
        document.getElementById(id)?.addEventListener('input', () => { _snapshotFields(); renderDrawer(); });
      });
      if (isRunning) {
        document.getElementById('btn-pace-toggle')?.addEventListener('click', () => {
          _snapshotFields();
          S.drawer._paceUnit = paceUnit === 'min_km' ? 'km_h' : 'min_km';
          renderDrawer();
        });
      }
    }

    // Dots intensité
    body.querySelectorAll('.idot').forEach(btn =>
      btn.addEventListener('click', () => {
        _snapshotFields();
        S.drawer._intensity = parseInt(btn.dataset.iv);
        renderDrawer();
      }));

    // Chips boosts
    body.querySelectorAll('.boost-chip').forEach(btn =>
      btn.addEventListener('click', () => {
        _snapshotFields();
        const id = btn.dataset.bid;
        const cur = boosts[id] || '';
        if (!cur) boosts[id] = 'moderate';
        else if (cur === 'moderate') boosts[id] = 'high';
        else delete boosts[id];
        renderDrawer();
      }));

    // Enregistrer / Modifier
    body.querySelector('#btn-act-save').addEventListener('click', () => {
      const dur = parseInt(document.getElementById('act-dur')?.value);
      const intensity = S.drawer._intensity || 0;
      const dateVal = document.getElementById('act-date')?.value || DB.todayId();
      const dist = hasDistance ? (parseFloat(document.getElementById('act-dist')?.value) || null) : null;
      const bpm  = hasDistance ? (parseInt(document.getElementById('act-bpm')?.value) || null) : null;
      if (!dur || dur <= 0) {
        const inp = document.getElementById('act-dur');
        if (inp) { inp.classList.add('err'); setTimeout(() => inp.classList.remove('err'), 400); inp.focus(); }
        return;
      }
      if (!intensity) { showPrToast('⚠ Renseigne l\'intensité ressentie'); return; }
      if (S.drawer.editMode) {
        updateActivity(S.drawer.editSessionId, S.drawer.editEntryId, dur, intensity, { ...boosts }, dateVal, dist, bpm, S.drawer._paceUnit);
      } else {
        addActivity(actType, dur, intensity, { ...boosts }, dateVal, dist, bpm, S.drawer._paceUnit);
      }
      closeDrawer();
    });

    // Supprimer (mode edit uniquement)
    body.querySelector('#btn-act-del')?.addEventListener('click', () => {
      if (!confirm('Supprimer cette activité ?')) return;
      deleteActivity(S.drawer.editSessionId, S.drawer.editEntryId);
      closeDrawer();
    });
  }
}

function addEntry(category, exerciseId, variantId, targetDateId) {
  const entry = { id: uid(), category, exerciseId, variantId, sets: [], ts: Date.now() };
  const dateId = targetDateId || DB.todayId();
  const todayId = DB.todayId();

  if (dateId === todayId) {
    S.today.entries.push(entry);
    S.expandedEntry = entry.id;
    DB.saveToday(S.today);
    rebuildFatigue();
    PR_ENGINE.rebuild();
    renderToday();
  } else {
    const all = DB.load();
    let s = all.find(x => x.id === dateId);
    if (!s) {
      s = { id: dateId, metrics: { energy: null, sleep: null, bodyweight: null, notes: '' }, entries: [] };
      all.push(s);
      all.sort((a, b) => b.id.localeCompare(a.id));
    }
    s.entries.push(entry);
    DB.save(all);
    rebuildFatigue();
    PR_ENGINE.rebuild();
    // Naviguer vers l'historique et ouvrir la bonne session
    S.expandedHist = dateId;
    switchTab('history');
    showPrToast('✓ Exercice ajouté à ' + fmtDateShort(dateId));
  }
}

function addActivity(activityType, duration, intensity, boosts, targetDateId, distance, bpm, paceUnit, intervals) {
  const entry = {
    id: uid(), type: 'activity', activityType, duration, intensity,
    boosts: boosts || {}, ts: Date.now()
  };
  if (distance) entry.distance = distance;
  if (bpm) entry.bpm = bpm;
  if (paceUnit) entry.paceUnit = paceUnit;
  if (intervals) entry.intervals = intervals;
  const dateId = targetDateId || DB.todayId();
  const todayId = DB.todayId();

  if (dateId === todayId) {
    S.today.entries.push(entry);
    DB.saveToday(S.today);
  } else {
    const all = DB.load();
    let s = all.find(x => x.id === dateId);
    if (!s) {
      s = { id: dateId, metrics: { energy: null, sleep: null, bodyweight: null, notes: '' }, entries: [] };
      all.push(s);
      all.sort((a, b) => b.id.localeCompare(a.id));
    }
    s.entries.push(entry);
    DB.save(all);
  }
  rebuildFatigue();
  PR_ENGINE.rebuild();
  if (dateId === todayId) renderToday();
}

function updateActivity(sessionId, entryId, duration, intensity, boosts, newDateId, distance, bpm, paceUnit, intervals) {
  const all = DB.load();
  const todayId = DB.todayId();
  const targetDate = newDateId || sessionId;

  const _applyFields = (e) => {
    e.duration = duration; e.intensity = intensity; e.boosts = boosts;
    if (distance) e.distance = distance; else delete e.distance;
    if (bpm) e.bpm = bpm; else delete e.bpm;
    if (paceUnit) e.paceUnit = paceUnit; else delete e.paceUnit;
    if (intervals) e.intervals = intervals; else delete e.intervals;
  };

  if (targetDate === sessionId) {
    // Modification sur place
    const s = all.find(x => x.id === sessionId);
    if (!s) return;
    const e = s.entries.find(x => x.id === entryId);
    if (!e) return;
    _applyFields(e);
  } else {
    // Déplacement vers une autre date
    const s = all.find(x => x.id === sessionId);
    if (!s) return;
    const eIdx = s.entries.findIndex(x => x.id === entryId);
    if (eIdx < 0) return;
    const [e] = s.entries.splice(eIdx, 1);
    _applyFields(e); e.ts = Date.now();
    let newS = all.find(x => x.id === targetDate);
    if (!newS) {
      newS = { id: targetDate, metrics: { energy: null, sleep: null, bodyweight: null, notes: '' }, entries: [] };
      all.push(newS);
      all.sort((a, b) => b.id.localeCompare(a.id));
    }
    newS.entries.push(e);
  }

  DB.save(all);
  // Synchronise S.today si elle est affectée
  const freshToday = all.find(x => x.id === todayId);
  if (freshToday) S.today = freshToday;
  rebuildFatigue();
  PR_ENGINE.rebuild();
  if (S.expandedHist && S.expandedHist !== targetDate) S.expandedHist = targetDate;
  if (S.tab === 'history') renderHistory();
  if (S.tab === 'today') renderToday();
}

function deleteActivity(sessionId, entryId) {
  const all = DB.load();
  const todayId = DB.todayId();
  const s = all.find(x => x.id === sessionId);
  if (!s) return;
  s.entries = s.entries.filter(x => x.id !== entryId);
  DB.save(all);
  const freshToday = all.find(x => x.id === todayId);
  if (freshToday) S.today = freshToday;
  rebuildFatigue();
  PR_ENGINE.rebuild();
  if (S.tab === 'history') renderHistory();
  if (S.tab === 'today') renderToday();
}
