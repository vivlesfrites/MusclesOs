<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>MuscleOS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #080a0f;
      --s1:      #0d1017;
      --s2:      #141a24;
      --s3:      #1c2331;
      --b1:      #222a37;
      --b2:      #2c3848;
      --b3:      #3a4558;
      --t1:      #e8edf5;
      --t2:      #9aa3b8;
      --t3:      #6b7a94;
      --accent:  #3dffa0;
      --abg:     rgba(61,255,160,.09);
      --amid:    #1a5c40;
      --orange:  #ffaa3d;
      --red:     #ff5252;
      --blue:    #5ba3ff;
      --c-chest:    #ff6b6b;
      --c-back:     #5ba3ff;
      --c-shoulders:#ffaa3d;
      --c-arms:     #c084fc;
      --c-legs:     #3dffa0;
      --c-core:     #ffd166;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'DM Sans', sans-serif;
      --r:  8px;
      --rl: 12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--t1);
      font-family: var(--sans);
      font-size: 15px;
      line-height: 1.5;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── HEADER ── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(8,10,15,.93);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--b1);
      height: 52px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 18px;
    }
    .brand { display: flex; align-items: baseline; gap: 7px; }
    .brand-name {
      font-family: var(--mono); font-size: 15px; font-weight: 600;
      letter-spacing: -.02em; color: var(--accent);
    }
    .brand-v {
      font-family: var(--mono); font-size: 10px;
      color: var(--t3); letter-spacing: .06em;
    }
    #hdr-date {
      font-family: var(--mono); font-size: 11px;
      color: var(--t3); text-transform: uppercase; letter-spacing: .04em;
    }

    /* ── NAV ── */
    nav {
      background: var(--bg);
      border-bottom: 1px solid var(--b1);
      display: flex; padding: 0 18px;
    }
    .tab-btn {
      background: none; border: none;
      padding: 13px 14px 11px;
      font-family: var(--sans); font-size: 13px; font-weight: 500;
      color: var(--t3); cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      letter-spacing: .02em;
      transition: color .15s, border-color .15s;
    }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-btn:hover:not(.active) { color: var(--t1); }

    /* ── MAIN ── */
    main { max-width: 640px; margin: 0 auto; padding: 18px 16px 100px; }
    .tab { display: none; }
    .tab.active { display: block; }

    /* ── LABELS ── */
    .lbl {
      font-family: var(--mono); font-size: 10px; font-weight: 600;
      letter-spacing: .12em; text-transform: uppercase; color: var(--t3);
    }
    .sec-hdr {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px;
    }

    /* ── METRICS ── */
    .metrics-row {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px; margin-bottom: 10px;
    }
    .metrics-row-bw {
      margin-bottom: 10px;
    }
    .metric-card {
      background: var(--s1); border: 1px solid var(--b1);
      border-radius: var(--rl); padding: 14px 14px 12px;
    }
    .metric-card-bw {
      background: var(--s1); border: 1px solid var(--b1);
      border-radius: var(--rl); padding: 14px 14px 12px;
      display: grid; grid-template-columns: auto 1fr; gap: 0 16px; align-items: start;
    }
    .metric-lbl { margin-bottom: 10px; }

    .energy-dots { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 6px; }
    .edot {
      width: 25px; height: 25px; border-radius: 4px;
      background: var(--s2); border: 1px solid var(--b1);
      font-family: var(--mono); font-size: 10px; color: var(--t3);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all .12s; flex-shrink: 0;
    }
    .edot:hover:not(.on) { border-color: var(--b2); color: var(--t1); }
    .edot.on { background: var(--amid); border-color: var(--accent); color: var(--accent); }
    .energy-val {
      font-family: var(--mono); font-size: 24px; font-weight: 600;
      color: var(--t3); line-height: 1;
      transition: color .2s;
    }
    .energy-val.set { color: var(--accent); }

    .sleep-wrap { margin-top: 4px; }
    .sleep-inp {
      background: var(--s2); border: 1px solid var(--b1);
      border-radius: var(--r); padding: 6px 10px;
      font-family: var(--mono); font-size: 22px; font-weight: 500;
      color: var(--t1); width: 100%; outline: none;
      transition: border-color .15s;
      -moz-appearance: textfield;
    }
    .sleep-inp::-webkit-outer-spin-button,
    .sleep-inp::-webkit-inner-spin-button { -webkit-appearance: none; }
    .sleep-inp:focus { border-color: var(--accent); }
    .sleep-unit { font-size: 10px; color: var(--t3); margin-top: 3px; }

    /* Bodyweight input */
    .bw-input-wrap { }
    .bw-inp {
      background: var(--s2); border: 1px solid var(--b1);
      border-radius: var(--r); padding: 6px 10px;
      font-family: var(--mono); font-size: 22px; font-weight: 500;
      color: var(--t1); width: 100px; outline: none;
      transition: border-color .15s;
      -moz-appearance: textfield;
    }
    .bw-inp::-webkit-outer-spin-button,
    .bw-inp::-webkit-inner-spin-button { -webkit-appearance: none; }
    .bw-inp:focus { border-color: var(--accent); }
    .bw-unit { font-size: 10px; color: var(--t3); margin-top: 3px; }
    .bw-delta {
      font-family: var(--mono); font-size: 11px; margin-top: 4px;
    }
    .bw-delta.up   { color: var(--orange); }
    .bw-delta.down { color: var(--accent); }
    .bw-delta.eq   { color: var(--t3); }
    /* Sparkline poids */
    .bw-spark {
      grid-column: 2; align-self: end;
    }
    .bw-spark svg { display: block; width: 100%; height: 52px; }

    /* ── NOTES ── */
    .notes-card {
      background: var(--s1); border: 1px solid var(--b1);
      border-radius: var(--rl); padding: 12px 14px; margin-bottom: 22px;
    }
    .notes-ta {
      background: none; border: none; outline: none;
      font-family: var(--sans); font-size: 13px; color: var(--t2);
      width: 100%; resize: none; line-height: 1.5; min-height: 44px;
    }
    .notes-ta::placeholder { color: var(--t3); }

    /* ── STATS BAR ── */
    .stats-bar {
      display: flex; align-items: center; gap: 14px;
      padding: 7px 14px; background: var(--s2);
      border: 1px solid var(--b1); border-radius: 6px;
      margin-bottom: 12px;
    }
    .sb-item {
      font-family: var(--mono); font-size: 11px; color: var(--t2);
    }
    .sb-item strong { color: var(--accent); }

    /* ── ENTRIES ── */
    .entry-empty {
      text-align: center; padding: 36px 16px;
      border: 1px dashed var(--b1); border-radius: var(--rl);
      color: var(--t3); font-size: 13px; margin-bottom: 12px;
    }
    .entry-empty em { color: var(--t2); font-style: normal; }

    .entry-card {
      background: var(--s1); border: 1px solid var(--b1);
      border-radius: var(--rl); margin-bottom: 8px;
      overflow: hidden; transition: border-color .15s;
    }
    .entry-card.open { border-color: var(--b2); }

    .entry-hdr {
      display: flex; align-items: center; gap: 10px;
      padding: 13px 14px; cursor: pointer;
      transition: background .12s; user-select: none;
    }
    .entry-hdr:hover { background: var(--s2); }

    .e-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .e-info { flex: 1; min-width: 0; }
    .e-name {
      font-size: 14px; font-weight: 500; color: var(--t1);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .e-var { font-size: 11px; color: var(--t3); margin-top: 1px; }
    .e-stats {
      font-family: var(--mono); font-size: 11px;
      color: var(--t2); text-align: right; flex-shrink: 0;
    }
    .e-chev {
      color: var(--t3); font-size: 11px;
      transition: transform .2s; flex-shrink: 0;
    }
    .entry-card.open .e-chev { transform: rotate(180deg); }

    /* ── SETS PANEL ── */
    .sets-panel {
      border-top: 1px solid var(--b1);
      padding: 10px 14px 14px;
    }
    .sets-list { margin-bottom: 4px; }
    .set-row {
      display: grid;
      grid-template-columns: 22px 1fr 1fr 1fr auto 24px;
      gap: 6px; align-items: center;
      padding: 6px 0; border-bottom: 1px solid var(--b1);
    }
    .set-row:last-of-type { border-bottom: none; }
    .set-n { font-family: var(--mono); font-size: 10px; color: var(--t3); }
    .sv { font-family: var(--mono); font-size: 13px; color: var(--t1); }
    .su { font-size: 10px; color: var(--t3); }

    .pr-badge {
      display: inline-flex; align-items: center; justify-content: center;
      font-family: var(--mono); font-size: 9px; font-weight: 600;
      letter-spacing: .06em;
      background: var(--amid); color: var(--accent);
      border: 1px solid var(--accent); border-radius: 4px;
      padding: 1px 5px; line-height: 1.4;
      white-space: nowrap;
    }
    .pr-badge.pr-1rm { background: rgba(61,255,160,.04); }

    /* ── ACTIVITÉS ── */
    .act-section-lbl {
      font-family: var(--mono); font-size: 10px; font-weight: 600;
      letter-spacing: .12em; text-transform: uppercase; color: var(--t3);
      padding: 10px 2px 6px; display: block;
    }
    .act-type-chip {
      background: var(--s2); border: 1px solid var(--b1);
      border-radius: var(--r); padding: 10px 14px;
      cursor: pointer; transition: border-color .12s, background .12s;
      display: flex; align-items: center; gap: 10px;
    }
    .act-type-chip:hover { border-color: var(--b2); background: var(--s3); }
    .act-type-chip .cc-icon { font-size: 16px; }
    .act-type-chip .cc-label { font-size: 13px; color: var(--t1); font-weight: 500; }

    /* Carte activité dans le journal */
    .act-card {
      background: var(--s1); border: 1px solid var(--b1);
      border-radius: var(--rl); margin-bottom: 8px;
      overflow: hidden; transition: border-color .15s;
    }
    .act-card.open { border-color: var(--b2); }
    .act-hdr {
      display: flex; align-items: center; gap: 10px;
      padding: 13px 14px; cursor: pointer;
      transition: background .12s; user-select: none;
    }
    .act-hdr:hover { background: var(--s2); }
    .act-icon {
      width: 28px; height: 28px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0;
    }
    .act-info { flex: 1; min-width: 0; }
    .act-name { font-size: 14px; font-weight: 500; color: var(--t1); }
    .act-meta { font-size: 11px; color: var(--t3); margin-top: 1px; }
    .act-stats {
      font-family: var(--mono); font-size: 11px; color: var(--t2);
      text-align: right; flex-shrink: 0;
    }
    .act-panel { padding: 0 14px 12px; }
    .boost-section { margin-top: 10px; }
    .boost-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
    .boost-chip {
      font-family: var(--mono); font-size: 10px;
      padding: 3px 8px; border-radius: 4px;
      border: 1px solid var(--b2); color: var(--t2);
      background: var(--s2); cursor: pointer;
      transition: all .12s;
    }
    .boost-chip.moderate { border-color: var(--orange); color: var(--orange); background: rgba(255,170,61,.08); }
    .boost-chip.high     { border-color: var(--red); color: var(--red); background: rgba(255,82,82,.08); }

    /* Formulaire activité dans le drawer */
    .act-form { display: flex; flex-direction: column; gap: 14px; padding: 4px 0; }
    .act-form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .act-intensity-dots { display: flex; gap: 4px; flex-wrap: wrap; }
    .idot {
      width: 28px; height: 28px; border-radius: 4px;
      background: var(--s2); border: 1px solid var(--b1);
      font-family: var(--mono); font-size: 10px; color: var(--t3);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all .12s; flex-shrink: 0;
    }
    .idot:hover:not(.on) { border-color: var(--b2); color: var(--t1); }
    .idot.on { background: var(--amid); border-color: var(--accent); color: var(--accent); }
    .btn-act-save {
      background: var(--amid); border: 1px solid var(--accent);
      color: var(--accent); border-radius: var(--r);
      padding: 10px; font-family: var(--sans); font-size: 13px; font-weight: 600;
      cursor: pointer; width: 100%; transition: background .12s;
      margin-top: 4px;
    }
    .btn-act-save:hover { background: rgba(61,255,160,.18); }


    #pr-toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--s2); border: 1px solid var(--accent);
      border-radius: 20px; padding: 8px 18px;
      font-family: var(--mono); font-size: 13px; font-weight: 600;
      color: var(--accent); letter-spacing: .02em;
      opacity: 0; pointer-events: none;
      transition: opacity .2s, transform .2s;
      z-index: 200; white-space: nowrap;
    }
    #pr-toast.show {
      opacity: 1; transform: translateX(-50%) translateY(0);
    }

    .btn-ds {
      background: none; border: none; color: var(--t3);
      cursor: pointer; font-size: 12px; padding: 0; line-height: 1;
      transition: color .12s;
    }
    .btn-ds:hover { color: var(--red); }

    .add-set-form {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr auto;
      gap: 8px; align-items: end; margin-top: 10px;
    }
    .fg { display: flex; flex-direction: column; gap: 3px; }
    .fl {
      font-family: var(--mono); font-size: 9px; font-weight: 600;
      letter-spacing: .1em; text-transform: uppercase; color: var(--t3);
    }
    .fi {
      background: var(--s2); border: 1px solid var(--b1);
      border-radius: var(--r); padding: 7px 8px;
      font-family: var(--mono); font-size: 14px; color: var(--t1);
      width: 100%; outline: none; transition: border-color .15s;
      -moz-appearance: textfield;
    }
    .fi::-webkit-outer-spin-button,
    .fi::-webkit-inner-spin-button { -webkit-appearance: none; }
    .fi:focus { border-color: var(--accent); }
    .fi::placeholder { color: var(--t3); }
    .fi.err { border-color: var(--red); animation: shake .3s ease; }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }

    .btn-log {
      background: var(--amid); border: 1px solid var(--accent);
      border-radius: var(--r); padding: 7px 12px;
      font-family: var(--mono); font-size: 11px; font-weight: 600;
      color: var(--accent); cursor: pointer; white-space: nowrap;
      transition: background .15s; align-self: end;
    }
    .btn-log:hover { background: rgba(61,255,160,.2); }

    .entry-foot {
      display: flex; align-items: center; justify-content: flex-end;
      padding: 8px 14px; border-top: 1px solid var(--b1);
    }
    .btn-de {
      background: none; border: none;
      font-size: 11px; color: var(--t3);
      cursor: pointer; transition: color .12s;
    }
    .btn-de:hover { color: var(--red); }

    /* ── ADD BUTTON ── */
    .btn-add-ex {
      width: 100%; background: var(--s1);
      border: 1px dashed var(--b2); border-radius: var(--rl);
      padding: 15px; font-family: var(--sans); font-size: 14px;
      font-weight: 500; color: var(--t2); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      gap: 8px; transition: all .15s; margin-top: 4px;
    }
    .btn-add-ex:hover {
      border-color: var(--accent); color: var(--accent);
      background: var(--abg);
    }

    /* ── OVERLAY + DRAWER ── */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.55);
      z-index: 200; opacity: 0; pointer-events: none;
      transition: opacity .25s;
    }
    .overlay.on { opacity: 1; pointer-events: all; }

    .drawer {
      position: fixed; bottom: 0; left: 0; right: 0;
      max-width: 640px; margin: 0 auto;
      background: var(--s1);
      border: 1px solid var(--b2); border-bottom: none;
      border-radius: 14px 14px 0 0;
      z-index: 201;
      transform: translateY(100%);
      transition: transform .28s cubic-bezier(.32,.72,0,1);
      max-height: 78vh; display: flex; flex-direction: column;
    }
    .drawer.on { transform: translateY(0); }

    .d-pill {
      width: 34px; height: 4px; background: var(--b2);
      border-radius: 2px; margin: 10px auto 0; flex-shrink: 0;
    }
    .d-top {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px 12px;
      border-bottom: 1px solid var(--b1); flex-shrink: 0;
    }
    .d-title { font-size: 15px; font-weight: 600; color: var(--t1); }
    .d-breadcrumb {
      font-family: var(--mono); font-size: 10px;
      color: var(--t3); margin-top: 3px; letter-spacing: .04em;
    }
    .d-breadcrumb span { color: var(--t2); }
    .btn-dc {
      background: none; border: none; color: var(--t2);
      font-size: 16px; cursor: pointer; padding: 0; line-height: 1;
    }
    .btn-dc:hover { color: var(--t1); }
    .d-body { padding: 14px 18px 28px; overflow-y: auto; flex: 1; }

    .btn-back {
      background: none; border: none; color: var(--t2);
      font-size: 12px; cursor: pointer; padding: 0; margin-bottom: 14px;
      display: flex; align-items: center; gap: 5px;
      transition: color .12s;
    }
    .btn-back:hover { color: var(--t1); }

    /* category chips */
    .cat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .cat-chip {
      background: var(--s2); border: 1px solid var(--b1);
      border-radius: var(--r); padding: 14px 8px; text-align: center;
      cursor: pointer; transition: all .15s;
    }
    .cat-chip:hover { border-color: var(--b2); background: var(--s3); }
    .cc-icon { font-size: 15px; display: block; margin-bottom: 5px; }
    .cc-label { font-size: 12px; font-weight: 500; color: var(--t1); }
    .cc-count { font-size: 10px; color: var(--t3); margin-top: 2px; }

    /* exercise / variant list */
    .sel-list { display: flex; flex-direction: column; gap: 6px; }
    .sel-item {
      background: var(--s2); border: 1px solid var(--b1);
      border-radius: var(--r); padding: 11px 14px; cursor: pointer;
      display: flex; align-items: center; justify-content: space-between;
      transition: all .15s;
    }
    .sel-item:hover { border-color: var(--b2); background: var(--s3); }
    .si-name { font-size: 14px; font-weight: 500; color: var(--t1); }
    .si-sub { font-size: 11px; color: var(--t3); margin-top: 2px; }
    .si-arr { color: var(--t3); font-size: 12px; }

    /* ── HISTORY ── */
    .hist-empty {
      text-align: center; padding: 60px 16px;
      color: var(--t3); font-size: 13px;
    }
    .hist-session {
      background: var(--s1); border: 1px solid var(--b1);
      border-radius: var(--rl); margin-bottom: 8px; overflow: hidden;
    }
    .hist-hdr {
      display: flex; align-items: center; justify-content: space-between;
      padding: 13px 14px; cursor: pointer; transition: background .12s;
      user-select: none;
    }
    .hist-hdr:hover { background: var(--s2); }
    .h-date {
      font-family: var(--mono); font-size: 11px; font-weight: 600;
      color: var(--accent); text-transform: uppercase; letter-spacing: .04em;
    }
    .h-exs { font-size: 12px; color: var(--t2); margin-top: 3px; }
    .h-right { text-align: right; flex-shrink: 0; }
    .h-vol { font-family: var(--mono); font-size: 12px; color: var(--t1); }
    .h-sets { font-family: var(--mono); font-size: 10px; color: var(--t3); margin-top: 2px; }

    .hist-detail { border-top: 1px solid var(--b1); padding: 10px 14px; }
    .h-meta { font-size: 11px; color: var(--t2); margin-bottom: 8px; }
    .hist-entry {
      display: flex; align-items: center; justify-content: space-between;
      padding: 5px 0; border-bottom: 1px solid var(--b1); font-size: 12px;
    }
    .hist-entry:last-child { border-bottom: none; }
    .he-name {
      font-weight: 500; color: var(--t1);
      display: flex; align-items: center; gap: 6px;
    }
    .he-var { font-size: 10px; color: var(--t3); }
    .he-sets { font-family: var(--mono); font-size: 11px; color: var(--t2); }


    /* ── DRAWER DATE ROW (step 1) ── */
    .drawer-date-row {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 14px;
    }
    .drawer-date-row .fl { white-space: nowrap; flex-shrink: 0; }
    .drawer-date-row .fi { flex: 1; }

    .btn-del-session {
      background: none; border: 1px solid var(--b2); border-radius: var(--r);
      color: var(--t3); font-family: var(--mono); font-size: 11px;
      padding: 5px 12px; cursor: pointer; transition: all .15s; width: 100%;
    }
    .btn-del-session:hover { border-color: var(--red); color: var(--red); background: rgba(239,68,68,.06); }

    /* ── HISTORY EXERCISE ENTRY ÉTENDUE ── */
    .hist-entry-full {
      border-bottom: 1px solid var(--b1); padding: 6px 0;
    }
    .hist-entry-full:last-child { border-bottom: none; }
    .hist-entry-hdr {
      display: flex; align-items: center; justify-content: space-between; font-size: 12px;
      margin-bottom: 4px;
    }
    .hist-sets-list { margin: 4px 0 6px; }
    .hist-add-set {
      display: flex; gap: 6px; align-items: center; flex-wrap: wrap; padding: 4px 0 2px;
    }
    .btn-log-set {
      background: var(--s2); border: 1px solid var(--b2); border-radius: var(--r);
      color: var(--accent); font-family: var(--mono); font-size: 11px; font-weight: 600;
      padding: 6px 10px; cursor: pointer; white-space: nowrap;
      transition: background .15s;
    }
    .btn-log-set:hover { background: var(--s3); }

    /* ── FATIGUE TAB ── */
    .fat-topbar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .fat-updated {
      font-family: var(--mono); font-size: 10px; color: var(--t3);
    }
    .btn-fat-reset {
      background: none; border: 1px solid var(--b2);
      border-radius: 5px; padding: 4px 10px;
      font-family: var(--mono); font-size: 10px; color: var(--t3);
      cursor: pointer; transition: all .15s; letter-spacing: .04em;
    }
    .btn-fat-reset:hover { border-color: var(--red); color: var(--red); }

    .fat-group {
      background: var(--s1); border: 1px solid var(--b1);
      border-radius: var(--rl); margin-bottom: 8px; overflow: hidden;
    }
    .fat-group-hdr {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid var(--b1);
    }
    .fat-group-hdr .lbl { margin: 0; }
    .fat-group.fresh .fat-group-hdr { border-bottom: none; }
    .fat-fresh-tag {
      font-family: var(--mono); font-size: 10px;
      color: #3dffa0; letter-spacing: .05em;
    }

    .fat-rows { padding: 6px 0; }
    .fat-row {
      display: grid;
      grid-template-columns: 1fr 90px 36px 58px 36px;
      align-items: center; gap: 8px;
      padding: 7px 14px;
    }
    .fat-row:not(:last-child) { border-bottom: 1px solid var(--b1); }

    .fat-name {
      font-size: 12px; color: var(--t2);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .fat-bar {
      height: 5px; background: var(--s3);
      border-radius: 3px; overflow: hidden;
    }
    .fat-bar-fill {
      height: 100%; border-radius: 3px;
      transition: width .4s ease;
    }
    .fat-val {
      font-family: var(--mono); font-size: 12px; font-weight: 600;
      text-align: right;
    }
    .fat-lbl {
      font-family: var(--mono); font-size: 10px;
      letter-spacing: .04em;
    }
    .fat-recup {
      font-family: var(--mono); font-size: 10px;
      color: var(--t3); text-align: right;
    }
    /* ── PROGRESSION ── */
    .prog-selector {
      background: var(--s1); border: 1px solid var(--b1);
      border-radius: var(--rl); margin-bottom: 14px; overflow: hidden;
    }
    .prog-sel-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 14px; cursor: pointer;
      transition: background .12s; border-bottom: 1px solid var(--b1);
    }
    .prog-sel-row:last-child { border-bottom: none; }
    .prog-sel-row:hover { background: var(--s2); }
    .prog-sel-label { font-size: 12px; color: var(--t3); font-family: var(--mono); letter-spacing: .06em; }
    .prog-sel-value { font-size: 13px; color: var(--t1); font-weight: 500; }
    .prog-sel-arr { color: var(--t3); font-size: 12px; }
    .prog-sel-row.locked .prog-sel-arr { opacity: 0; }

    /* Dropdown inline */
    .prog-dropdown {
      background: var(--s2); border-top: 1px solid var(--b1);
    }
    .prog-dd-item {
      padding: 10px 14px; font-size: 13px; color: var(--t2);
      cursor: pointer; transition: background .1s, color .1s;
      border-bottom: 1px solid var(--b1);
    }
    .prog-dd-item:last-child { border-bottom: none; }
    .prog-dd-item:hover { background: var(--s3); color: var(--t1); }
    .prog-dd-item.active { color: var(--accent); }

    /* Stats PRs */
    .prog-pr-grid {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 8px; margin-bottom: 14px;
    }
    .prog-pr-card {
      background: var(--s1); border: 1px solid var(--b1);
      border-radius: var(--rl); padding: 12px 12px 10px;
    }
    .prog-pr-val {
      font-family: var(--mono); font-size: 20px; font-weight: 600;
      color: var(--accent); line-height: 1.1;
    }
    .prog-pr-unit { font-family: var(--mono); font-size: 10px; color: var(--t3); }
    .prog-pr-lbl { font-size: 11px; color: var(--t3); margin-top: 4px; }

    /* Trend badge */
    .prog-trend {
      display: inline-flex; align-items: center; gap: 4px;
      font-family: var(--mono); font-size: 11px; font-weight: 600;
      padding: 2px 7px; border-radius: 4px; margin-top: 5px;
    }
    .prog-trend.up   { color: var(--accent); background: var(--abg); }
    .prog-trend.down { color: var(--red); background: rgba(255,82,82,.08); }
    .prog-trend.flat { color: var(--t3); background: var(--s2); }

    /* Canvas graphe */
    .prog-chart-wrap {
      background: var(--s1); border: 1px solid var(--b1);
      border-radius: var(--rl); padding: 14px 14px 10px;
      margin-bottom: 14px;
    }
    .prog-chart-title {
      font-family: var(--mono); font-size: 10px; font-weight: 600;
      letter-spacing: .1em; text-transform: uppercase;
      color: var(--t3); margin-bottom: 10px;
    }
    .prog-canvas { width: 100%; height: 160px; display: block; }

    /* Historique sessions */
    .prog-sessions {
      background: var(--s1); border: 1px solid var(--b1);
      border-radius: var(--rl); overflow: hidden; margin-bottom: 14px;
    }
    .prog-sess-hdr {
      padding: 10px 14px 8px;
      border-bottom: 1px solid var(--b1);
    }
    .prog-sess-row {
      display: grid; grid-template-columns: 80px 1fr auto auto;
      align-items: center; gap: 10px;
      padding: 8px 14px; border-bottom: 1px solid var(--b1);
      font-size: 12px;
    }
    .prog-sess-row:last-child { border-bottom: none; }
    .prog-sess-date { font-family: var(--mono); font-size: 10px; color: var(--t3); }
    .prog-sess-sets { color: var(--t2); }
    .prog-sess-w { font-family: var(--mono); font-size: 12px; color: var(--t1); text-align: right; }
    .prog-sess-1rm { font-family: var(--mono); font-size: 10px; color: var(--t3); text-align: right; }
    .prog-sess-row.is-pr .prog-sess-w { color: var(--accent); }
    .prog-sess-row.is-pr .prog-sess-1rm { color: var(--accent); }

    .prog-empty {
      text-align: center; padding: 48px 16px;
      color: var(--t3); font-size: 13px;
    }
    .prog-empty em { color: var(--t2); font-style: normal; display: block; margin-top: 6px; font-size: 12px; }

    /* ── ONBOARDING ── */
    #onboarding-overlay {
      position: fixed; inset: 0; z-index: 500;
      background: rgba(8,10,15,.96);
      backdrop-filter: blur(12px);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      opacity: 0; transition: opacity .3s ease;
      pointer-events: none;
    }
    #onboarding-overlay.visible { opacity: 1; pointer-events: all; }

    .ob-card {
      background: var(--s1);
      border: 1px solid var(--b2);
      border-radius: var(--rl);
      width: 100%; max-width: 420px;
      padding: 28px 24px;
      display: flex; flex-direction: column; gap: 24px;
    }
    .ob-header { display: flex; flex-direction: column; gap: 6px; }
    .ob-logo { font-family: var(--mono); font-size: 11px; color: var(--accent); font-weight: 600; letter-spacing: .1em; text-transform: uppercase; }
    .ob-title { font-family: var(--sans); font-size: 20px; font-weight: 600; color: var(--t1); line-height: 1.3; }
    .ob-sub { font-size: 13px; color: var(--t2); line-height: 1.5; }

    .ob-step { display: flex; flex-direction: column; gap: 16px; }
    .ob-step-num { font-family: var(--mono); font-size: 10px; color: var(--t3); letter-spacing: .1em; text-transform: uppercase; }
    .ob-q { font-size: 14px; font-weight: 500; color: var(--t1); }
    .ob-q em { font-style: normal; font-size: 12px; color: var(--t2); display: block; margin-top: 2px; }

    .ob-options { display: flex; flex-wrap: wrap; gap: 8px; }
    .ob-opt {
      padding: 8px 14px;
      border: 1px solid var(--b1);
      border-radius: var(--r);
      background: var(--s2);
      color: var(--t2);
      font-family: var(--sans); font-size: 13px;
      cursor: pointer;
      transition: border-color .15s, background .15s, color .15s;
    }
    .ob-opt:hover { border-color: var(--b3); color: var(--t1); background: var(--s3); }
    .ob-opt.selected {
      border-color: var(--accent);
      background: var(--abg);
      color: var(--accent);
    }

    .ob-nav { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .ob-progress { flex: 1; height: 2px; background: var(--b1); border-radius: 2px; overflow: hidden; }
    .ob-progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .3s ease; }
    .ob-btn-prev {
      padding: 9px 16px;
      border: 1px solid var(--b1);
      border-radius: var(--r);
      background: transparent;
      color: var(--t2); font-size: 13px;
      cursor: pointer;
      transition: color .15s, border-color .15s;
    }
    .ob-btn-prev:hover { color: var(--t1); border-color: var(--b3); }
    .ob-btn-next {
      padding: 9px 20px;
      border: none; border-radius: var(--r);
      background: var(--accent); color: #080a0f;
      font-family: var(--sans); font-size: 13px; font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }
    .ob-btn-next:disabled { opacity: .35; cursor: not-allowed; }
    .ob-btn-next:not(:disabled):hover { opacity: .85; }

    .ob-result {
      background: var(--s2);
      border: 1px solid var(--b1);
      border-radius: var(--r);
      padding: 14px 16px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .ob-result-label { font-family: var(--mono); font-size: 10px; color: var(--t3); text-transform: uppercase; letter-spacing: .1em; }
    .ob-result-value { font-family: var(--mono); font-size: 22px; font-weight: 600; }
    .ob-result-desc { font-size: 12px; color: var(--t2); }

    /* ── PROFIL dans settings ── */
    .profile-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px;
      border: 1px solid var(--b1);
      border-radius: var(--r);
      background: var(--s2);
      color: var(--t2); font-size: 12px;
      cursor: pointer;
      font-family: var(--sans);
      transition: border-color .15s, color .15s;
    }
    .profile-btn:hover { border-color: var(--b3); color: var(--t1); }
    .profile-btn .pb-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent);
    }


    .sel-item-group { background: var(--s2); }
    .sel-item-group:hover { background: var(--s3); }
    .si-sub { font-size: 11px; color: var(--t3); margin-top: 3px; font-family: var(--mono); }

    /* ── PACE DISPLAY ── */
    .pace-display { display:flex; align-items:baseline; gap:5px; }
    .pace-val { font-family:var(--mono); font-size:20px; font-weight:600; color:var(--accent); }
    .pace-unit-label { font-size:11px; color:var(--t3); }
    .pace-toggle { font-size:11px; color:var(--t3); background:none; border:1px solid var(--b1);
      border-radius:4px; padding:3px 8px; cursor:pointer; font-family:var(--sans);
      transition:border-color .15s, color .15s; }
    .pace-toggle:hover { border-color:var(--b3); color:var(--t2); }

    /* ── BACKUP BUTTONS ── */
    .backup-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 11px;
      border: 1px solid var(--b1);
      border-radius: var(--r);
      background: var(--s2);
      color: var(--t2); font-size: 12px;
      cursor: pointer;
      font-family: var(--sans);
      transition: border-color .15s, color .15s;
    }
    .backup-btn:hover { border-color: var(--b3); color: var(--t1); }
    .backup-btn.import-btn:hover { border-color: var(--blue); color: var(--blue); }

    /* ── BODY MAP ── */
    .bm-wrap {
      margin-bottom: 14px;
      background: var(--s1); border: 1px solid var(--b1);
      border-radius: var(--rl); overflow: hidden;
    }
    .bm-svg {
      display: block; width: 100%; max-width: 480px;
      margin: 0 auto; padding: 6px 0 2px;
    }
    .bm-det {
      border-top: 1px solid var(--b1); padding: 10px 14px;
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
      min-height: 40px;
    }
    .bm-det-name  { font-size: 13px; font-weight: 500; color: var(--t1); }
    .bm-det-state { font-family: var(--mono); font-size: 11px; font-weight: 600; }
    .bm-det-recup { font-family: var(--mono); font-size: 10px; color: var(--t2); }
    .bm-det-hint  { font-family: var(--mono); font-size: 10px; color: var(--t3); }

    /* Bouton édition activité dans historique */
    .btn-act-edit {
      background: none; border: 1px solid var(--b2); border-radius: var(--r);
      color: var(--t2); font-size: 13px; padding: 2px 8px; cursor: pointer;
      transition: border-color .15s, color .15s; flex-shrink: 0;

</div>

// PR ENGINE — Records personnels
// ════════════════════════════════════════════════════
const PR_ENGINE = {
  KEY: 'muscleos_prs',

  load() {
    try { return JSON.parse(localStorage.getItem(this.KEY) || '{}'); }
    catch { return {}; }
  },

  save(prs) { localStorage.setItem(this.KEY, JSON.stringify(prs)); },

  /**
   * Recalcule tous les PRs depuis l'historique complet.
   * À appeler après chaque modification (ajout/suppression de série).
   * Structure stockée par clé `cat::exId::varId` :
   *   { maxWeight, max1RM, maxReps (bodyweight), maxVolume }
   */
  rebuild() {
    const sessions = DB.load();
    const prs = {};

    for (const session of sessions) {
      for (const entry of session.entries) {
        if (entry.type === 'activity') continue; // pas de sets sur les activités
        const key = `${entry.category}::${entry.exerciseId}::${entry.variantId}`;
        if (!prs[key]) prs[key] = { maxWeight: 0, max1RM: 0, maxReps: 0, maxVolume: 0 };
        const pr = prs[key];

        // Volume total de cette entrée dans cette session
        const vol = entry.sets.reduce((s, x) => s + (x.weight || 0) * (x.reps || 0), 0);
        if (vol > pr.maxVolume) pr.maxVolume = vol;

        for (const set of entry.sets) {
          const w = set.weight || 0;
          const r = set.reps || 0;
          if (!r) continue;

          if (w > 0) {
            // Exercice lesté
            if (w > pr.maxWeight) pr.maxWeight = w;
            // Formule Epley : e1RM = w × (1 + r/30), valide pour r ≤ 10
            const e1rm = r === 1 ? w : w * (1 + r / 30);
            if (e1rm > pr.max1RM) pr.max1RM = e1rm;
          } else {
            // Poids du corps — on suit les reps max
            if (r > pr.maxReps) pr.maxReps = r;
          }
        }
      }
    }

    this.save(prs);
    return prs;
  },

  /**
   * Retourne le type de PR battu par un set donné, avant qu'il soit ajouté.
   * @returns { weight: bool, e1rm: bool, reps: bool }
   */
  check(cat, exId, varId, weight, reps) {
    const prs = this.load();
    const key = `${cat}::${exId}::${varId}`;
    const pr = prs[key] || { maxWeight: 0, max1RM: 0, maxReps: 0 };
    const w = weight || 0;
    const r = reps || 0;
    const e1rm = (w > 0 && r > 0) ? (r === 1 ? w : w * (1 + r / 30)) : 0;
    return {
      weight: w > 0 && w > pr.maxWeight,
      e1rm:   e1rm > 0 && e1rm > pr.max1RM,
      reps:   w === 0 && r > pr.maxReps
    };
  },

  /**
   * Vérifie si un set existant est actuellement le détenteur d'un PR.
   * Utilisé au render pour afficher les badges.
   * @returns 'weight' | '1rm' | 'reps' | null
   */
  getBadge(cat, exId, varId, weight, reps) {
    const prs = this.load();
    const key = `${cat}::${exId}::${varId}`;
    const pr = prs[key];
    if (!pr) return null;
    const w = weight || 0;
    const r = reps || 0;
    if (w > 0 && r > 0) {
      // On compare le e1RM du set au max stocké (tolérance flottante)
      const e1rm = r === 1 ? w : w * (1 + r / 30);
      if (Math.abs(e1rm - pr.max1RM) < 0.01) return '1rm';
      if (w === pr.maxWeight) return 'weight';
    } else if (w === 0 && r > 0 && r === pr.maxReps) {
      return 'reps';
    }
    return null;
  }
};



/**
 * Recalcule entièrement l'état de fatigue depuis l'historique DB.
 * Appelé après chaque modification de séance (ajout/suppression de série).
 * Chaque série est appliquée à son propre timestamp (set.ts).
 */
function rebuildFatigue() {
  if (typeof FATIGUE_ENGINE === 'undefined' || typeof FATIGUE_DATA === 'undefined') return;
  FATIGUE_ENGINE.reset();
  FATIGUE_ENGINE.resetCTL();
  const sessions = DB.load().sort((a, b) => a.id.localeCompare(b.id));
  for (const session of sessions) {
    for (const entry of session.entries) {
      if (entry.type === 'activity') {
        // Activité cardio/sport — doses calculées depuis le profil ACTIVITY_FATIGUE
        if (!entry.activityType || !entry.duration || !entry.intensity) continue;
        const doses = calcActivityDoses(entry.activityType, entry.duration, entry.intensity, entry.boosts || {});
        if (Object.keys(doses).length) {
          const profile = ACTIVITY_FATIGUE[entry.activityType];
          FATIGUE_ENGINE.applyDoses(doses, entry.ts, profile?.recovery_scale ?? 1.0);
        }
      } else {
        // Exercice de musculation — doses calculées depuis FATIGUE_DATA
        const activation = FATIGUE_DATA[entry.category]?.[entry.exerciseId]?.[entry.variantId];
        if (!activation) continue;
        const sessionTs = session.id ? new Date(session.id).getTime() : Date.now();
        for (const set of entry.sets) {
          const ts = set.ts || entry.ts || sessionTs;
          const doses = FATIGUE_ENGINE.calcDoses(activation, [set]);
          FATIGUE_ENGINE.applyDoses(doses, ts);
        }
      }
    }
  }
}

function uid() { return Math.random().toString(36).slice(2, 9); }

function fmtDateShort(id) {
  const [y, m, d] = id.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  const days = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
  const months = ['janv','févr','mars','avr','mai','juin','juil','août','sept','oct','nov','déc'];
  return `${days[dt.getDay()]} ${d} ${months[m-1]} ${y}`;
}

function fmtDateLong(id) {
  const [y, m, d] = id.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  const days = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  const months = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
  return `${days[dt.getDay()]} ${d} ${months[m-1]}`;
}

function calcVol(entry) {
  if (entry.type === 'activity') return 0;
  return entry.sets.reduce((s, x) => s + (x.weight || 0) * (x.reps || 0), 0);
}

function calcActivityDoses(actType, duration, intensity, boosts) {
  const profile = ACTIVITY_FATIGUE[actType];
  if (!profile || !duration || !intensity) return {};
  const roleF = { p: 1.0, s: 0.45, t: 0.18 };
  const durationFactor = Math.max(0.2, duration / 60);
  const intensityFactor = Math.max(0.1, intensity / 5); // référence = intensité 5
  const doses = {};
  for (const [id, data] of Object.entries(profile.muscles)) {
    const rf = roleF[data.r] ?? 0.18;
    let dose = (data.p / 100) * rf * durationFactor * intensityFactor * profile.base_dose;
    // Appliquer les boosts manuels
    if (boosts && boosts[id]) dose *= BOOST_MULT[boosts[id]] ?? 1;
    doses[id] = Math.round(dose * 10) / 10;
  }
  // Appliquer les boosts sur muscles hors profil de base
  if (boosts) {
    for (const [id, level] of Object.entries(boosts)) {
      if (!doses[id]) {
        // Muscle boosted pas dans le profil de base → dose minimale boostée
        const rf = roleF['s'];
        doses[id] = Math.round((30 / 100) * rf * durationFactor * intensityFactor * profile.base_dose * BOOST_MULT[level] * 10) / 10;
      }
    }
  }
  return doses;
}



function entryStats(entry) {
  if (entry.type === 'activity') {
    const parts = [];
    if (entry.duration) parts.push(`${entry.duration} min`);
    if (entry.intensity) parts.push(`${entry.intensity}/10`);
    return parts.join(' · ') || '—';
  }
  if (!entry.sets.length) return '—';
  const n = entry.sets.length;
  const maxW = Math.max(...entry.sets.map(s => s.weight || 0));
  const reps0 = entry.sets[0]?.reps || 0;
  if (maxW > 0) return `${n}×${reps0} · ${maxW} kg`;
  const totalReps = entry.sets.reduce((s, x) => s + (x.reps || 0), 0);
  return `${n} séries · ${totalReps} reps`;
}

/** Retourne les 30 derniers points de poids (date + valeur), triés ASC */
function getBwHistory() {
  return DB.load()
    .filter(s => s.metrics?.bodyweight != null)
    .sort((a, b) => a.id.localeCompare(b.id))
    .slice(-30)
    .map(s => ({ date: s.id, bw: s.metrics.bodyweight }));
}

/** Génère un sparkline SVG inline à partir de points [{bw}] */
function bwSparkline(points) {
  if (points.length < 2) return '';
  const W = 200, H = 44, PAD = 4;
  const vals = points.map(p => p.bw);
  const min = Math.min(...vals) - 0.5;
  const max = Math.max(...vals) + 0.5;
  const range = max - min || 1;
  const xs = points.map((_, i) => PAD + (i / (points.length - 1)) * (W - PAD*2));
  const ys = points.map(p => H - PAD - ((p.bw - min) / range) * (H - PAD*2));
  const pathD = xs.map((x, i) => `${i===0?'M':'L'}${x.toFixed(1)},${ys[i].toFixed(1)}`).join(' ');
  // Aire sous la courbe
  const areaD = pathD + ` L${xs[xs.length-1].toFixed(1)},${H} L${PAD},${H} Z`;
  const last = points[points.length - 1];
  const prev = points[points.length - 2];
  const diff = last.bw - prev.bw;
  const dotColor = diff < -0.05 ? 'var(--accent)' : diff > 0.05 ? 'var(--orange)' : 'var(--t3)';
  const lx = xs[xs.length-1], ly = ys[ys.length-1];
  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
    <defs>
      <linearGradient id="bwGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="var(--accent)" stop-opacity="0.18"/>
        <stop offset="100%" stop-color="var(--accent)" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <path d="${areaD}" fill="url(#bwGrad)"/>
    <path d="${pathD}" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-opacity="0.6" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${lx.toFixed(1)}" cy="${ly.toFixed(1)}" r="3" fill="${dotColor}"/>
  </svg>`;
}

      ${entriesHtml}
    </div>
    <button class="btn-add-ex" id="btn-add-ex">＋ &nbsp;Ajouter un exercice</button>
  `;

  // Bind metric events
  document.querySelectorAll('.edot').forEach(btn => {
    btn.addEventListener('click', () => {
      S.today.metrics.energy = parseInt(btn.dataset.e);
      DB.saveToday(S.today);
      // update UI without full re-render
      document.querySelectorAll('.edot').forEach(b =>
        b.classList.toggle('on', b.dataset.e == btn.dataset.e));
      const ev = document.getElementById('ev');
      ev.textContent = btn.dataset.e + '/10';
      ev.classList.add('set');
    });
  });

  const sleepInp = document.getElementById('sleep-inp');
  sleepInp.addEventListener('change', () => {
    const v = parseFloat(sleepInp.value);
    S.today.metrics.sleep = isNaN(v) ? null : v;
    DB.saveToday(S.today);
  });

  const bwInp = document.getElementById('bw-inp');
  bwInp.addEventListener('change', () => {
    const v = parseFloat(bwInp.value);
    S.today.metrics.bodyweight = isNaN(v) ? null : Math.round(v * 10) / 10;
    DB.saveToday(S.today);
    // Re-render uniquement la carte bw pour mettre à jour le delta et le sparkline
    renderToday();
  });

  let notesTimer;
  const notesTa = document.getElementById('notes-ta');
  notesTa.addEventListener('input', () => {
    clearTimeout(notesTimer);
    notesTimer = setTimeout(() => {
      S.today.metrics.notes = notesTa.value;
      DB.saveToday(S.today);
    }, 500);
  });

  document.getElementById('btn-add-ex').addEventListener('click', () => openDrawer());

  // Bind all entry events
  S.today.entries.forEach(e => bindEntry(e.id));
}

function renderEntry(entry) {
  // ── ACTIVITÉ ─────────────────────────────────────
  if (entry.type === 'activity') {
    const act = ACTIVITY_CATALOG[entry.activityType] || ACTIVITY_CATALOG.autre;
    const isOpen = S.expandedEntry === entry.id;
    const boosts = entry.boosts || {};
    const boostKeys = Object.keys(boosts);

    const boostHtml = boostKeys.length > 0
      ? `<div class="boost-section">
          <div class="lbl" style="margin-bottom:6px">Muscles sollicités</div>
          <div class="boost-grid">
            ${boostKeys.map(id => `
              <span class="boost-chip ${boosts[id]}">${MUSCLE_LABELS[id] || id}</span>
            `).join('')}
          </div>
        </div>`
      : '<div style="font-size:12px;color:var(--t3);padding:4px 0">Aucun muscle signalé</div>';

    const panel = isOpen ? `
      <div class="act-panel">
        ${entry.notes ? `<div style="font-size:13px;color:var(--t2);margin-bottom:8px">${entry.notes}</div>` : ''}
        ${boostHtml}
        <div class="entry-foot" style="margin-top:10px">
          <button class="btn-de" data-eid="${entry.id}">Supprimer l'activité</button>
        </div>
      </div>` : '';

    return `
      <div class="act-card${isOpen?' open':''}" id="ec-${entry.id}">
        <div class="act-hdr" data-eid="${entry.id}">
          <div class="act-icon" style="background:${act.color}22;color:${act.color}">${act.icon}</div>
          <div class="act-info">
            <div class="act-name" style="color:${act.color}">${act.label}</div>
            <div class="act-meta">${entryStats(entry)}</div>
          </div>
          <div class="act-stats">
            ${boostKeys.length > 0 ? `<span style="color:var(--t3);font-size:10px">${boostKeys.length} boost${boostKeys.length>1?'s':''}</span>` : ''}
          </div>
          <div class="e-chev">▾</div>
        </div>
        ${panel}
      </div>`;
  }

  // ── EXERCICE MUSCU ────────────────────────────────
  const color = getCatColor(entry.category);
  const name = exLabel(entry.category, entry.exerciseId);
  const vl = varLabel(entry.category, entry.exerciseId, entry.variantId);
  const stats = entryStats(entry);
  const isOpen = S.expandedEntry === entry.id;

  // Sets rows
  const setsRows = entry.sets.length > 0
    ? entry.sets.map((s, i) => {
        const badge = PR_ENGINE.getBadge(entry.category, entry.exerciseId, entry.variantId, s.weight, s.reps);
        const badgeHtml = badge === '1rm'
          ? `<span class="pr-badge pr-1rm" title="Record 1RM estimé">PR</span>`
          : badge === 'weight'
          ? `<span class="pr-badge" title="Charge maximale">PR</span>`
          : badge === 'reps'
          ? `<span class="pr-badge" title="Record de reps">PR</span>`
          : `<span></span>`;
        return `
        <div class="set-row">
          <span class="set-n">S${i+1}</span>
          <div><div class="sv">${s.weight > 0 ? s.weight+' kg' : 'BW'}</div><div class="su">poids</div></div>
          <div><div class="sv">${s.reps}</div><div class="su">reps</div></div>
          <div><div class="sv" style="color:var(--t3)">${s.rir!=null ? 'RIR '+s.rir : '—'}</div><div class="su">rir</div></div>
          ${s.angle != null ? `<div><div class="sv" style="color:var(--t3)">${s.angle > 0 ? '+' : ''}${s.angle}°</div><div class="su">angle</div></div>` : '<span></span>'}
          ${badgeHtml}
          <button class="btn-ds" data-eid="${entry.id}" data-sid="${s.id}" title="Supprimer">✕</button>
        </div>`;
      }).join('')
    : `<div style="font-size:12px;color:var(--t3);padding:6px 0 4px">Aucune série — ajoutez votre première série ci-dessous</div>`;

  const isAngleAdaptable = CATALOG[entry.category]?.exercises[entry.exerciseId]?.angleAdaptable || false;
  const lastAngle = entry.sets.length > 0 && entry.sets[entry.sets.length-1].angle != null
    ? entry.sets[entry.sets.length-1].angle : null;
  const angleField = isAngleAdaptable ? `
    <div class="fg">
      <label class="fl">Angle (°)</label>
      <input class="fi" id="iangle-${entry.id}" type="number" placeholder="0" min="-30" max="90" step="5"
        value="${lastAngle != null ? lastAngle : ''}">
    </div>` : '';

  const panel = isOpen ? `
    <div class="sets-panel">
      <div class="lbl" style="margin-bottom:8px">Séries</div>
      <div class="sets-list">${setsRows}</div>
      <div class="add-set-form">
        <div class="fg">
          <label class="fl">Poids (kg)</label>
          <input class="fi" id="iw-${entry.id}" type="number" placeholder="100" min="0" step="0.5">
        </div>
        <div class="fg">
          <label class="fl">Reps</label>
          <input class="fi" id="ir-${entry.id}" type="number" placeholder="5" min="1">
        </div>
        <div class="fg">
          <label class="fl">RIR</label>
          <input class="fi" id="irir-${entry.id}" type="number" placeholder="2" min="0" max="10">
        </div>
        ${angleField}
        <button class="btn-log" data-eid="${entry.id}">＋ Série</button>
      </div>
    </div>
    <div class="entry-foot">
      <button class="btn-de" data-eid="${entry.id}">Supprimer l'exercice</button>
    </div>` : '';

  return `
    <div class="entry-card${isOpen?' open':''}" id="ec-${entry.id}">
      <div class="entry-hdr" data-eid="${entry.id}">
        <div class="e-dot" style="background:${color}"></div>
        <div class="e-info">
          <div class="e-name">${name}</div>
          <div class="e-var">${vl}</div>
        </div>
        <div class="e-stats">${stats}</div>
        <div class="e-chev">▾</div>
      </div>
      ${panel}
    </div>`;
}

function bindEntry(entryId) {
  const entry = S.today.entries.find(e => e.id === entryId);

  // Toggle expand (commun aux deux types)
  const hdr = document.querySelector(`.entry-hdr[data-eid="${entryId}"], .act-hdr[data-eid="${entryId}"]`);
  if (hdr) hdr.addEventListener('click', () => {
    S.expandedEntry = S.expandedEntry === entryId ? null : entryId;
    refreshEntries();
  });

  // Bouton supprimer (commun)
  const btnDe = document.querySelector(`.btn-de[data-eid="${entryId}"]`);
  if (btnDe) btnDe.addEventListener('click', () => {
    S.today.entries = S.today.entries.filter(e => e.id !== entryId);
    if (S.expandedEntry === entryId) S.expandedEntry = null;
    DB.saveToday(S.today);
    rebuildFatigue();
    PR_ENGINE.rebuild();
    renderToday();
  });

  // ── Activité : rien d'autre à binder ──────────────
  if (entry?.type === 'activity') return;

  // ── Exercice muscu ────────────────────────────────
  if (S.expandedEntry !== entryId) return;

  // Pre-fill weight/reps from last set
  if (entry?.sets.length) {
    const last = entry.sets[entry.sets.length - 1];
    const iw = document.getElementById(`iw-${entryId}`);
    const ir = document.getElementById(`ir-${entryId}`);
    if (iw && last.weight > 0) iw.value = last.weight;
    if (ir && last.reps) ir.value = last.reps;
  }

  // Add set on button click
  const btnLog = document.querySelector(`.btn-log[data-eid="${entryId}"]`);
  if (btnLog) btnLog.addEventListener('click', () => addSet(entryId));

  // Add set on Enter key in reps/RIR fields
  ['ir-', 'irir-'].forEach(prefix => {
    const inp = document.getElementById(`${prefix}${entryId}`);
    if (inp) inp.addEventListener('keydown', e => { if (e.key==='Enter') addSet(entryId); });
  });

  // Delete individual sets
  document.querySelectorAll(`.btn-ds[data-eid="${entryId}"]`).forEach(btn => {
    btn.addEventListener('click', () => {
      const e = S.today.entries.find(x => x.id === entryId);
      if (e) {
        e.sets = e.sets.filter(s => s.id !== btn.dataset.sid);
        DB.saveToday(S.today);
        rebuildFatigue();
        PR_ENGINE.rebuild();
        refreshEntries();
      }
    });
  });

  // Delete whole entry — géré dans le bloc commun ci-dessus

}

function addSet(entryId) {
  const w = parseFloat(document.getElementById(`iw-${entryId}`)?.value) || 0;
  const r = parseInt(document.getElementById(`ir-${entryId}`)?.value);
  const rir = document.getElementById(`irir-${entryId}`)?.value;
  const angleRaw = document.getElementById(`iangle-${entryId}`)?.value;
  const angle = (angleRaw !== '' && angleRaw != null) ? parseInt(angleRaw) : null;

  if (!r || r <= 0) {
    const inp = document.getElementById(`ir-${entryId}`);
    if (inp) { inp.classList.add('err'); setTimeout(() => inp.classList.remove('err'), 400); inp.focus(); }
    return;
  }

  // Cherche dans S.today d'abord, puis dans les sessions passées
  let entry = S.today.entries.find(e => e.id === entryId);
  let isHistoryEntry = false;
  let historySessionId = null;
  if (!entry) {
    const all = DB.load();
    for (const sess of all) {
      const found = sess.entries.find(e => e.id === entryId);
      if (found) { entry = found; isHistoryEntry = true; historySessionId = sess.id; break; }
    }
  }
  if (!entry) return;

  // Vérifier si le set bat un PR avant de l'ajouter
  const prHit = PR_ENGINE.check(entry.category, entry.exerciseId, entry.variantId, w, r);

  const setObj = {
    id: uid(), weight: w, reps: r,
    rir: (rir !== '' && rir != null) ? parseInt(rir) : null,
    ts: Date.now()
  };
  if (angle !== null) setObj.angle = angle;
  entry.sets.push(setObj);

  if (isHistoryEntry) {
    const all = DB.load();
    const sess = all.find(s => s.id === historySessionId);
    if (sess) {
      const e2 = sess.entries.find(e => e.id === entryId);
      if (e2) e2.sets = entry.sets;
    }
    DB.save(all);
    renderHistory();
  } else {
    DB.saveToday(S.today);
    refreshEntries();
  }
  rebuildFatigue();
  PR_ENGINE.rebuild();

  // Flash notification PR
  if (prHit.weight || prHit.e1rm || prHit.reps) {
    const msg = prHit.e1rm ? '🏆 Nouveau record 1RM !' : prHit.weight ? '🏆 Nouvelle charge max !' : '🏆 Record de reps !';
    showPrToast(msg);
  }
}

function refreshEntries() {
  const wrap = document.getElementById('entries-wrap');
  if (!wrap) return;
  const s = S.today;
  wrap.innerHTML = s.entries.length === 0
    ? `<div class="entry-empty">Aucun exercice enregistré · <em>ajoutez votre premier mouvement</em></div>`
    : s.entries.map(e => renderEntry(e)).join('');
  s.entries.forEach(e => bindEntry(e.id));

  // Update stats bar
  const totalVol = s.entries.reduce((x, e) => x + calcVol(e), 0);
  const totalSets = s.entries.reduce((x, e) => x + (e.sets?.length || 0), 0);
  const totalAct = s.entries.filter(e => e.type === 'activity').length;
  const sb = document.getElementById('stats-bar');
  if (sb) {
    if (totalVol > 0 || totalSets > 0 || totalAct > 0) {
      sb.className = 'stats-bar';
      sb.innerHTML = `
        <span class="sb-item">Volume <strong>${totalVol.toLocaleString('fr-FR')} kg</strong></span>
        <span class="sb-item">Séries <strong>${totalSets}</strong></span>
        <span class="sb-item">${totalAct > 0 ? `Activités <strong>${totalAct}</strong>` : `Exercices <strong>${s.entries.filter(e=>e.type!=='activity').length}</strong>`}</span>`;
    } else {
      sb.className = '';
      sb.innerHTML = '';
    }
  }
}

// RENDER — HISTORY TAB
// ════════════════════════════════════════════════════
function renderHistory() {
  const past = DB.getPast();
  const el = document.getElementById('tab-history');

  if (past.length === 0) {
    el.innerHTML = `<div class="hist-empty">
      <div style="font-size:24px;margin-bottom:10px;color:var(--b3)">◌</div>
      Aucune séance passée<br>
      <span style="color:var(--t3)">Les séances apparaîtront ici après votre première journée</span>
    </div>`;
    return;
  }

  el.innerHTML = past.map(s => {
    const names = s.entries.map(e => {
      if (e.type === 'activity') return (ACTIVITY_CATALOG[e.activityType]?.label || 'Activité');
      return exLabel(e.category, e.exerciseId);
    }).join(' · ') || 'Journée vide';
    const vol = s.entries.reduce((x, e) => x + calcVol(e), 0);
    const sets = s.entries.reduce((x, e) => x + (e.sets?.length || 0), 0);
    const actCount = s.entries.filter(e => e.type === 'activity').length;
    const isOpen = S.expandedHist === s.id;

    const meta = [];
    if (s.metrics?.energy != null) meta.push(`Énergie : ${s.metrics.energy}/10`);
    if (s.metrics?.sleep != null) meta.push(`Sommeil : ${s.metrics.sleep}h`);
    if (s.metrics?.notes) meta.push(s.metrics.notes);

    const detail = isOpen ? `
      <div class="hist-detail">
        ${meta.length ? `<div class="h-meta">${meta.join(' · ')}</div>` : ''}
        ${s.entries.map(e => {
          if (e.type === 'activity') {
            const act = ACTIVITY_CATALOG[e.activityType] || ACTIVITY_CATALOG.autre;
            // Détails fractionné
            let intervalsStr = '';
            if (e.intervals && e.intervals.reps && e.intervals.effort_m) {
              const iv = e.intervals;
              intervalsStr = `${iv.reps}×${iv.effort_m}m`;
              if (iv.recov_m) intervalsStr += `/${iv.recov_m}m`;
            }
            // Calcul pace si distance + durée
            let paceStr = '';
            if (e.distance && e.duration) {
              const unit = e.paceUnit || 'min_km';
              if (unit === 'min_km') {
                const t = e.duration / e.distance;
                const m = Math.floor(t), s = Math.round((t - m) * 60);
                paceStr = ` · ${m}:${s.toString().padStart(2,'0')}/km`;
              } else {
                paceStr = ` · ${((e.distance / e.duration) * 60).toFixed(1)} km/h`;
              }
            }
            const actDetails = [
              e.duration ? e.duration + ' min' : '',
              e.distance ? e.distance + ' km' : '',
              intervalsStr,
              e.intensity ? '· ' + e.intensity + '/10' : '',
              e.bpm ? '· ' + e.bpm + ' bpm' : '',
              paceStr,
            ].filter(Boolean).join(' ');
            return `<div class="hist-entry">
              <div>
                <div class="he-name" style="color:${act.color}">${act.icon} ${act.label}</div>
                <div class="he-var">${actDetails}</div>
              </div>
              <button class="btn-act-edit" data-sid="${s.id}" data-eid="${e.id}"
                data-atype="${e.activityType}" data-dur="${e.duration||''}"
                data-int="${e.intensity||0}" data-boosts='${JSON.stringify(e.boosts||{})}'
                data-dist="${e.distance||''}" data-bpm="${e.bpm||''}"
                data-pace-unit="${e.paceUnit||'min_km'}">✎</button>
            </div>`;
          }
          const color = getCatColor(e.category);
          const n = e.sets.length;
          const maxW = n > 0 ? Math.max(...e.sets.map(x => x.weight || 0)) : 0;
          const reps0 = n > 0 ? e.sets[0].reps : 0;
          const setsRows = e.sets.map((set, i) =>
            `<div class="set-row">
              <span class="set-n">S${i+1}</span>
              <div><div class="sv">${set.weight > 0 ? set.weight+' kg' : 'BW'}</div><div class="su">poids</div></div>
              <div><div class="sv">${set.reps}</div><div class="su">reps</div></div>
              ${set.rir != null ? `<div><div class="sv" style="color:var(--t3)">RIR ${set.rir}</div><div class="su">rir</div></div>` : ''}
              <button class="btn-ds" data-eid="${e.id}" data-sid="${set.id}" data-sessid="${s.id}" title="Supprimer">✕</button>
            </div>`).join('');
          return `<div class="hist-entry-full" id="hef-${e.id}">
            <div class="hist-entry-hdr">
              <div>
                <div class="he-name">
                  <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${color}"></span>
                  ${exLabel(e.category, e.exerciseId)}
                </div>
                <div class="he-var">${varLabel(e.category, e.exerciseId, e.variantId)}</div>
              </div>
              <div style="display:flex;align-items:center;gap:8px">
                <div class="he-sets">${n > 0 ? n+'×'+reps0+(maxW > 0 ? ' · '+maxW+' kg' : '') : 'Aucune série'}</div>
                <button class="btn-act-edit btn-he-del" data-sessid="${s.id}" data-eid="${e.id}" title="Supprimer l'exercice">✕</button>
              </div>
            </div>
            ${n > 0 ? `<div class="hist-sets-list">${setsRows}</div>` : ''}
            <div class="hist-add-set">
              <input class="fi" id="iw-${e.id}" type="number" placeholder="kg" min="0" step="0.5" style="width:72px">
              <input class="fi" id="ir-${e.id}" type="number" placeholder="reps" min="1" style="width:64px">
              <input class="fi" id="irir-${e.id}" type="number" placeholder="RIR" min="0" max="10" style="width:56px">
              <button class="btn-log-set" data-logeid="${e.id}">+ Série</button>
            </div>
          </div>`;
        }).join('')}
        <div style="padding-top:10px;border-top:1px solid var(--b1);margin-top:8px">
          <button class="btn-del-session" data-sessid="${s.id}">🗑 Supprimer cette séance</button>
        </div>
      </div>` : '';

    const setsLabel = sets > 0 && actCount > 0
      ? `${sets} série${sets!==1?'s':''} + ${actCount} act.`
      : sets > 0 ? `${sets} série${sets!==1?'s':''}`
      : actCount > 0 ? `${actCount} activité${actCount!==1?'s':''}`
      : '—';

    return `<div class="hist-session">
      <div class="hist-hdr" data-hid="${s.id}">
        <div>
          <div class="h-date">${fmtDateShort(s.id)}</div>
          <div class="h-exs">${names}</div>
        </div>
        <div class="h-right">
          <div class="h-vol">${vol > 0 ? vol.toLocaleString('fr-FR')+' kg' : '—'}</div>
          <div class="h-sets">${setsLabel}</div>
        </div>
      </div>
      ${detail}
    </div>`;
  }).join('');

  document.querySelectorAll('.hist-hdr').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.hid;
      S.expandedHist = S.expandedHist === id ? null : id;
      renderHistory();
    });
  });

  document.querySelectorAll('.btn-del-session').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const sessId = btn.dataset.sessid;
      const dateLabel = sessId; // fmtDateShort pas encore dispo ici, on utilise l'id
      if (!confirm('Supprimer toute la séance du ' + sessId + ' ?')) return;
      let all = DB.load();
      all = all.filter(s => s.id !== sessId);
      DB.save(all);
      if (S.expandedHist === sessId) S.expandedHist = null;
      rebuildFatigue();
      PR_ENGINE.rebuild();
      renderHistory();
    });
  });

  document.querySelectorAll('.btn-act-edit').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      openDrawer({
        sessionId: btn.dataset.sid,
        entryId:   btn.dataset.eid,
        actType:   btn.dataset.atype,
        duration:  parseInt(btn.dataset.dur) || null,
        intensity: parseInt(btn.dataset.int) || 0,
        boosts:    JSON.parse(btn.dataset.boosts || '{}'),
        distance:  parseFloat(btn.dataset.dist) || null,
        bpm:       parseInt(btn.dataset.bpm) || null,
        paceUnit:  btn.dataset.paceUnit || 'min_km',
        date:      btn.dataset.sid,
      });
    });
  });

  // Boutons "+ Série" dans l'historique
  document.querySelectorAll('.btn-log-set').forEach(btn => {
    btn.addEventListener('click', () => addSet(btn.dataset.logeid));
  });

  // Bouton supprimer EXERCICE dans l'historique
  document.querySelectorAll('.btn-he-del').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      if (!confirm('Supprimer cet exercice et toutes ses séries ?')) return;
      const all = DB.load();
      const sess = all.find(s => s.id === btn.dataset.sessid);
      if (!sess) return;
      sess.entries = sess.entries.filter(e => e.id !== btn.dataset.eid);
      DB.save(all);
      const todayId = DB.todayId();
      if (btn.dataset.sessid === todayId) {
        S.today = all.find(s => s.id === todayId) || S.today;
      }
      rebuildFatigue();
      PR_ENGINE.rebuild();
      renderHistory();
    });
  });

  // Boutons supprimer série dans l'historique
  document.querySelectorAll('.hist-sets-list .btn-ds').forEach(btn => {
    btn.addEventListener('click', () => {
      const sessId = btn.dataset.sessid;
      const entryId = btn.dataset.eid;
      const setId = btn.dataset.sid;
      const all = DB.load();
      const sess = all.find(s => s.id === sessId);
      if (!sess) return;
      const entry = sess.entries.find(e => e.id === entryId);
      if (!entry) return;
      entry.sets = entry.sets.filter(s => s.id !== setId);
      DB.save(all);
      rebuildFatigue();
      PR_ENGINE.rebuild();
      renderHistory();
    });
  });
}
